<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDFlow Ver. 2.6</title>
  <style>
    :root{--bg:#f3f6fb;--panel:#fff;--panel-2:#f8faff;--border:#dbe4f0;--text:#0f172a;--muted:#64748b;--blue:#1a56db;--blue-2:#eaf1ff;--green:#16a34a;--green-2:#ecfdf3;--amber:#d97706;--amber-2:#fff7e8;--red:#dc2626;--red-2:#fff0f0;--chip:#eef3fb;--shadow:0 8px 24px rgba(15,23,42,.06);--radius:16px}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif} button,input,select,textarea{font:inherit} body{min-height:100vh}
    .app{display:flex;min-height:100vh}.sidebar{width:270px;background:var(--panel);border-right:1px solid var(--border);padding:18px 16px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{padding:6px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:18px}.brand-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.logo{font-size:28px;font-weight:800;letter-spacing:-.03em}.logo b{color:var(--blue)} .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .version{display:inline-flex;align-items:center;background:var(--blue-2);color:var(--blue);border:1px solid #cfe0ff;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700}
    .section-label{font-size:11px;font-weight:800;letter-spacing:.08em;color:#94a3b8;text-transform:uppercase;margin:18px 8px 10px}.nav{display:flex;flex-direction:column;gap:6px}
    .nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border:none;border-radius:12px;background:transparent;color:#334155;cursor:pointer;text-align:left;font-weight:600}.nav-btn:hover{background:var(--panel-2)} .nav-btn.active{background:var(--blue-2);color:var(--blue)} .nav-dot{width:9px;height:9px;border-radius:50%;background:var(--blue)}
    .side-card{background:var(--panel-2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:10px}.side-row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}.side-row:last-child{margin-bottom:0}.side-k{font-size:13px;color:var(--muted)} .side-v{font-size:13px;font-weight:700}.main{flex:1;min-width:0;padding:18px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}.title h1{margin:0;font-size:28px;letter-spacing:-.03em}.title p{margin:6px 0 0;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.search{flex:1;min-width:220px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 12px}.select{background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 12px;min-width:180px}
    .btn{border:none;border-radius:12px;padding:11px 14px;cursor:pointer;font-weight:700}.btn.primary{background:var(--blue);color:#fff}.btn.secondary{background:#fff;border:1px solid var(--border);color:var(--text)} .btn.ghost{background:var(--panel-2);border:1px solid var(--border);color:var(--text)}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.metric{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow)}.metric .k{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;font-weight:800}.metric .v{margin-top:10px;font-size:30px;font-weight:800}.metric .s{margin-top:6px;color:var(--muted);font-size:13px}
    .layout{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}.today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)} .panel-head{padding:18px 18px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.panel-head h2{margin:0;font-size:18px}.panel-head p{margin:5px 0 0;color:var(--muted);font-size:14px}.panel-body{padding:0 18px 18px}
    .lane{border:1px solid var(--border);border-radius:16px;background:var(--panel-2);min-height:320px}.lane-head{padding:14px 14px 8px;border-bottom:1px solid var(--border)}.lane-head h3{margin:0;font-size:15px}.lane-head p{margin:5px 0 0;color:var(--muted);font-size:13px}.lane-body{padding:12px}
    .task{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(15,23,42,.04)} .task:last-child{margin-bottom:0}.task-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.task-title{font-weight:800;font-size:15px;line-height:1.35}.task-sub{margin-top:4px;color:var(--muted);font-size:13px}
    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;background:var(--chip);color:#334155}.badge.red{background:var(--red-2);color:var(--red)} .badge.amber{background:var(--amber-2);color:var(--amber)} .badge.green{background:var(--green-2);color:var(--green)} .badge.blue{background:var(--blue-2);color:var(--blue)}
    .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.meta .m{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:10px}.meta .m .mk{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:800}.meta .m .mv{margin-top:5px;font-size:13px;font-weight:700}
    .qa{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)} .qbtn{border:none;border-radius:10px;padding:8px 10px;cursor:pointer;font-weight:700;font-size:12px}
    .qbtn.done{background:var(--green-2);color:var(--green)} .qbtn.block{background:var(--red-2);color:var(--red)} .qbtn.tom{background:var(--amber-2);color:var(--amber)} .qbtn.time{background:var(--blue-2);color:var(--blue)} .qbtn.edit{background:#fff;border:1px solid var(--border);color:var(--text)}
    .score{min-width:74px;text-align:center;border:1px solid #cfe0ff;background:var(--blue-2);color:var(--blue);border-radius:14px;padding:10px 8px}.score b{display:block;font-size:24px;line-height:1}.score span{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .list{display:flex;flex-direction:column;gap:12px}.rank-row{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);background:#fff;border-radius:14px}.rank-num{width:56px;height:56px;border-radius:14px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800}
    .kcol{background:var(--panel-2);border:1px solid var(--border);border-radius:16px;min-height:300px}.khead{padding:14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#475569}.kbody{padding:12px}
    .initiative{padding:14px;border:1px solid var(--border);background:#fff;border-radius:14px;margin-bottom:12px}.initiative h4{margin:0 0 6px;font-size:16px}.initiative p{margin:0;color:var(--muted);font-size:13px}.initiative-foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .progress{height:10px;background:#edf2fa;border-radius:999px;overflow:hidden;margin-top:10px}.progress>div{height:100%;background:var(--blue);border-radius:999px}.empty{border:1px dashed var(--border);border-radius:14px;background:var(--panel-2);padding:22px;text-align:center;color:var(--muted)}
    .day-card,.month-cell{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;min-height:150px}.mini-task{padding:8px 10px;border-radius:10px;background:var(--panel-2);border:1px solid var(--border);font-size:12px;margin-bottom:8px}
    .row-card{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:14px;background:#fff;margin-bottom:10px}.row-card:last-child{margin-bottom:0}.row-left{min-width:0}.row-title{font-weight:800}.row-sub{font-size:13px;color:var(--muted);margin-top:3px}
    .inline-form{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px;border:1px solid var(--border);border-radius:14px;background:var(--panel-2);margin-bottom:16px}.inline-form input,.inline-form select{border:1px solid var(--border);border-radius:10px;padding:10px 11px;background:#fff}
    .report-box{border:1px solid var(--border);background:#fff;border-radius:16px;padding:18px;white-space:pre-wrap;line-height:1.55;font-size:14px}
    .report-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}

    .exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .exec-card{border:1px solid var(--border);border-radius:16px;background:#fff;padding:16px}
    .exec-card h3{margin:0 0 10px 0;font-size:16px}
    .exec-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.5}
    .exec-list{margin:0;padding-left:18px}
    .exec-list li{margin-bottom:8px}
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.36);z-index:30;display:none}.overlay.show{display:block}.mobile-toggle{display:none}
    .modal-wrap{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}.modal-wrap.show{display:flex}
    .modal{width:min(760px,100%);background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:0 18px 50px rgba(15,23,42,.22)} .modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modal-head h3{margin:0;font-size:20px}.modal-body{padding:20px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.06em}.field input,.field select,.field textarea{border:1px solid var(--border);border-radius:12px;padding:11px 12px;background:#fff}.field textarea{min-height:92px;resize:vertical}.field.full{grid-column:1/-1}.modal-actions{padding:0 20px 20px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    img{display:none !important}
    @media (max-width:1100px){.layout,.grid-2{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.today-grid,.kanban,.week-grid,.month-grid{grid-template-columns:1fr}}
    @media (max-width:820px){.app{display:block}.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:40;transition:.22s ease;width:min(300px,86vw)}.sidebar.open{transform:translateX(0)}.mobile-toggle{display:inline-flex}.main{padding:14px}.metrics{grid-template-columns:1fr}.meta{grid-template-columns:1fr}.rank-row{grid-template-columns:48px 1fr}.rank-row>:last-child{grid-column:2}.form-grid{grid-template-columns:1fr}.inline-form{flex-direction:column;align-items:stretch}}
  </style>
</head>
<body>
  <div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="brand-top"><div><div class="logo">BD<b>Flow</b></div><div class="sub">by Miguel Castillo</div></div><div class="version">Ver. 2.6</div></div></div>
      <div class="section-label">Navegación</div>
      <div class="nav">
        <button class="nav-btn active" data-view="dashboard"><span class="nav-dot"></span>Dashboard</button>
        <button class="nav-btn" data-view="today"><span class="nav-dot"></span>Hoy</button>
        <button class="nav-btn" data-view="week"><span class="nav-dot"></span>Semana</button>
        <button class="nav-btn" data-view="month"><span class="nav-dot"></span>Mes</button>
        <button class="nav-btn" data-view="ranking"><span class="nav-dot"></span>Ranking</button>
        <button class="nav-btn" data-view="kanban"><span class="nav-dot"></span>Kanban</button>
        <button class="nav-btn" data-view="initiatives"><span class="nav-dot"></span>Iniciativas</button>
        <button class="nav-btn" data-view="config"><span class="nav-dot"></span>Configuración</button>
        <button class="nav-btn" data-view="report"><span class="nav-dot"></span>Informe</button>
      </div>
      <div class="section-label">Resumen rápido</div><div class="side-card" id="quickSummary"></div>
      <div class="section-label">Capacidad diaria</div><div class="side-card"><div class="side-row"><div class="side-k">Horas objetivo</div><div class="side-v"><span id="dailyCapValue">6</span> h</div></div><input id="dailyCap" type="range" min="2" max="10" step="1" value="6" style="width:100%" /><div class="side-row" style="margin-top:10px"><div class="side-k">Uso recomendado</div><div class="side-v" id="dailyCapHint">Foco realista</div></div></div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="title"><h1 id="pageTitle">Dashboard</h1><p id="pageSubtitle">Decisión inmediata y riesgos del día.</p></div>
        <div class="actions">
          <button class="mobile-toggle btn secondary" onclick="toggleSidebar(true)">☰ Menú</button>
          <button class="btn secondary" onclick="openInitiativeModal()">+ Nueva iniciativa</button>
          <button class="btn primary" onclick="openTaskModal()">+ Nueva tarea</button>
          <input id="searchInput" class="search" placeholder="Buscar tareas, iniciativas, áreas..." />
          <select id="statusFilter" class="select"><option value="all">Todos los estados</option><option value="Pendiente">Pendiente</option><option value="En curso">En curso</option><option value="Bloqueada">Bloqueada</option><option value="En espera de terceros">En espera de terceros</option><option value="Finalizada">Finalizada</option></select>
        </div>
      </div>
      <section id="metricsSection" class="metrics"></section><div style="height:18px"></div><section id="viewContainer"></section>
    </main>
  </div>

  <div class="modal-wrap" id="taskModalWrap"><div class="modal"><div class="modal-head"><h3 id="taskModalTitle">Nueva tarea</h3><button class="btn secondary" onclick="closeTaskModal()">Cerrar</button></div><div class="modal-body"><div class="form-grid">
    <div class="field full"><label for="fTitle">Título</label><input id="fTitle" type="text" /></div>
    <div class="field full"><label for="fDesc">Descripción</label><textarea id="fDesc"></textarea></div>
    <div class="field"><label for="fArea">Área</label><select id="fArea"></select></div>
    <div class="field"><label for="fInitiative">Iniciativa</label><select id="fInitiative"></select></div>
    <div class="field"><label for="fStatus">Estado</label><select id="fStatus"><option>Pendiente</option><option>En curso</option><option>Bloqueada</option><option>En espera de terceros</option><option>Finalizada</option></select></div>
    <div class="field"><label for="fPriority">Prioridad</label><select id="fPriority"><option>Alta</option><option>Media</option><option>Baja</option></select></div>
    <div class="field"><label for="fDue">Fecha</label><input id="fDue" type="date" /></div>
    <div class="field"><label for="fEffort">Horas previstas</label><input id="fEffort" type="number" min="0" step="0.5" /></div>
    <div class="field"><label for="fSpent">Horas invertidas</label><input id="fSpent" type="number" min="0" step="0.5" /></div>
    <div class="field"><label for="fNext">Siguiente paso</label><input id="fNext" type="text" /></div>
  </div></div><div class="modal-actions"><div><button class="btn secondary" id="deleteTaskBtn" onclick="deleteCurrentTask()" style="display:none">Eliminar</button></div><div style="display:flex;gap:10px"><button class="btn secondary" onclick="closeTaskModal()">Cancelar</button><button class="btn primary" onclick="saveTask()">Guardar</button></div></div></div></div>

  <div class="modal-wrap" id="initiativeModalWrap"><div class="modal"><div class="modal-head"><h3 id="initiativeModalTitle">Nueva iniciativa</h3><button class="btn secondary" onclick="closeInitiativeModal()">Cerrar</button></div><div class="modal-body"><div class="form-grid">
    <div class="field full"><label for="iName">Nombre</label><input id="iName" type="text" /></div>
    <div class="field full"><label for="iObjective">Objetivo</label><textarea id="iObjective"></textarea></div>
    <div class="field"><label for="iOwner">Responsable / Área</label><select id="iOwner"></select></div>
    <div class="field"><label for="iStatus">Estado</label><select id="iStatus"><option>Pendiente</option><option>En curso</option><option>Bloqueada</option><option>Finalizada</option></select></div>
  </div></div><div class="modal-actions"><div><button class="btn secondary" id="deleteInitiativeBtn" onclick="deleteCurrentInitiative()" style="display:none">Eliminar</button></div><div style="display:flex;gap:10px"><button class="btn secondary" onclick="closeInitiativeModal()">Cancelar</button><button class="btn primary" onclick="saveInitiative()">Guardar</button></div></div></div></div>

<script>
const state={currentView:'dashboard',search:'',filterStatus:'all',dailyCapacity:6,editingTaskId:null,editingInitiativeId:null,
areas:['Ventas','Preventa','Marketing','Producto','Operaciones','Dirección','Partners'],
initiatives:[
{id:'i1',name:'Deal Bankinter HR Suite',owner:'Ventas',objective:'Cerrar oportunidad de 3.500 empleados',progress:62,status:'En curso'},
{id:'i2',name:'Go-to-Market RRHH 2026',owner:'Marketing',objective:'Activar narrativa y demanda para México',progress:41,status:'En curso'},
{id:'i3',name:'Integración Sage Payroll',owner:'Producto',objective:'Certificar integración bidireccional',progress:33,status:'Bloqueada'},
{id:'i4',name:'Onboarding Mutua Madrileña',owner:'Operaciones',objective:'Activar módulo Talent',progress:56,status:'En curso'},
{id:'i5',name:'Planning IA 2026-2028',owner:'Dirección',objective:'Cerrar business plan con narrativa sólida',progress:48,status:'En curso'},
{id:'i6',name:'Expansión Partner DACH',owner:'Partners',objective:'Conseguir 3 partners activos en Q2',progress:37,status:'Pendiente'}
],
tasks:[
{id:'t1',title:'Propuesta técnica Bankinter',desc:'Completar propuesta HR + Payroll y cerrar validación funcional.',area:'Preventa',initiativeId:'i1',status:'En curso',priority:'Alta',impact:92,urgency:88,criticality:90,blockRisk:70,due:'2026-04-13',effort:8,spent:3.5,next:'Completar sección de payroll y revisar pricing.'},
{id:'t2',title:'Preparar reunión México con Marketing',desc:'Alinear narrativa de negocio y campaña para reforma laboral.',area:'Marketing',initiativeId:'i2',status:'Pendiente',priority:'Alta',impact:84,urgency:80,criticality:74,blockRisk:40,due:'2026-04-12',effort:2,spent:0,next:'Definir 3 mensajes principales y propuesta de webinar.'},
{id:'t3',title:'Escalado integración Sage',desc:'Resolver timeout en lotes grandes con equipo de producto.',area:'Producto',initiativeId:'i3',status:'Bloqueada',priority:'Alta',impact:78,urgency:72,criticality:86,blockRisk:95,due:'2026-04-15',effort:5,spent:2,next:'Convocar revisión técnica con CTO y desarrollo.'},
{id:'t4',title:'Follow-up onboarding Mutua',desc:'Validar SSO y desbloquear despliegue semana 2.',area:'Operaciones',initiativeId:'i4',status:'En espera de terceros',priority:'Media',impact:72,urgency:60,criticality:75,blockRisk:66,due:'2026-04-14',effort:1.5,spent:0.5,next:'Llamar si no hay respuesta del equipo de IT.'},
{id:'t5',title:'Actualizar business case planificación',desc:'Revisar impacto económico y narrativa de expansión.',area:'Dirección',initiativeId:'i5',status:'En curso',priority:'Alta',impact:88,urgency:68,criticality:82,blockRisk:55,due:'2026-04-16',effort:4,spent:1.5,next:'Pulir mensaje para comité y ordenar supuestos.'},
{id:'t6',title:'Revisión pipeline partners Q2',desc:'Identificar bloqueos comerciales y priorizar acompañamiento.',area:'Partners',initiativeId:'i6',status:'Pendiente',priority:'Media',impact:70,urgency:58,criticality:64,blockRisk:35,due:'2026-04-17',effort:3,spent:0,next:'Separar quick wins de acciones estructurales.'}
]};
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
function getInitiativeName(id){const i=state.initiatives.find(x=>x.id===id);return i?i.name:'Sin iniciativa';}
function parseDate(s){return new Date(s+'T12:00:00');}
function daysToDue(task){const today=new Date();today.setHours(0,0,0,0);const due=parseDate(task.due);due.setHours(0,0,0,0);return Math.round((due-today)/86400000);}
function deriveMetrics(task){const p=task.priority==='Alta'?20:task.priority==='Media'?10:0;const s=task.status==='Bloqueada'?18:task.status==='En curso'?10:0;const d=daysToDue(task);task.impact=Math.min(95,55+p+Math.min(15,Math.max(0,task.effort-task.spent)*2));task.urgency=d<=0?95:d===1?88:d<=3?76:60;task.criticality=Math.min(95,50+p+s);task.blockRisk=task.status==='Bloqueada'?95:task.status==='En espera de terceros'?70:40;}
function scoreTask(task){const d=daysToDue(task);const dueBias=d<0?100:d===0?96:d===1?90:d<=3?78:55;return Math.max(1,Math.min(100,Math.round((task.impact*.30+task.urgency*.22+task.criticality*.22+task.blockRisk*.12+dueBias*.14)+(task.status==='Finalizada'?-30:0)+(task.status==='En espera de terceros'?-10:0)+(task.status==='Bloqueada'?8:0))));}
function filteredTasks(){return state.tasks.filter(t=>{const h=[t.title,t.desc,t.area,getInitiativeName(t.initiativeId),t.next,t.status].join(' ').toLowerCase();return(!state.search||h.includes(state.search.toLowerCase()))&&(state.filterStatus==='all'||t.status===state.filterStatus);}).map(t=>({...t,initiative:getInitiativeName(t.initiativeId),score:scoreTask(t),daysLeft:daysToDue(t)})).sort((a,b)=>b.score-a.score);}
function allTasks(){state.tasks.forEach(deriveMetrics);return state.tasks.map(t=>({...t,initiative:getInitiativeName(t.initiativeId),score:scoreTask(t),daysLeft:daysToDue(t)})).sort((a,b)=>b.score-a.score);}
function kpiData(tasks){return{total:tasks.filter(t=>t.status!=='Finalizada').length,critical:tasks.filter(t=>t.score>=85&&t.status!=='Finalizada').length,blocked:tasks.filter(t=>t.status==='Bloqueada').length,due48:tasks.filter(t=>t.status!=='Finalizada'&&t.daysLeft<=2).length};}
function badgeDue(task){if(task.daysLeft<0)return'<span class="badge red">Vencida</span>';if(task.daysLeft===0)return'<span class="badge red">Vence hoy</span>';if(task.daysLeft===1)return'<span class="badge amber">Vence mañana</span>';if(task.daysLeft<=3)return'<span class="badge amber">En '+task.daysLeft+' días</span>';return'<span class="badge green">'+task.daysLeft+' días</span>';}
function statusBadge(status){const map={'Pendiente':['blue','Pendiente'],'En curso':['green','En curso'],'Bloqueada':['red','Bloqueada'],'En espera de terceros':['amber','En espera'],'Finalizada':['green','Finalizada']};const f=map[status]||['blue',status];return'<span class="badge '+f[0]+'">'+escapeHtml(f[1])+'</span>';}
function taskCard(task){return`<article class="task"><div class="task-top"><div style="min-width:0"><div class="task-title">${escapeHtml(task.title)}</div><div class="task-sub">${escapeHtml(task.desc)}</div></div><div class="score"><b>${task.score}</b><span>Score</span></div></div><div class="badges">${statusBadge(task.status)}${badgeDue(task)}<span class="badge">${escapeHtml(task.area)}</span><span class="badge">${escapeHtml(task.initiative)}</span></div><div class="meta"><div class="m"><div class="mk">Siguiente paso</div><div class="mv">${escapeHtml(task.next)}</div></div><div class="m"><div class="mk">Horas</div><div class="mv">${task.spent}h / ${task.effort}h</div></div><div class="m"><div class="mk">Prioridad</div><div class="mv">${escapeHtml(task.priority)}</div></div></div><div class="qa"><button class="qbtn done" onclick="quickDone('${task.id}')">✓ Finalizar</button><button class="qbtn block" onclick="quickBlock('${task.id}')">⛔ Bloquear</button><button class="qbtn tom" onclick="quickTomorrow('${task.id}')">Mañana</button><button class="qbtn time" onclick="quickAddTime('${task.id}',0.5)">+30m</button><button class="qbtn time" onclick="quickAddTime('${task.id}',1)">+1h</button><button class="qbtn edit" onclick="openTaskModal('${task.id}')">Editar</button></div></article>`;}
function renderMetrics(tasks){const k=kpiData(tasks);document.getElementById('metricsSection').innerHTML=`<div class="metric"><div class="k">Tareas activas</div><div class="v">${k.total}</div><div class="s">Carga operativa abierta</div></div><div class="metric"><div class="k">Críticas</div><div class="v">${k.critical}</div><div class="s">Piden foco hoy</div></div><div class="metric"><div class="k">Bloqueadas</div><div class="v">${k.blocked}</div><div class="s">Necesitan desbloqueo</div></div><div class="metric"><div class="k">Estructura</div><div class="v">${state.initiatives.length}/${state.areas.length}</div><div class="s">Iniciativas / áreas</div></div>`;document.getElementById('quickSummary').innerHTML=`<div class="side-row"><div class="side-k">Foco del día</div><div class="side-v">${Math.min(k.critical,3)} tareas</div></div><div class="side-row"><div class="side-k">En riesgo</div><div class="side-v">${k.blocked+k.due48}</div></div><div class="side-row"><div class="side-k">Capacidad</div><div class="side-v">${state.dailyCapacity} h</div></div><div class="side-row"><div class="side-k">Áreas activas</div><div class="side-v">${state.areas.length}</div></div>`;}
function renderDashboard(tasks){const mainTask=tasks.find(t=>t.status!=='Finalizada');const risks=tasks.filter(t=>t.status==='Bloqueada'||t.daysLeft<=1).slice(0,3);return`<div class="layout"><div class="panel"><div class="panel-head"><div><h2>🔥 Qué hacer ahora</h2><p>La decisión ya está tomada. Solo ejecuta.</p></div></div><div class="panel-body">${mainTask?`<div class="task" style="border:2px solid #1a56db"><div class="task-top"><div style="min-width:0"><div class="task-title" style="font-size:19px">${escapeHtml(mainTask.title)}</div><div class="task-sub">${escapeHtml(mainTask.desc)}</div></div><div class="score"><b>${mainTask.score}</b><span>Score</span></div></div><div class="badges">${statusBadge(mainTask.status)}${badgeDue(mainTask)}<span class="badge">${escapeHtml(mainTask.area)}</span><span class="badge">${escapeHtml(mainTask.initiative)}</span></div><div class="meta"><div class="m"><div class="mk">Siguiente paso</div><div class="mv">${escapeHtml(mainTask.next)}</div></div><div class="m"><div class="mk">Horas</div><div class="mv">${mainTask.spent}h / ${mainTask.effort}h</div></div><div class="m"><div class="mk">Prioridad</div><div class="mv">${escapeHtml(mainTask.priority)}</div></div></div><div class="qa"><button class="qbtn done" onclick="quickDone('${mainTask.id}')">✓ Hecho</button><button class="qbtn block" onclick="quickBlock('${mainTask.id}')">⛔ Bloquear</button><button class="qbtn time" onclick="quickAddTime('${mainTask.id}',1)">+1h</button><button class="qbtn edit" onclick="openTaskModal('${mainTask.id}')">Editar</button></div></div>`:'<div class="empty">No hay tareas activas.</div>'}</div></div><div class="panel"><div class="panel-head"><div><h2>⚠️ Riesgos</h2><p>Lo que te puede romper el día</p></div></div><div class="panel-body">${risks.length?risks.map(t=>`<div class="task"><div class="task-title">${escapeHtml(t.title)}</div><div class="task-sub">${escapeHtml(t.desc)}</div><div class="badges">${statusBadge(t.status)}${badgeDue(t)}</div></div>`).join(''):'<div class="empty">Sin riesgos críticos.</div>'}</div></div></div>`;}
function renderToday(tasks){const active=tasks.filter(t=>t.status!=='Finalizada');const critical=active.filter(t=>t.score>=85).slice(0,4);const important=active.filter(t=>t.score>=70&&t.score<85).slice(0,4);const optional=active.filter(t=>t.score<70).slice(0,4);return`<div class="today-grid"><div class="lane"><div class="lane-head"><h3>Crítico</h3><p>Sí o sí hoy.</p></div><div class="lane-body">${critical.length?critical.map(taskCard).join(''):'<div class="empty">Nada crítico ahora mismo.</div>'}</div></div><div class="lane"><div class="lane-head"><h3>Importante</h3><p>Debe avanzar hoy.</p></div><div class="lane-body">${important.length?important.map(taskCard).join(''):'<div class="empty">No hay tareas importantes.</div>'}</div></div><div class="lane"><div class="lane-head"><h3>Opcional</h3><p>Hazlo si mantienes margen.</p></div><div class="lane-body">${optional.length?optional.map(taskCard).join(''):'<div class="empty">Sin opcionales.</div>'}</div></div></div>`;}
function renderWeek(tasks){const labels=['Lunes','Martes','Miércoles','Jueves','Viernes'];const groups=[[],[],[],[],[]];tasks.filter(t=>t.status!=='Finalizada').forEach((t,i)=>groups[i%5].push(t));return`<div class="panel"><div class="panel-head"><div><h2>Semana</h2><p>Distribución operativa de carga y compromisos.</p></div></div><div class="panel-body"><div class="week-grid">${labels.map((d,i)=>`<div class="day-card"><h4>${d}</h4><div class="badges" style="margin-bottom:10px"><span class="badge blue">${groups[i].length} tareas</span></div>${groups[i].length?groups[i].map(t=>`<div class="mini-task"><strong>${escapeHtml(t.title)}</strong><br><span style="color:var(--muted)">${escapeHtml(t.initiative)}</span></div>`).join(''):'<div class="empty" style="padding:14px">Sin carga</div>'}</div>`).join('')}</div></div></div>`;}
function renderMonth(tasks){const days=Array.from({length:28},(_,i)=>i+1);return`<div class="panel"><div class="panel-head"><div><h2>Mes</h2><p>Visión táctica de hitos y vencimientos.</p></div></div><div class="panel-body"><div class="month-grid">${days.map(d=>{const picks=tasks.filter((t,i)=>(i+d)%11===0).slice(0,1);return`<div class="month-cell"><h4>${d}</h4>${picks.length?picks.map(t=>`<div class="mini-task"><strong>${escapeHtml(t.title)}</strong></div>`).join(''):'<div style="color:var(--muted);font-size:12px">—</div>'}</div>`;}).join('')}</div></div></div>`;}
function renderRanking(tasks){return`<div class="panel"><div class="panel-head"><div><h2>Ranking completo</h2><p>Con títulos visibles y siguiente paso.</p></div></div><div class="panel-body"><div class="list">${tasks.map((t,i)=>`<div class="rank-row"><div class="rank-num">${i+1}</div><div><div class="row-title">${escapeHtml(t.title)}</div><div class="row-sub">${escapeHtml(t.desc)}</div><div class="badges" style="margin-top:8px">${statusBadge(t.status)}${badgeDue(t)}<span class="badge">${escapeHtml(t.area)}</span><span class="badge">${escapeHtml(t.initiative)}</span></div></div><div><div class="badge blue" style="margin-bottom:8px">Score ${t.score}</div><div style="font-size:13px;color:var(--muted);max-width:240px">${escapeHtml(t.next)}</div></div></div>`).join('')}</div></div></div>`;}
function renderKanban(tasks){const cols=['Pendiente','En curso','Bloqueada','Finalizada'];return`<div class="panel"><div class="panel-head"><div><h2>Kanban</h2><p>Vista operativa por estado.</p></div></div><div class="panel-body"><div class="kanban">${cols.map(col=>`<div class="kcol"><div class="khead">${col}</div><div class="kbody">${tasks.filter(t=>t.status===col).length?tasks.filter(t=>t.status===col).map(taskCard).join(''):'<div class="empty">Sin tareas</div>'}</div></div>`).join('')}</div></div></div>`;}
function recalcInitiativeProgress(id){const its=state.tasks.filter(t=>t.initiativeId===id);if(!its.length)return 0;const done=its.filter(t=>t.status==='Finalizada').length;return Math.round((done/its.length)*100);}
function renderInitiatives(){return`<div class="panel"><div class="panel-head"><div><h2>Iniciativas</h2><p>Las iniciativas recogen tareas y se crean pocas veces.</p></div></div><div class="panel-body">${state.initiatives.map(i=>{const linked=state.tasks.filter(t=>t.initiativeId===i.id);const blocked=linked.filter(t=>t.status==='Bloqueada').length;return`<div class="initiative"><h4>${escapeHtml(i.name)}</h4><p>${escapeHtml(i.objective)}</p><div class="initiative-foot"><span class="badge">${escapeHtml(i.owner)}</span>${statusBadge(i.status)}<span class="badge blue">${linked.length} tareas</span><span class="badge ${blocked?'red':'green'}">${blocked?blocked+' bloqueadas':'Sin bloqueos'}</span></div><div class="progress"><div style="width:${recalcInitiativeProgress(i.id)}%"></div></div><div class="qa"><button class="qbtn edit" onclick="openInitiativeModal('${i.id}')">Editar iniciativa</button><button class="qbtn time" onclick="openTaskModal(null,'${i.id}')">+ Nueva tarea</button></div><div style="margin-top:12px">${linked.length?linked.map(t=>`<div class="mini-task"><strong>${escapeHtml(t.title)}</strong><br><span style="color:var(--muted)">${escapeHtml(t.status)} · ${escapeHtml(t.area)}</span></div>`).join(''):'<div class="empty" style="padding:14px">Sin tareas asociadas</div>'}</div></div>`;}).join('')}</div></div>`;}
function renderConfig(){return`<div class="grid-2"><div class="panel"><div class="panel-head"><div><h2>Áreas</h2><p>Configuración rápida. Se usan luego en tareas e iniciativas.</p></div></div><div class="panel-body"><div class="inline-form"><input id="newAreaInput" placeholder="Nueva área" /><button class="btn primary" onclick="addArea()">Añadir área</button></div>${state.areas.map((a,i)=>`<div class="row-card"><div class="row-left"><div class="row-title">${escapeHtml(a)}</div><div class="row-sub">${state.tasks.filter(t=>t.area===a).length} tareas · ${state.initiatives.filter(x=>x.owner===a).length} iniciativas</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" onclick="renameArea(${i})">Renombrar</button><button class="btn secondary" onclick="deleteArea(${i})">Eliminar</button></div></div>`).join('')}</div></div><div class="panel"><div class="panel-head"><div><h2>Iniciativas</h2><p>Gestión rápida para estructurar el trabajo antes de reportar.</p></div></div><div class="panel-body"><div class="inline-form"><input id="quickInitiativeName" placeholder="Nueva iniciativa" /><select id="quickInitiativeOwner">${state.areas.map(a=>`<option>${escapeHtml(a)}</option>`).join('')}</select><button class="btn primary" onclick="quickAddInitiative()">Añadir iniciativa</button></div>${state.initiatives.map(i=>`<div class="row-card"><div class="row-left"><div class="row-title">${escapeHtml(i.name)}</div><div class="row-sub">${escapeHtml(i.owner)} · ${state.tasks.filter(t=>t.initiativeId===i.id).length} tareas</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" onclick="openInitiativeModal('${i.id}')">Editar</button></div></div>`).join('')}</div></div></div>`;}
function buildExecutiveReport(){
  const tasks=allTasks();
  const activeInitiatives=state.initiatives.filter(i=>i.status!=='Finalizada');
  const blockedTasks=tasks.filter(t=>t.status==='Bloqueada');
  const dueSoon=tasks.filter(t=>t.status!=='Finalizada'&&t.daysLeft<=3);
  let txt='';
  txt+='INFORME EJECUTIVO BDFlow\n';
  txt+='Fecha: '+new Date().toLocaleDateString('es-ES')+'\n\n';
  txt+='RESUMEN GLOBAL\n';
  txt+='- Iniciativas activas: '+activeInitiatives.length+'\n';
  txt+='- Tareas activas: '+tasks.filter(t=>t.status!=='Finalizada').length+'\n';
  txt+='- Tareas bloqueadas: '+blockedTasks.length+'\n';
  txt+='- Vencimientos próximos (<= 3 días): '+dueSoon.length+'\n\n';
  txt+='INICIATIVAS\n';
  state.initiatives.forEach(i=>{
    const linked=tasks.filter(t=>t.initiativeId===i.id);
    const blocked=linked.filter(t=>t.status==='Bloqueada');
    const pending=linked.filter(t=>t.status!=='Finalizada');
    txt+='• '+i.name+'\n';
    txt+='  Objetivo: '+i.objective+'\n';
    txt+='  Responsable / Área: '+i.owner+'\n';
    txt+='  Estado: '+i.status+'\n';
    txt+='  Progreso: '+recalcInitiativeProgress(i.id)+'%\n';
    txt+='  Tareas activas: '+pending.length+' | Bloqueadas: '+blocked.length+'\n';
    if(linked.length){
      txt+='  Tareas clave:\n';
      linked.slice().sort((a,b)=>b.score-a.score).slice(0,4).forEach(t=>{
        txt+='   - '+t.title+' | '+t.status+' | Fecha: '+t.due+' | Siguiente paso: '+t.next+'\n';
      });
    }else{
      txt+='  Tareas clave: sin tareas asociadas.\n';
    }
    txt+='\n';
  });
  txt+='RIESGOS PRINCIPALES\n';
  if(blockedTasks.length===0 && dueSoon.length===0){
    txt+='- No se identifican riesgos críticos inmediatos.\n';
  } else {
    blockedTasks.slice(0,5).forEach(t=>{txt+='- Bloqueo: '+t.title+' ('+t.initiative+')\n';});
    dueSoon.slice(0,5).forEach(t=>{txt+='- Vencimiento próximo: '+t.title+' ('+t.due+')\n';});
  }
  return txt.trim();
}

  const report=buildExecutiveReport();

    <div class="panel">
      <div class="panel-head"><div><h2>Resumen para comité</h2><p>Versión más ejecutiva y orientada a decisión.</p></div></div>
      <div class="panel-body">

function render(){state.tasks.forEach(deriveMetrics);const tasks=filteredTasks();renderMetrics(tasks);const titles={dashboard:['Dashboard','Decisión inmediata y riesgos del día.'],today:['Hoy','Plan de trabajo realista.'],week:['Semana','Carga operativa distribuida por día.'],month:['Mes','Visión táctica de hitos y vencimientos.'],ranking:['Ranking','Priorización visible y ordenada.'],kanban:['Kanban','Seguimiento operativo por estado.'],initiatives:['Iniciativas','Contenedores de trabajo que agrupan tareas.'],config:['Configuración','Áreas e iniciativas gestionadas de forma rápida.'],report:['Informe','Versión comité y resumen ejecutivo listo para compartir.']};document.getElementById('pageTitle').textContent=titles[state.currentView][0];document.getElementById('pageSubtitle').textContent=titles[state.currentView][1];document.getElementById('viewContainer').innerHTML=state.currentView==='dashboard'?renderDashboard(tasks):state.currentView==='today'?renderToday(tasks):state.currentView==='week'?renderWeek(tasks):state.currentView==='month'?renderMonth(tasks):state.currentView==='ranking'?renderRanking(tasks):state.currentView==='kanban'?renderKanban(tasks):state.currentView==='initiatives'?renderInitiatives():state.currentView==='config'?renderConfig():renderReport();document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===state.currentView));saveState();}
function saveState(){localStorage.setItem('bdflow_v26_state',JSON.stringify({tasks:state.tasks,initiatives:state.initiatives,areas:state.areas,dailyCapacity:state.dailyCapacity}));}
function loadState(){try{const raw=localStorage.getItem('bdflow_v26_state');if(!raw)return;const p=JSON.parse(raw);if(Array.isArray(p.tasks))state.tasks=p.tasks;if(Array.isArray(p.initiatives))state.initiatives=p.initiatives;if(Array.isArray(p.areas))state.areas=p.areas;if(typeof p.dailyCapacity==='number')state.dailyCapacity=p.dailyCapacity;}catch(e){}}
function quickDone(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.status='Finalizada';t.spent=Math.max(t.spent,t.effort);render();}
function quickBlock(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.status=t.status==='Bloqueada'?'En curso':'Bloqueada';render();}
function quickTomorrow(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;const d=parseDate(t.due);d.setDate(d.getDate()+1);t.due=d.toISOString().slice(0,10);render();}
function quickAddTime(id,h){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.spent=Math.round((t.spent+h)*10)/10;if(t.status==='Pendiente')t.status='En curso';render();}
function toggleSidebar(open){document.getElementById('sidebar').classList.toggle('open',open);document.getElementById('overlay').classList.toggle('show',open);}
function refreshAreaOptions(selected=''){const s=document.getElementById('fArea');if(s)s.innerHTML=state.areas.map(a=>`<option value="${escapeHtml(a)}" ${a===selected?'selected':''}>${escapeHtml(a)}</option>`).join('');const io=document.getElementById('iOwner');if(io)io.innerHTML=state.areas.map(a=>`<option value="${escapeHtml(a)}" ${a===selected?'selected':''}>${escapeHtml(a)}</option>`).join('');}
function refreshInitiativeOptions(selectedId=''){const s=document.getElementById('fInitiative');if(s)s.innerHTML=state.initiatives.map(i=>`<option value="${i.id}" ${i.id===selectedId?'selected':''}>${escapeHtml(i.name)}</option>`).join('');}
function openTaskModal(taskId=null,initiativeId=''){state.editingTaskId=taskId;document.getElementById('taskModalWrap').classList.add('show');const t=taskId?state.tasks.find(x=>x.id===taskId):null;document.getElementById('taskModalTitle').textContent=t?'Editar tarea':'Nueva tarea';document.getElementById('deleteTaskBtn').style.display=t?'inline-flex':'none';document.getElementById('fTitle').value=t?t.title:'';document.getElementById('fDesc').value=t?t.desc:'';refreshAreaOptions(t?t.area:state.areas[0]||'');refreshInitiativeOptions(t?t.initiativeId:initiativeId||state.initiatives[0]?.id||'');document.getElementById('fStatus').value=t?t.status:'Pendiente';document.getElementById('fPriority').value=t?t.priority:'Alta';document.getElementById('fDue').value=t?t.due:new Date().toISOString().slice(0,10);document.getElementById('fEffort').value=t?t.effort:1;document.getElementById('fSpent').value=t?t.spent:0;document.getElementById('fNext').value=t?t.next:'Definir siguiente paso.';}
function closeTaskModal(){document.getElementById('taskModalWrap').classList.remove('show');state.editingTaskId=null;}
function saveTask(){if(!state.initiatives.length){alert('Crea antes una iniciativa.');return;}if(!state.areas.length){alert('Crea antes un área.');return;}const title=document.getElementById('fTitle').value.trim();if(!title){alert('El título es obligatorio.');return;}const task={id:state.editingTaskId||('t'+Date.now()),title,desc:document.getElementById('fDesc').value.trim(),area:document.getElementById('fArea').value,initiativeId:document.getElementById('fInitiative').value,status:document.getElementById('fStatus').value,priority:document.getElementById('fPriority').value,due:document.getElementById('fDue').value||new Date().toISOString().slice(0,10),effort:Number(document.getElementById('fEffort').value||0),spent:Number(document.getElementById('fSpent').value||0),next:document.getElementById('fNext').value.trim()||'Definir siguiente paso.',impact:70,urgency:70,criticality:70,blockRisk:40};deriveMetrics(task);const idx=state.tasks.findIndex(x=>x.id===task.id);if(idx>=0)state.tasks[idx]=task;else state.tasks.unshift(task);closeTaskModal();render();}
function deleteCurrentTask(){if(!state.editingTaskId)return;state.tasks=state.tasks.filter(x=>x.id!==state.editingTaskId);closeTaskModal();render();}
function openInitiativeModal(id=null){state.editingInitiativeId=id;document.getElementById('initiativeModalWrap').classList.add('show');const i=id?state.initiatives.find(x=>x.id===id):null;document.getElementById('initiativeModalTitle').textContent=i?'Editar iniciativa':'Nueva iniciativa';document.getElementById('deleteInitiativeBtn').style.display=i?'inline-flex':'none';document.getElementById('iName').value=i?i.name:'';document.getElementById('iObjective').value=i?i.objective:'';refreshAreaOptions(i?i.owner:state.areas[0]||'');document.getElementById('iStatus').value=i?i.status:'Pendiente';}
function closeInitiativeModal(){document.getElementById('initiativeModalWrap').classList.remove('show');state.editingInitiativeId=null;}
function saveInitiative(){const name=document.getElementById('iName').value.trim();if(!name){alert('El nombre es obligatorio.');return;}const initiative={id:state.editingInitiativeId||('i'+Date.now()),name,objective:document.getElementById('iObjective').value.trim()||'Sin objetivo definido.',owner:document.getElementById('iOwner').value||state.areas[0]||'General',status:document.getElementById('iStatus').value,progress:0};const idx=state.initiatives.findIndex(x=>x.id===initiative.id);if(idx>=0){initiative.progress=state.initiatives[idx].progress;state.initiatives[idx]=initiative;}else state.initiatives.unshift(initiative);closeInitiativeModal();render();}
function deleteCurrentInitiative(){if(!state.editingInitiativeId)return;const linked=state.tasks.filter(t=>t.initiativeId===state.editingInitiativeId).length;if(linked){alert('No puedes eliminar una iniciativa con tareas asociadas.');return;}state.initiatives=state.initiatives.filter(x=>x.id!==state.editingInitiativeId);closeInitiativeModal();render();}
function addArea(){const el=document.getElementById('newAreaInput');if(!el)return;const name=el.value.trim();if(!name)return;if(state.areas.includes(name)){alert('Esa área ya existe.');return;}state.areas.push(name);el.value='';render();}
function renameArea(index){const current=state.areas[index];const next=prompt('Nuevo nombre del área:', current);if(!next||next.trim()===current)return;const clean=next.trim();if(state.areas.includes(clean)){alert('Ya existe un área con ese nombre.');return;}state.tasks.forEach(t=>{if(t.area===current)t.area=clean;});state.initiatives.forEach(i=>{if(i.owner===current)i.owner=clean;});state.areas[index]=clean;render();}
function deleteArea(index){const name=state.areas[index];const usedTasks=state.tasks.some(t=>t.area===name);const usedInitiatives=state.initiatives.some(i=>i.owner===name);if(usedTasks||usedInitiatives){alert('No puedes eliminar un área que esté en uso por tareas o iniciativas.');return;}state.areas.splice(index,1);render();}
function quickAddInitiative(){const nameEl=document.getElementById('quickInitiativeName');const ownerEl=document.getElementById('quickInitiativeOwner');if(!nameEl||!ownerEl)return;const name=nameEl.value.trim();if(!name)return;state.initiatives.unshift({id:'i'+Date.now(),name,owner:ownerEl.value,objective:'Sin objetivo definido.',progress:0,status:'Pendiente'});nameEl.value='';render();}
function copyExecutiveReport(){navigator.clipboard.writeText(buildExecutiveReport()).then(()=>alert('Informe copiado al portapapeles.'));}
function downloadExecutiveReport(){const text=buildExecutiveReport();const blob=new Blob([text],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='BDFlow_informe_ejecutivo.txt';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
window.quickDone=quickDone;window.quickBlock=quickBlock;window.quickTomorrow=quickTomorrow;window.quickAddTime=quickAddTime;window.toggleSidebar=toggleSidebar;window.openTaskModal=openTaskModal;window.closeTaskModal=closeTaskModal;window.saveTask=saveTask;window.deleteCurrentTask=deleteCurrentTask;window.openInitiativeModal=openInitiativeModal;window.closeInitiativeModal=closeInitiativeModal;window.saveInitiative=saveInitiative;window.deleteCurrentInitiative=deleteCurrentInitiative;window.addArea=addArea;window.renameArea=renameArea;window.deleteArea=deleteArea;window.quickAddInitiative=quickAddInitiative;window.copyExecutiveReport=copyExecutiveReport;window.downloadExecutiveReport=downloadExecutiveReport;
document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{state.currentView=btn.dataset.view;render();if(window.innerWidth<=820)toggleSidebar(false);}));
document.getElementById('searchInput').addEventListener('input',e=>{state.search=e.target.value.trim();render();});
document.getElementById('statusFilter').addEventListener('change',e=>{state.filterStatus=e.target.value;render();});
document.getElementById('dailyCap').addEventListener('input',e=>{state.dailyCapacity=Number(e.target.value);document.getElementById('dailyCapValue').textContent=state.dailyCapacity;document.getElementById('dailyCapHint').textContent=state.dailyCapacity<=4?'Muy exigente':state.dailyCapacity<=6?'Foco realista':'Riesgo de sobrecarga';render();});
loadState();document.getElementById('dailyCap').value=state.dailyCapacity;document.getElementById('dailyCapValue').textContent=state.dailyCapacity;document.getElementById('dailyCapHint').textContent=state.dailyCapacity<=4?'Muy exigente':state.dailyCapacity<=6?'Foco realista':'Riesgo de sobrecarga';render();
</script>
