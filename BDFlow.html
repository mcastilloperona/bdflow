.btn:hover{background:var(--bg3)}

.sitem.on{background:var(--blue-bg);color:var(--blue);font-weight:600}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

  return fetch(SB_URL+'/rest/v1/'+table+'?select=*', {headers:sbHeaders()})

// ===== SYNC STATUS =====
function setSyncStatus(s) {
  var el = document.getElementById('sync-status');
  if (!el) return;
  if (s === 'ok') { el.className='sync-ok'; el.textContent='● Sincronizado'; }
  else if (s === 'saving') { el.className='sync-saving'; el.textContent='● Guardando...'; }
  else { el.className='sync-err'; el.textContent='● Error de red'; }
}

// ===== CLOUD SAVE =====
function saveTask(t) {
  setSyncStatus('saving');
  return sbUpsert('tasks', {id:t.id, data:t})
    .then(function(){setSyncStatus('ok');})
    .catch(function(){setSyncStatus('err');});
}
function saveInitiative(ini) {
  setSyncStatus('saving');
  return sbUpsert('initiatives', {id:ini.id, data:ini})
    .then(function(){setSyncStatus('ok');})
    .catch(function(){setSyncStatus('err');});
}
function saveSettings() {
  setSyncStatus('saving');
  return Promise.all([
    sbUpsert('settings', {key:'areas', value:AREAS}),
    sbUpsert('settings', {key:'capacity', value:CAP})
  ]).then(function(){setSyncStatus('ok');})
    .catch(function(){setSyncStatus('err');});
}

    sbGet('settings')
  ]).then(function(results) {
    var tRows = results[0], iRows = results[1], sRows = results[2];
    if (Array.isArray(tRows)) tasks = tRows.map(function(r){return r.data;}).filter(Boolean);
    if (Array.isArray(iRows)) initiatives = iRows.map(function(r){return r.data;}).filter(Boolean);
    if (Array.isArray(sRows)) {
      sRows.forEach(function(r) {
        if (r.key === 'areas' && Array.isArray(r.value) && r.value.length) AREAS = r.value;
        if (r.key === 'capacity') { CAP = parseInt(r.value) || 6; var el=document.getElementById('cap-input');if(el)el.value=CAP; }
      });
    }
    setSyncStatus('ok');
    redraw();
  }).catch(function(e) {
    console.warn('load error', e);
    setSyncStatus('err');
    redraw();
  });
}

function loadDemo() {
  if (!confirm('Cargar datos de ejemplo. Esto reemplazará los datos actuales en la nube. ¿Continuar?')) return;
  setSyncStatus('saving');
  var allOps = DEMO_TASKS.map(function(t){return sbUpsert('tasks',{id:t.id,data:t});})
    .concat(DEMO_INI.map(function(i){return sbUpsert('initiatives',{id:i.id,data:i});}));
  Promise.all(allOps).then(function(){
    tasks = JSON.parse(JSON.stringify(DEMO_TASKS));
    initiatives = JSON.parse(JSON.stringify(DEMO_INI));
    setSyncStatus('ok');
    redraw();
    toast('Datos demo cargados ✓');
  }).catch(function(){setSyncStatus('err');});
}

function clearAll() {
  if (!confirm('Borrar TODOS los datos de la nube. ¿Continuar?')) return;
  setSyncStatus('saving');
  var delOps = tasks.map(function(t){return sbDelete('tasks',t.id);})
    .concat(initiatives.map(function(i){return sbDelete('initiatives',i.id);}));
  Promise.all(delOps).then(function(){
    tasks=[];initiatives=[];setSyncStatus('ok');redraw();toast('Datos borrados');
  }).catch(function(){setSyncStatus('err');});
}

function setCap(v) {
  CAP = parseInt(v)||6;

// ===== TOAST =====
function toast(msg) {
  var old=document.getElementById('toast');if(old)old.remove();
  var el=document.createElement('div');el.id='toast';
  el.style.cssText='position:fixed;bottom:24px;right:24px;background:#185fa5;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2)';

// ===== HELPERS =====
function score(t) {
  var im={Alto:3,Medio:2,Bajo:1},pr={Alta:3,Media:2,Baja:1};
  var td=new Date();td.setHours(0,0,0,0);
  var due=new Date(t.dd+'T12:00:00');due.setHours(0,0,0,0);
  var d=Math.ceil((due-td)/86400000);
  var urg=d<=2?3:d<=7?2:1;
  var blk=t.status==='Bloqueada'?3:t.status==='En espera de terceros'?2:1;
  var dep=(t.deps&&t.deps.trim())?2:1;
  var vis=t.exec?2:1;
  return (im[t.impact]||1)*.30+urg*.20+(pr[t.crit]||1)*.20+blk*.15+dep*.10+vis*.05;
}
function scoreN(t){return Math.round(score(t)*100/3);}
function srt(arr){return arr.slice().sort(function(a,b){return score(b)-score(a);});}
function today(){var d=new Date();d.setHours(0,0,0,0);return d;}
function dd(s){var d=new Date(s+'T12:00:00');d.setHours(0,0,0,0);return d;}
function dl(s){return Math.ceil((dd(s)-today())/86400000);}
function overdue(t){return t.status!=='Finalizada'&&dl(t.dd)<0;}
function thisWeek(t){var d=dl(t.dd);return d>=0&&d<=7&&t.status!=='Finalizada';}
function getIni(id){for(var i=0;i<initiatives.length;i++){if(initiatives[i].id===id)return initiatives[i];}return{name:'Sin iniciativa',type:''};}
function fmt(s){if(!s)return'—';var d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function aclr(a){var def={Ventas:'#3b6d11',Preventa:'#ba7517',Producto:'#534ab7',Marketing:'#993c1d',Partners:'#0f6e56',Dirección:'#e24b4a',Operaciones:'#8a8a84'};if(def[a])return def[a];var i=AREAS.indexOf(a);return AREA_PALETTE[i%AREA_PALETTE.length]||'#185fa5';}
function filtered(){
  var t=tasks.slice();
  if(areaFilter!=='all')t=t.filter(function(x){return x.area===areaFilter;});
  if(statusFilter)t=t.filter(function(x){return x.status===statusFilter;});
  return t;
}
function bdg(cls,txt){return '<span class="badge '+cls+'">'+txt+'</span>';}
function pbdg(p){return bdg(p==='Alta'?'br':p==='Media'?'ba':'bg',p);}
function sbdg(s){var m={Pendiente:'bx','En curso':'bb',Bloqueada:'br','En espera de terceros':'ba',Finalizada:'bg'};return bdg(m[s]||'bx',s);}
function abdg(a){var m={Ventas:'bg',Preventa:'ba',Producto:'bp',Marketing:'bc',Partners:'bt',Dirección:'br',Operaciones:'bx'};return bdg(m[a]||'bx',a);}
function ibdg(i){return bdg(i==='Alto'?'br':i==='Medio'?'ba':'bg',i);}

// ===== SIDEBAR =====
function renderSidebar() {
  var html='<div class="slabel"><span>Por área</span><button onclick="showAreasModal()" title="Gestionar áreas">⚙️</button></div>';
  html+='<button class="sitem'+(areaFilter==='all'?' on':'')+'" onclick="fArea(\'all\',this)"><span class="sdot" style="background:var(--blue)"></span>Todas<span class="scnt" id="cnt-all">0</span></button>';
  AREAS.forEach(function(a){
    html+='<button class="sitem'+(areaFilter===a?' on':'')+'" onclick="fArea(\''+a+'\',this)"><span class="sdot" style="background:'+aclr(a)+'"></span>'+a+'<span class="scnt" id="cnt-'+a+'">0</span></button>';
  });
  document.getElementById('areas-section').innerHTML=html;
  updateCounts();
}
function updateCounts() {
  function s(id,n){var e=document.getElementById(id);if(e)e.textContent=n;}
  s('cnt-all',tasks.length);
  AREAS.forEach(function(a){s('cnt-'+a,tasks.filter(function(t){return t.area===a;}).length);});
  s('cnt-Bloqueada',tasks.filter(function(t){return t.status==='Bloqueada';}).length);
  s('cnt-Espera',tasks.filter(function(t){return t.status==='En espera de terceros';}).length);
  s('cnt-Finalizada',tasks.filter(function(t){return t.status==='Finalizada';}).length);
}
function fArea(a,el){areaFilter=a;statusFilter=null;document.querySelectorAll('.sitem').forEach(function(e){e.classList.remove('on');});el.classList.add('on');renderContent();}
function fStatus(s,el){if(statusFilter===s){statusFilter=null;el.classList.remove('on');}else{statusFilter=s;document.querySelectorAll('.sitem').forEach(function(e){e.classList.remove('on');});el.classList.add('on');}renderContent();}

// ===== VIEWS =====
function showView(v){
  view=v;
  var views=['dashboard','daily','weekly','initiatives','kanban','report'];
  document.querySelectorAll('.ntab').forEach(function(t,i){t.classList.toggle('on',views[i]===v);});
  renderContent();
}
function redraw(){renderSidebar();renderContent();var c=document.getElementById('cap-input');if(c)c.value=CAP;}
function set(html){document.getElementById('content').innerHTML=html;}
function renderContent(){
  updateCounts();
  if(view==='dashboard')vDashboard();
  else if(view==='daily')vDaily();
  else if(view==='weekly')vWeekly();
  else if(view==='initiatives')vInitiatives();
  else if(view==='kanban')vKanban();
  else if(view==='report')vReport();
}

  var critH=all.filter(function(t){return t.crit==='Alta'&&thisWeek(t);}).map(function(t){return'<div class="trow" onclick="openTask(\''+t.id+'\')"><div class="pdot ph"></div><div style="flex:1;min-width:0"><div class="ttitle">'+t.title+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+abdg(t.area)+' '+fmt(t.dd)+'</div></div>'+sbdg(t.status)+'</div>';}).join('')||'<div style="color:var(--text3);font-size:13px;padding:12px 0">Sin críticas esta semana 🎉</div>';

// ===== WEEKLY =====
function vWeekly(){
  var td=new Date();td.setHours(0,0,0,0);
  var dow=td.getDay(),mon=new Date(td);mon.setDate(td.getDate()-(dow===0?6:dow-1));
  var days=['Lun','Mar','Mié','Jue','Vie'];
  var dates=days.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  var all=filtered().filter(function(t){return t.status!=='Finalizada';});
  var totH=all.reduce(function(s,t){return s+Math.max(0,t.effort-t.spent);},0);
  var cap=CAP*5,wp=Math.min(100,Math.round(totH/cap*100));
  var cols=dates.map(function(d,i){
    var dt=srt(all.filter(function(t){var due=dd(t.dd),start=dd(t.sd);return due.getTime()===d.getTime()||(start<=d&&due>=d);})).slice(0,5);
    var dh=dt.reduce(function(s,t){return s+Math.max(0,t.effort-t.spent)/Math.max(1,Math.ceil((dd(t.dd)-dd(t.sd))/86400000)+1);},0);
    var isTd=d.getTime()===td.getTime();
    return'<div class="dcol" style="'+(isTd?'border:2px solid var(--blue)':'')+'"><div class="dhdr" style="color:'+(isTd?'var(--blue)':'var(--text2)')+'">'+days[i]+' '+d.getDate()+'</div>'+(dt.length?dt.map(function(t){return'<div class="dtask '+(t.prio==='Alta'?'alta':t.prio==='Media'?'media':'')+'" onclick="openTask(\''+t.id+'\')" title="'+t.title+'"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">'+t.title+'</div><div style="color:var(--text3);margin-top:2px">'+t.area+'</div></div>';}).join(''):'<div style="color:var(--text3);font-size:11px;text-align:center;padding:14px 0;opacity:.6">Libre</div>')+'<div style="font-size:10px;text-align:center;margin-top:6px;color:'+(dh>CAP?'var(--red)':'var(--text3)')+'">'+dh.toFixed(1)+'h est.</div></div>';}).join('');
  var allRows=srt(all.filter(function(t){return dd(t.dd)>=mon&&dd(t.sd)<=dates[4];})).map(function(t){return'<div class="trow'+(t.status==='Bloqueada'?' blk':t.status==='En espera de terceros'?' wait':'')+'" onclick="openTask(\''+t.id+'\')"><div class="pdot '+(t.prio==='Alta'?'ph':t.prio==='Media'?'pm':'pl')+'"></div><div style="flex:1;min-width:0"><div class="ttitle">'+t.title+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+t.sh+' · '+getIni(t.iid).name+'</div></div><div style="display:flex;align-items:center;gap:6px">'+abdg(t.area)+sbdg(t.status)+'<span style="font-size:11px;color:var(--text3)">'+fmt(t.dd)+'</span></div></div>';}).join('')||'<div style="color:var(--text3);font-size:13px;padding:8px 0">Sin tareas esta semana</div>';
  set('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:16px;font-weight:700">Semana '+mon.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+' – '+new Date(mon.getTime()+4*86400000).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+'</div><div style="font-size:13px;color:'+(totH>cap?'var(--red)':'var(--text2)')+'">'+totH.toFixed(0)+'h / '+cap+'h</div></div><div style="margin-bottom:14px"><div class="wtrack" style="height:10px"><div class="wfill" style="width:'+wp+'%;background:'+(totH>cap?'var(--red)':totH>cap*.75?'var(--amber)':'var(--blue)')+'"></div></div><div style="font-size:11px;color:var(--text3);margin-top:3px">'+wp+'% de capacidad semanal</div></div><div class="wgrid">'+cols+'</div><div style="margin-top:16px"><div class="sh"><div class="stitle">Todas las tareas de la semana</div></div>'+allRows+'</div>');
}

// ===== INITIATIVES =====
function vInitiatives(){
  var TC={Oportunidad:'bb',Partner:'bt','Iniciativa Estratégica':'bp',Cliente:'bg',Marketing:'bc',Producto:'ba','Soporte Interno':'bx',Dirección:'br'};
  var cards=initiatives.map(function(ini){
    var it=tasks.filter(function(t){return t.iid===ini.id;});
    var done=it.filter(function(t){return t.status==='Finalizada';}).length;
    var pct=it.length?Math.round(done/it.length*100):0;
    var blk=it.filter(function(t){return t.status==='Bloqueada';}).length;

function updTask(id,field,val){

function showAreasModal(){
  function rows(){return AREAS.map(function(a,i){return'<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:12px;height:12px;border-radius:50%;background:'+aclr(a)+';flex-shrink:0"></div><span style="flex:1;font-size:13px">'+a+'</span><button class="btn" style="padding:3px 8px;font-size:11px" onclick="editArea('+i+')">Editar</button><button class="btn btnd" style="padding:3px 8px;font-size:11px" onclick="delArea('+i+')">✕</button></div>';}).join('');}
  document.getElementById('modal').innerHTML='<div class="mhdr"><div class="mtitle">⚙️ Gestionar áreas</div><button class="xbtn" onclick="closeModal()">✕</button></div><div style="font-size:12px;color:var(--text3);margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:8px">Las áreas representan los equipos o departamentos implicados en tus tareas.</div><div id="areas-list">'+rows()+'</div><div style="display:flex;gap:8px;margin-top:14px;border-top:1px solid var(--border);padding-top:14px"><input class="finput" id="new-area" placeholder="Nueva área..." style="flex:1"><button class="btn btnp" onclick="addArea()">+ Añadir</button></div><div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  document.getElementById('overlay').classList.remove('hidden');
}
function addArea(){
  var inp=document.getElementById('new-area'),name=inp.value.trim();
  if(!name)return;
  if(AREAS.indexOf(name)>=0){alert('Esa área ya existe');return;}
  AREAS.push(name);saveSettings();renderSidebar();showAreasModal();toast('Área "'+name+'" añadida ✓');
}
function editArea(i){
  var cur=AREAS[i],nw=prompt('Nuevo nombre para "'+cur+'":', cur);
  if(!nw||!nw.trim()||nw.trim()===cur)return;
  nw=nw.trim();
  if(AREAS.indexOf(nw)>=0){alert('Esa área ya existe');return;}
  tasks.forEach(function(t){if(t.area===cur){t.area=nw;saveTask(t);}});
  initiatives.forEach(function(ini){if(ini.area===cur){ini.area=nw;saveInitiative(ini);}ini.otherAreas=ini.otherAreas.map(function(a){return a===cur?nw:a;});});
  AREAS[i]=nw;if(areaFilter===cur)areaFilter=nw;
  saveSettings();renderSidebar();showAreasModal();toast('Área renombrada ✓');
}
function delArea(i){
  var name=AREAS[i],inUse=tasks.filter(function(t){return t.area===name;}).length;
  if(!confirm(inUse>0?'El área "'+name+'" tiene '+inUse+' tareas. ¿Eliminar igualmente?':'¿Eliminar el área "'+name+'"?'))return;
  if(inUse>0)tasks.forEach(function(t){if(t.area===name){t.area='';saveTask(t);}});
  AREAS.splice(i,1);if(areaFilter===name)areaFilter='all';
  saveSettings();renderSidebar();showAreasModal();toast('Área eliminada');
}

function closeModal(){document.getElementById('overlay').classList.add('hidden');}

// ===== PWA =====
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

// ===== INIT =====
renderSidebar();
loadAll();
</script>
</body>
</html>
