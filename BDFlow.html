<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BDFlow Ver. 2.9.1</title>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px}
.card{background:white;padding:20px;border-radius:10px;max-width:700px;margin:auto}
label{font-size:12px;color:#6b7280}
input,select,textarea{width:100%;padding:8px;margin-top:4px;margin-bottom:12px}
button{padding:10px 14px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer}
small{color:#9ca3af}
</style>
</head>
<body>

<div class="card">
<h2>Nueva tarea</h2>

<label>Título</label>
<input>

<label>Descripción</label>
<textarea></textarea>

<label>Área</label>
<select><option>General</option></select>

<label>Iniciativa</label>
<select><option>Base instalada</option></select>

<label>Estado</label>
<select><option>Pendiente</option></select>

<label>Prioridad</label>
<select><option>Alta</option></select>

<label>Fecha objetivo (opcional)</label>
<input placeholder="Sin fecha = tarea continua">

<label>Horas previstas</label>
<input type="number">

<label>Siguiente paso</label>
<input>

<button>Guardar</button>
</div>

</body>
</html>
