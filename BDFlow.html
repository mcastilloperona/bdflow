<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDFlow Ver. 2.6.3</title>
</head>
<body style="font-family:Arial;padding:20px">

<h2>BDFlow 2.6.3 (Backup ready)</h2>

<button onclick="exportData()">Exportar datos</button>
<input type="file" id="importFile" onchange="importData(event)" />

<script>
const STORAGE_KEY = 'bdflow_v263_state';

function saveState(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : {tasks:[], initiatives:[], areas:[]};
}

// EXPORT
function exportData(){
  const data = loadState();
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bdflow_backup.json';
  a.click();
  URL.revokeObjectURL(url);
}

// IMPORT
function importData(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      saveState(data);
      alert('Datos importados correctamente. Recarga la página.');
    }catch(err){
      alert('Error al importar datos');
    }
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
