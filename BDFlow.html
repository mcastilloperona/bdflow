<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDFlow — Gestión BD</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a56db">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BDFlow">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;--bg2:#fff;--bg3:#eef1f8;--bg4:#e8ecf6;
  --border:#dde3f0;--border2:#c8d0e8;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --blue:#1a56db;--blue-l:#ebf0fd;--blue-d:#1440b0;
  --red:#dc2626;--red-l:#fef2f2;--red-d:#991b1b;
  --amber:#d97706;--amber-l:#fffbeb;--amber-d:#92400e;
  --green:#16a34a;--green-l:#f0fdf4;--green-d:#14532d;
  --purple:#7c3aed;--purple-l:#f5f3ff;--purple-d:#4c1d95;
  --teal:#0d9488;--teal-l:#f0fdfa;--teal-d:#134e4a;
  --coral:#ea580c;--coral-l:#fff7ed;--coral-d:#7c2d12;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0;box-shadow:var(--shadow)}
.logo{font-weight:700;font-size:18px;margin-right:16px;letter-spacing:-.5px}
.logo span{color:var(--blue)}
.navtabs{display:flex;gap:1px;flex:1;background:var(--bg3);border-radius:10px;padding:3px}
.ntab{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .15s}
.ntab:hover{color:var(--text);background:rgba(255,255,255,.6)}
.ntab.on{background:var(--bg2);color:var(--blue);font-weight:600;box-shadow:var(--shadow)}
.tactions{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;box-shadow:var(--shadow)}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btnp{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 3px rgba(26,86,219,.3)}
.btnp:hover{background:var(--blue-d);border-color:var(--blue-d)}
.btnd{background:var(--red);color:#fff;border-color:var(--red)}
.btnd:hover{background:var(--red-d)}
.btnsm{padding:4px 10px;font-size:11px}
.btn-ghost{background:none;border:none;box-shadow:none;padding:6px 10px}
.btn-ghost:hover{background:var(--bg3)}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 10px;overflow-y:auto;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}

/* SIDEBAR */
.slabel{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 8px 6px;display:flex;align-items:center;justify-content:space-between}
.slabel button{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text3);padding:2px 4px;border-radius:4px}
.slabel button:hover{background:var(--bg3);color:var(--text)}
.sitem{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;transition:all .12s}
.sitem:hover{background:var(--bg3);color:var(--text)}
.sitem.on{background:var(--blue-l);color:var(--blue)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scnt{margin-left:auto;font-size:11px;font-weight:600;background:var(--bg3);border-radius:20px;padding:1px 8px;color:var(--text3);min-width:22px;text-align:center}
.sitem.on .scnt{background:rgba(26,86,219,.12);color:var(--blue)}
.ssec{margin-bottom:18px}
.sdivider{height:1px;background:var(--border);margin:8px 0}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* GRID */
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}

/* METRIC CARDS */
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.mcard-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.mlbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.mval{font-size:28px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.msub{font-size:12px;color:var(--text3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.01em}
.br{background:var(--red-l);color:var(--red-d)}
.ba{background:var(--amber-l);color:var(--amber-d)}
.bg{background:var(--green-l);color:var(--green-d)}
.bb{background:var(--blue-l);color:var(--blue-d)}
.bp{background:var(--purple-l);color:var(--purple-d)}
.bt{background:var(--teal-l);color:var(--teal-d)}
.bc{background:var(--coral-l);color:var(--coral-d)}
.bx{background:var(--bg3);color:var(--text2)}

/* TASK ROWS */
.trow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--bg2);margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.trow:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.trow.blk{border-left:3px solid var(--red);padding-left:11px}
.trow.wait{border-left:3px solid var(--amber);padding-left:11px}
.ttitle{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsubt{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* PRIORITY DOT */
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.8)}
.ph{background:var(--red)}.pm{background:var(--amber)}.pl{background:var(--green)}

/* SCORE */
.sbadge{background:linear-gradient(135deg,var(--blue-l),#dbeafe);color:var(--blue-d);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;min-width:34px;text-align:center;border:1px solid rgba(26,86,219,.15)}

/* PROGRESS */
.pbar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;width:64px}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),#60a5fa)}

/* ALERTS */
.alert{padding:12px 14px;border-radius:var(--radius-lg);font-size:13px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;border:1px solid;box-shadow:var(--shadow)}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-r{background:var(--red-l);color:var(--red-d);border-color:rgba(220,38,38,.2)}
.alert-a{background:var(--amber-l);color:var(--amber-d);border-color:rgba(217,119,6,.2)}
.alert-g{background:var(--green-l);color:var(--green-d);border-color:rgba(22,163,74,.2)}
.alert-b{background:var(--blue-l);color:var(--blue-d);border-color:rgba(26,86,219,.2)}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stitle{font-size:15px;font-weight:700;color:var(--text)}

/* WORKLOAD */
.wtrack{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.wfill{height:100%;border-radius:4px;transition:width .4s}

/* KANBAN */
.kboard{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;min-height:400px}
.kcol{min-width:240px;flex:1;background:var(--bg3);border-radius:var(--radius-xl);padding:14px;border:1px solid var(--border)}
.khead{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.06em}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.kcard:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kctitle{font-size:12px;font-weight:600;margin-bottom:6px;line-height:1.4}

/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--radius-xl);padding:24px;width:660px;max-width:96vw;max-height:92vh;overflow-y:auto;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.mtitle{font-size:17px;font-weight:700;color:var(--text)}
.msubt{font-size:13px;color:var(--text3);margin-top:2px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{margin-bottom:12px}
.flbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.finput{width:100%;padding:9px 12px;border-radius:var(--radius);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;font-weight:500;transition:border .15s}
.finput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fsel{width:100%;padding:9px 12px;border-radius:var(--radius);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--blue)}
.xbtn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:4px 8px;border-radius:6px;line-height:1}
.xbtn:hover{background:var(--bg3);color:var(--text)}

/* INITIATIVE CARD */
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);transition:box-shadow .15s}
.icard:hover{box-shadow:var(--shadow-md)}
.ipbar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.ipfill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:3px}

/* REPORT */
.rrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.barh{height:14px;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:3px;display:inline-block}

/* WEEKLY */
.wgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.dcol{background:var(--bg2);border-radius:var(--radius-lg);padding:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.dhdr{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:10px;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.dtask{background:var(--bg3);border-radius:6px;padding:6px 8px;margin-bottom:5px;font-size:11px;font-weight:500;border-left:3px solid var(--blue);cursor:pointer;transition:all .12s}
.dtask:hover{transform:translateX(2px)}
.dtask.alta{border-color:var(--red)}.dtask.media{border-color:var(--amber)}

/* DIARY */
.diary-entry{background:var(--bg3);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-size:12px;border-left:3px solid var(--blue)}
.diary-date{font-weight:700;color:var(--text2);font-size:11px;margin-bottom:3px}
.diary-hours{display:inline-flex;align-items:center;background:var(--blue-l);color:var(--blue-d);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;margin-right:6px}

/* HINTS */
.hint{border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:16px;font-size:12px;font-weight:500;line-height:1.6;border:1px solid}
.hint-b{background:var(--blue-l);color:var(--blue-d);border-color:rgba(26,86,219,.2)}
.hint-g{background:var(--green-l);color:var(--green-d);border-color:rgba(22,163,74,.2)}
.hint-a{background:var(--amber-l);color:var(--amber-d);border-color:rgba(217,119,6,.2)}

/* QUICK CHIPS */
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.quick-chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border2);font-size:12px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--text2);transition:all .15s;font-family:'Inter',sans-serif}
.quick-chip:hover{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}

/* COLOR SWATCHES */
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;transition:transform .15s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.sel{border-color:var(--text);transform:scale(1.15)}

/* NOTIF */
.notif-bell{position:relative;cursor:pointer;background:none;border:1px solid var(--border);border-radius:var(--radius);font-size:16px;padding:6px 10px;box-shadow:var(--shadow)}
.notif-bell:hover{background:var(--bg3)}
.notif-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}

/* SYNC */
#sync-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.sync-ok{background:var(--green-l);color:var(--green-d)}
.sync-saving{background:var(--amber-l);color:var(--amber-d)}
.sync-err{background:var(--red-l);color:var(--red-d)}

/* AI RESULT */
.ai-result-box{background:linear-gradient(135deg,var(--green-l),#dcfce7);border:1px solid rgba(22,163,74,.25);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.ai-result-title{font-weight:700;color:var(--green-d);font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-result-text{color:var(--green-d);font-size:13px;line-height:1.6}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

.hidden{display:none!important}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh">
<div class="topbar">
  <div class="logo">BD<span>Flow</span></div>
  <div class="navtabs">
    <button class="ntab on" onclick="showView('dashboard')">Dashboard</button>
    <button class="ntab" onclick="showView('daily')">Hoy</button>
    <button class="ntab" onclick="showView('weekly')">Semana</button>
    <button class="ntab" onclick="showView('initiatives')">Iniciativas</button>
    <button class="ntab" onclick="showView('kanban')">Kanban</button>
    <button class="ntab" onclick="showView('report')">Reporting</button>
  </div>
  <div class="tactions">
    <span id="sync-status" class="sync-ok">● Sincronizado</span>
    <button class="notif-bell" id="notif-btn" onclick="showNotifications()">&#128276;<span class="notif-badge hidden" id="notif-count">0</span></button>
    <button class="btn" onclick="showQuickCreate()">&#9889; Rápido</button>
    <button class="btn" onclick="showTaskModal()">+ Tarea</button>
    <button class="btn btnp" onclick="showIniModal()">+ Iniciativa</button>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="ssec" id="areas-section"></div>
    <div class="sdivider"></div>
    <div class="ssec">
      <div class="slabel"><span>Por estado</span></div>
      <button class="sitem" onclick="fStatus('Bloqueada',this)"><span class="sdot" style="background:var(--red)"></span>Bloqueadas<span class="scnt" id="cnt-Bloqueada">0</span></button>
      <button class="sitem" onclick="fStatus('En espera de terceros',this)"><span class="sdot" style="background:var(--amber)"></span>En espera<span class="scnt" id="cnt-Espera">0</span></button>
      <button class="sitem" onclick="fStatus('Finalizada',this)"><span class="sdot" style="background:var(--green)"></span>Finalizadas<span class="scnt" id="cnt-Finalizada">0</span></button>
    </div>
    <div class="sdivider"></div>
    <div class="ssec">
      <div class="slabel"><span>Configuración</span></div>
      <div style="padding:4px 8px 10px">
        <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px">Capacidad diaria</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <input type="number" id="cap-input" value="6" min="1" max="16" style="width:58px;padding:6px 9px;border-radius:var(--radius);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-weight:600;font-family:'Inter',sans-serif" onchange="setCap(this.value)">
          <span style="font-size:12px;color:var(--text3);font-weight:500">h/día</span>
        </div>
        <button class="btn" style="width:100%;font-size:11px;justify-content:center" onclick="loadDemo()">Cargar datos demo</button>
      </div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>
<div class="overlay hidden" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal"></div>
</div>
<script>
// ===== CONFIG =====
var SB_URL='https://jljaejkmbnfnhcbjcjnm.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsamFlamttYm5mbmhjYmpjam5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTEyMDksImV4cCI6MjA5MTM4NzIwOX0.7Ey8qKDlDcvOQq77rqBeH9goGWI1whrL9WiefHOp3XI';
var GEMINI_KEY='AIzaSyAk2h_tpyyDnVDXnOafUopQe564Zu3LSRk';
var GEMINI_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key='+GEMINI_KEY;

// ===== SUPABASE =====
function sbH(){return{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};}
function sbGet(t){return fetch(SB_URL+'/rest/v1/'+t+'?select=*',{headers:sbH()}).then(function(r){return r.json();});}
function sbUpsert(t,row){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:Object.assign({},sbH(),{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify(row)});}
function sbDelete(t,id){return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:sbH()});}

// ===== GEMINI =====
function callGemini(prompt){
  return fetch(GEMINI_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.1,maxOutputTokens:1024}
    })
  })
  .then(function(r){
    if(!r.ok){throw new Error('HTTP '+r.status);}
    return r.json();
  })
  .then(function(d){
    console.log('Gemini response:',JSON.stringify(d).substring(0,500));
    if(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0]){
      return d.candidates[0].content.parts[0].text;
    }
    if(d.error){throw new Error(d.error.message);}
    return '';
  });
}

// ===== SYNC =====
function setSS(s){var el=document.getElementById('sync-status');if(!el)return;if(s==='ok'){el.className='sync-ok';el.textContent='● Sincronizado';}else if(s==='saving'){el.className='sync-saving';el.textContent='● Guardando...';}else{el.className='sync-err';el.textContent='● Error de red';}}
function saveTask(t){setSS('saving');sbUpsert('tasks',{id:t.id,data:t}).then(function(){setSS('ok');}).catch(function(){setSS('err');});}
function saveIni(i){setSS('saving');sbUpsert('initiatives',{id:i.id,data:i}).then(function(){setSS('ok');}).catch(function(){setSS('err');});}
function saveSettings(){setSS('saving');Promise.all([sbUpsert('settings',{key:'areas',value:AREAS}),sbUpsert('settings',{key:'capacity',value:CAP})]).then(function(){setSS('ok');}).catch(function(){setSS('err');});}

function loadAll(){

  Promise.all([sbGet('tasks'),sbGet('initiatives'),sbGet('settings')]).then(function(res){
    var tR=res[0],iR=res[1],sR=res[2];
    console.log('Supabase tasks:', JSON.stringify(tR).substring(0,200));
    console.log('Supabase initiatives:', JSON.stringify(iR).substring(0,200));
    console.log('Supabase settings:', JSON.stringify(sR).substring(0,200));
    if(Array.isArray(tR)&&tR.length>0){
      var parsed=tR.map(function(r){return r.data;}).filter(Boolean);
      if(parsed.length>0)tasks=parsed;
    }
    if(Array.isArray(iR)&&iR.length>0){
      var parsed=iR.map(function(r){return r.data;}).filter(Boolean);
      if(parsed.length>0)initiatives=parsed;
    }
    if(Array.isArray(sR)&&sR.length>0){
      sR.forEach(function(r){
        if(!r)return;

          var loaded=Array.isArray(r.value)?r.value:[];

              var valid=loaded.filter(function(a){return a&&typeof a==='object'&&a.name;});
              if(valid.length>0)AREAS=valid;

        if(r.key==='capacity'){
          var cap=parseInt(r.value)||6;

  });
}

// ===== TOAST =====
function toast(msg,type){
  var old=document.getElementById('toast');if(old)old.remove();
  var el=document.createElement('div');el.id='toast';
  var bg=type==='err'?'var(--red)':type==='warn'?'var(--amber)':'var(--blue)';
  el.style.cssText='position:fixed;bottom:28px;right:28px;background:'+bg+';color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);font-family:Inter,sans-serif;display:flex;align-items:center;gap:8px';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.style.transition='opacity .4s,transform .4s';el.style.opacity='0';el.style.transform='translateY(8px)';setTimeout(function(){el.remove();},400);},2500);
}

// ===== ALERTS =====
function getAlerts(){
  var alerts=[];var today=new Date();today.setHours(0,0,0,0);
  tasks.forEach(function(t){
    if(t.status==='Finalizada')return;
    var due=new Date(t.dd+'T12:00:00');due.setHours(0,0,0,0);
    var dl=Math.ceil((due-today)/86400000);
    if(dl<0)alerts.push({type:'overdue',msg:'Vencida hace '+Math.abs(dl)+'d: '+t.title,task:t,level:'red'});
    else if(dl===0)alerts.push({type:'today',msg:'Vence HOY: '+t.title,task:t,level:'red'});
    else if(dl<=2)alerts.push({type:'soon',msg:'Vence en '+dl+'d: '+t.title,task:t,level:'amber'});
    if(t.status==='Bloqueada'){var sd=t.sd?new Date(t.sd+'T12:00:00'):null;if(sd){var bd=Math.ceil((today-sd)/86400000);if(bd>=3)alerts.push({type:'blocked',msg:'Bloqueada '+bd+'d: '+t.title,task:t,level:'red'});}}
    var diary=t.diary||[];
    if(t.status==='En curso'){
      if(diary.length){var last=new Date(diary[diary.length-1].date+'T12:00:00');last.setHours(0,0,0,0);var idle=Math.ceil((today-last)/86400000);if(idle>=5)alerts.push({type:'idle',msg:'Sin actividad '+idle+'d: '+t.title,task:t,level:'amber'});}
      else{alerts.push({type:'idle',msg:'Sin actividad registrada: '+t.title,task:t,level:'amber'});}
    }
  });
  return alerts;
}
function updateNotifBadge(){var a=getAlerts();var b=document.getElementById('notif-count');if(b){if(a.length){b.classList.remove('hidden');b.textContent=a.length>9?'9+':a.length;}else{b.classList.add('hidden');}}}

  var alerts=getAlerts();
  var html='<div class="mhdr"><div><div class="mtitle">Alertas activas</div><div class="msubt">'+alerts.length+' alertas pendientes de atención</div></div><button class="xbtn" onclick="closeModal()">✕</button></div>';
  if(!alerts.length){html+='<div class="alert alert-g"><span class="alert-icon">✅</span><div>Sin alertas. Todo bajo control.</div></div>';}
  else{html+=alerts.map(function(a){var cls=a.level==='red'?'alert-r':'alert-a';var icon=a.level==='red'?'⚠️':'⏰';return'<div class="alert '+cls+'" style="cursor:pointer;margin-bottom:8px" onclick="closeModal();openTask(\''+a.task.id+'\')"><span class="alert-icon">'+icon+'</span><div><div style="font-weight:600">'+a.msg+'</div><div style="font-size:11px;opacity:.8;margin-top:2px">→ '+a.task.next+'</div></div></div>';}).join('');}
  html+='<div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  document.getElementById('modal').innerHTML=html;document.getElementById('overlay').classList.remove('hidden');
}
function buildAlertPanel(){
  var alerts=getAlerts();
  if(!alerts.length)return'<div class="alert alert-g"><span class="alert-icon">✅</span><div style="font-weight:500">Sin alertas. Todo bajo control.</div></div>';
  var html='';
  alerts.slice(0,4).forEach(function(a){html+='<div class="alert '+(a.level==='red'?'alert-r':'alert-a')+'" style="cursor:pointer;margin-bottom:8px" onclick="openTask(\''+a.task.id+'\')"><span class="alert-icon">'+(a.level==='red'?'⚠️':'⏰')+'</span><div style="min-width:0"><div style="font-weight:600;font-size:12px">'+a.msg+'</div><div style="font-size:11px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">→ '+a.task.next+'</div></div></div>';});
  if(alerts.length>4)html+='<div style="font-size:12px;color:var(--text3);font-weight:500;cursor:pointer;padding:4px 0" onclick="showNotifications()">'+(alerts.length-4)+' alertas más →</div>';
  return html;
}

// ===== HELPERS =====
function score(t){var im={Alto:3,Medio:2,Bajo:1},pr={Alta:3,Media:2,Baja:1};var td=new Date();td.setHours(0,0,0,0);var due=new Date(t.dd+'T12:00:00');due.setHours(0,0,0,0);var d=Math.ceil((due-td)/86400000);var urg=d<=2?3:d<=7?2:1;var blk=t.status==='Bloqueada'?3:t.status==='En espera de terceros'?2:1;var dep=(t.deps&&t.deps.trim())?2:1;var vis=t.exec?2:1;return(im[t.impact]||1)*.30+urg*.20+(pr[t.crit]||1)*.20+blk*.15+dep*.10+vis*.05;}
function scoreN(t){return Math.round(score(t)*100/3);}
function srt(arr){return arr.slice().sort(function(a,b){return score(b)-score(a);});}
function today(){var d=new Date();d.setHours(0,0,0,0);return d;}
function dd(s){var d=new Date(s+'T12:00:00');d.setHours(0,0,0,0);return d;}
function dl(s){return Math.ceil((dd(s)-today())/86400000);}
function overdue(t){return t.status!=='Finalizada'&&dl(t.dd)<0;}
function thisWeek(t){var d=dl(t.dd);return d>=0&&d<=7&&t.status!=='Finalizada';}
function getIni(id){for(var i=0;i<initiatives.length;i++){if(initiatives[i].id===id)return initiatives[i];}return{name:'Sin iniciativa',type:''};}
function fmt(s){if(!s)return'—';var d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function aclr(name){for(var i=0;i<AREAS.length;i++){if(AREAS[i].name===name)return AREAS[i].color;}return'#8a8a84';}
function filtered(){var t=tasks.slice();if(areaFilter!=='all')t=t.filter(function(x){return x.area===areaFilter;});if(statusFilter)t=t.filter(function(x){return x.status===statusFilter;});return t;}
function bdg(cls,txt){return'<span class="badge '+cls+'">'+txt+'</span>';}
function pbdg(p){return bdg(p==='Alta'?'br':p==='Media'?'ba':'bg',p);}
function sbdg(s){var m={Pendiente:'bx','En curso':'bb',Bloqueada:'br','En espera de terceros':'ba',Finalizada:'bg'};return bdg(m[s]||'bx',s);}
function abdg(a){var m={Ventas:'bg',Preventa:'ba',Producto:'bp',Marketing:'bc',Partners:'bt',Dirección:'br',Operaciones:'bx'};return bdg(m[a]||'bx',a);}
function ibdg(i){return bdg(i==='Alto'?'br':i==='Medio'?'ba':'bg',i);}

function renderSidebar(){

function updateCounts(){
  function s(id,n){var e=document.getElementById(id);if(e)e.textContent=n;}
  s('cnt-all',tasks.length);
  AREAS.forEach(function(a){s('cnt-'+a.name,tasks.filter(function(t){return t.area===a.name;}).length);});
  s('cnt-Bloqueada',tasks.filter(function(t){return t.status==='Bloqueada';}).length);
  s('cnt-Espera',tasks.filter(function(t){return t.status==='En espera de terceros';}).length);
  s('cnt-Finalizada',tasks.filter(function(t){return t.status==='Finalizada';}).length);
}
function fArea(a,el){areaFilter=a;statusFilter=null;document.querySelectorAll('.sitem').forEach(function(e){e.classList.remove('on');});el.classList.add('on');renderContent();}
function fStatus(s,el){if(statusFilter===s){statusFilter=null;el.classList.remove('on');}else{statusFilter=s;document.querySelectorAll('.sitem').forEach(function(e){e.classList.remove('on');});el.classList.add('on');}renderContent();}

// ===== WEEKLY =====
function vWeekly(){
  var td=new Date();td.setHours(0,0,0,0);var dow=td.getDay(),mon=new Date(td);mon.setDate(td.getDate()-(dow===0?6:dow-1));
  var days=['Lun','Mar','Mié','Jue','Vie'];
  var dates=days.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  var all=filtered().filter(function(t){return t.status!=='Finalizada';});
  var totH=all.reduce(function(s,t){return s+Math.max(0,t.effort-t.spent);},0);
  var cap=CAP*5,wp=Math.min(100,Math.round(totH/cap*100));
  var cols=dates.map(function(d,i){
    var dt=srt(all.filter(function(t){var due=dd(t.dd),start=dd(t.sd);return due.getTime()===d.getTime()||(start<=d&&due>=d);})).slice(0,5);
    var dh=dt.reduce(function(s,t){return s+Math.max(0,t.effort-t.spent)/Math.max(1,Math.ceil((dd(t.dd)-dd(t.sd))/86400000)+1);},0);
    var isTd=d.getTime()===td.getTime();
    return'<div class="dcol" style="'+(isTd?'border:2px solid var(--blue);background:var(--blue-l)':'')+'">'+
      '<div class="dhdr" style="color:'+(isTd?'var(--blue)':'var(--text2)')+'">'+days[i]+' '+d.getDate()+'</div>'+
      (dt.length?dt.map(function(t){return'<div class="dtask '+(t.prio==='Alta'?'alta':t.prio==='Media'?'media':'')+'" onclick="openTask(\''+t.id+'\')" title="'+t.title+'">'+
        '<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;font-weight:600">'+t.title+'</div>'+
        '<div style="color:var(--text3);margin-top:2px;font-size:10px">'+t.area+'</div></div>';}).join(''):'<div style="color:var(--text3);font-size:11px;text-align:center;padding:16px 0;opacity:.6">Libre</div>')+
      '<div style="font-size:10px;font-weight:600;text-align:center;margin-top:8px;color:'+(dh>CAP?'var(--red)':'var(--text3)')+'">'+dh.toFixed(1)+'h</div></div>';}).join('');
  var allRows=srt(all.filter(function(t){return dd(t.dd)>=mon&&dd(t.sd)<=dates[4];})).map(function(t){return'<div class="trow'+(t.status==='Bloqueada'?' blk':t.status==='En espera de terceros'?' wait':'')+'" onclick="openTask(\''+t.id+'\')"><div class="pdot '+(t.prio==='Alta'?'ph':t.prio==='Media'?'pm':'pl')+'"></div><div style="flex:1;min-width:0"><div class="ttitle">'+t.title+'</div><div class="tsubt">'+t.sh+' · '+getIni(t.iid).name+'</div></div><div style="display:flex;align-items:center;gap:6px">'+abdg(t.area)+sbdg(t.status)+'<span style="font-size:11px;color:var(--text3);font-weight:500">'+fmt(t.dd)+'</span></div></div>';}).join('')||'<div style="color:var(--text3);font-size:13px;padding:8px 0;text-align:center">Sin tareas esta semana</div>';
  set('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<div style="font-size:18px;font-weight:700;letter-spacing:-.3px">Semana '+mon.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+' – '+new Date(mon.getTime()+4*86400000).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+'</div>'+
    '<div style="font-size:13px;font-weight:600;color:'+(totH>cap?'var(--red)':'var(--text2)')+'">'+totH.toFixed(0)+'h / '+cap+'h · '+wp+'%</div></div>'+
    '<div style="margin-bottom:16px"><div class="wtrack" style="height:10px"><div class="wfill" style="width:'+wp+'%;background:'+(totH>cap?'var(--red)':totH>cap*.75?'var(--amber)':'var(--blue)')+'"></div></div></div>'+
    '<div class="wgrid" style="margin-bottom:20px">'+cols+'</div>'+

}

function doSaveTaskEdit(id){
  for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){
    tasks[i].status=document.getElementById('tf-status').value;
    tasks[i].prio=document.getElementById('tf-prio').value;
    tasks[i].prog=parseInt(document.getElementById('plbl').textContent)||0;
    tasks[i].dd=document.getElementById('tf-dd').value;
    tasks[i].effort=parseFloat(document.getElementById('tf-effort').value)||tasks[i].effort;
    tasks[i].cat=document.getElementById('tf-cat').value;
    tasks[i].deps=document.getElementById('tf-deps').value;
    tasks[i].next=document.getElementById('tf-next').value;
    tasks[i].desc=document.getElementById('tf-desc').value;
    saveTask(tasks[i]);toast('Cambios guardados ✓');updateNotifBadge();updateCounts();break;
  }}
}
function addDiaryEntry(id){
  var hours=parseFloat(document.getElementById('diary-hours').value)||0;
  var note=document.getElementById('diary-note').value.trim();
  var date=document.getElementById('diary-date').value;
  if(!note){alert('Escribe qué has hecho');return;}
  for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){
    if(!tasks[i].diary)tasks[i].diary=[];
    tasks[i].diary.push({date:date,hours:hours,note:note});
    tasks[i].spent=tasks[i].diary.reduce(function(s,e){return s+e.hours;},0);
    saveTask(tasks[i]);toast('Entrada añadida ✓');closeModal();openTask(id);break;
  }}
}
function confirmDelete(id){
  if(!confirm('¿Eliminar esta tarea? Esta acción no se puede deshacer.'))return;
  if(!confirm('Confirma la eliminación definitiva.'))return;
  sbDelete('tasks',id);tasks=tasks.filter(function(t){return t.id!==id;});closeModal();redraw();toast('Tarea eliminada');
}

function analyzeWithAI(){
  var input=document.getElementById('qc-input').value.trim();
  if(!input){alert('Escribe qué necesitas hacer');return;}
  var btn=document.getElementById('qc-analyze-btn');
  btn.textContent='Analizando...';btn.disabled=true;

  var iniList=initiatives.map(function(i){return i.id+'::'+i.name+'::'+i.type+'::'+i.area;}).join('|')||'ninguna';
  var areaList=AREAS.map(function(a){return a.name;}).join(',');
  var todayD=new Date().toISOString().split('T')[0];

  var prompt='Eres un asistente para gestión de trabajo en Business Development SaaS B2B RRHH.
'+
    'Texto del usuario: '+input+'
'+
    'Iniciativas (id::nombre::tipo::area): '+iniList+'
'+
    'Areas disponibles: '+areaList+'
'+
    'Categorias: Reunión,Seguimiento,Análisis,Coordinación,Propuesta,Presentación,Reporte,Escalado,Ejecución,Bloqueo
'+
    'Fecha hoy: '+todayD+'

'+
    'Responde UNICAMENTE con este JSON (sin texto adicional, sin markdown, sin explicaciones):
'+
    '{"titulo":"...","categoria":"...","area":"...","iniciativaId":"ID o null","stakeholder":"...","fechaLimite":"YYYY-MM-DD","prioridad":"Alta o Media o Baja","impacto":"Alto o Medio o Bajo","proximaAccion":"...","razonamiento":"..."}';

  callGemini(prompt).then(function(raw){
    btn.textContent='✨ Analizar con IA';btn.disabled=false;
    console.log('RAW GEMINI:', raw);
    if(!raw||raw.trim()===''){
      showQCError('La IA no devolvió respuesta. Inténtalo de nuevo.');return;
    }
    var clean=raw.trim();
    // Extract JSON - try multiple strategies
    var r=null;
    // Strategy 1: direct parse
    try{r=JSON.parse(clean);}catch(e1){
      // Strategy 2: find {...} block
      var m=clean.match(/\{[\s\S]*?\}/);
      if(m){try{r=JSON.parse(m[0]);}catch(e2){
        // Strategy 3: find largest {...} block
        var m2=clean.match(/\{[\s\S]*\}/);
        if(m2){try{r=JSON.parse(m2[0]);}catch(e3){r=null;}}
      }}
    }
    if(!r){
      console.error('Could not parse JSON from:', clean);
      showQCError('La IA respondió en formato incorrecto. Rellena el formulario manualmente.');return;
    }
    console.log('PARSED:', r);
    var ini=r.iniciativaId&&r.iniciativaId!=='null'?initiatives.filter(function(i){return i.id===r.iniciativaId;})[0]:null;
    var resHtml='<div class="ai-result-box" style="margin-bottom:14px">'+
      '<div class="ai-result-title">✨ IA ha analizado tu texto</div>'+
      '<div class="ai-result-text">'+(r.razonamiento||'Análisis completado.')+'</div>'+
      (ini?'<div style="margin-top:8px;font-size:12px;font-weight:600;color:var(--green-d);background:rgba(22,163,74,.1);padding:5px 10px;border-radius:6px;display:inline-block">Iniciativa detectada: '+ini.name+'</div>':'')+
      '</div>';
    document.getElementById('qc-ai-result').innerHTML=resHtml;
    document.getElementById('qc-ai-result').classList.remove('hidden');
    document.getElementById('qc-form').classList.remove('hidden');
    document.getElementById('qc-save-btn').classList.remove('hidden');
    function setV(id,v){var el=document.getElementById(id);if(el&&v!==undefined&&v!==null&&String(v).trim()!==''&&v!=='null')el.value=v;}
    function setSel(id,v){var el=document.getElementById(id);if(!el||!v||v==='null')return;for(var i=0;i<el.options.length;i++){if(el.options[i].value===v||el.options[i].text===v){el.selectedIndex=i;break;}}}
    setV('qc-title',r.titulo);
    setV('qc-dd',r.fechaLimite);
    setV('qc-sh',r.stakeholder);
    setV('qc-next',r.proximaAccion);
    setSel('qc-cat',r.categoria);
    setSel('qc-prio',r.prioridad);
    setSel('qc-imp',r.impacto);
    setSel('qc-area',r.area);
    if(r.iniciativaId&&r.iniciativaId!=='null')setSel('qc-ini',r.iniciativaId);
  }).catch(function(e){
    btn.textContent='✨ Analizar con IA';btn.disabled=false;
    console.error('Gemini fetch error:',e);
    showQCError('Error de conexión: '+e.message+'. Revisa la consola del navegador.');
  });
}

function showQCError(msg){
  document.getElementById('qc-ai-result').innerHTML='<div class="alert alert-a"><span class="alert-icon">⚠️</span><div style="font-weight:500">'+msg+'</div></div>';
  document.getElementById('qc-ai-result').classList.remove('hidden');
  document.getElementById('qc-form').classList.remove('hidden');
  document.getElementById('qc-save-btn').classList.remove('hidden');
}

function doQuickSave(){
  var title=document.getElementById('qc-title').value.trim();
  var due=document.getElementById('qc-dd').value;
  if(!title){alert('El título es obligatorio');return;}
  if(!due)due=new Date().toISOString().split('T')[0];
  var impEl=document.getElementById('qc-imp');
  var t={id:'t'+Date.now(),title:title,desc:'',iid:document.getElementById('qc-ini').value,cat:document.getElementById('qc-cat').value||'Ejecución',area:document.getElementById('qc-area').value||AREAS[0].name,sh:document.getElementById('qc-sh').value,sd:todayStr(),dd:due,status:'Pendiente',prio:document.getElementById('qc-prio').value||'Media',crit:'Media',impact:impEl?impEl.value:'Medio',effort:1,spent:0,prog:0,deps:'',next:document.getElementById('qc-next').value,exec:false,diary:[]};
  tasks.push(t);saveTask(t);closeModal();redraw();toast('Tarea creada ✓');updateNotifBadge();
}

// ===== AREAS MODAL =====
function showAreasModal(){
  function buildRows(){return AREAS.map(function(a,i){
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">'+
      '<div style="width:16px;height:16px;border-radius:50%;background:'+a.color+';flex-shrink:0;cursor:pointer;box-shadow:0 0 0 3px rgba(0,0,0,.08)" onclick="pickColor('+i+')" title="Cambiar color"></div>'+
      '<span style="flex:1;font-size:13px;font-weight:500">'+a.name+'</span>'+
      '<div style="display:flex;gap:4px">'+
      (i>0?'<button class="btn btnsm" onclick="moveArea('+i+',-1)">↑</button>':'<span style="width:36px"></span>')+
      (i<AREAS.length-1?'<button class="btn btnsm" onclick="moveArea('+i+',1)">↓</button>':'<span style="width:36px"></span>')+
      '<button class="btn btnsm" onclick="renameArea('+i+')">✏️</button>'+
      '<button class="btn btnsm btnd" onclick="delArea('+i+')">✕</button>'+
      '</div></div>';}).join('');}
  document.getElementById('modal').innerHTML=
    '<div class="mhdr"><div><div class="mtitle">⚙️ Gestionar áreas</div><div class="msubt">Personaliza colores, nombres y orden</div></div><button class="xbtn" onclick="closeModal()">✕</button></div>'+
    '<div class="hint hint-a">Haz clic en el círculo de color para cambiarlo. Usa ↑↓ para reordenar.</div>'+
    '<div id="areas-list">'+buildRows()+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:16px;border-top:1px solid var(--border);padding-top:16px">'+
    '<input class="finput" id="new-area" placeholder="Nombre de la nueva área..." style="flex:1">'+
    '<button class="btn btnp" onclick="addArea()">+ Añadir</button></div>'+
    '<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  document.getElementById('overlay').classList.remove('hidden');
}

function refreshAreasList(){var el=document.getElementById('areas-list');if(!el)return;el.innerHTML=AREAS.map(function(a,i){return'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><div style="width:16px;height:16px;border-radius:50%;background:'+a.color+';flex-shrink:0;cursor:pointer;box-shadow:0 0 0 3px rgba(0,0,0,.08)" onclick="pickColor('+i+')" title="Cambiar color"></div><span style="flex:1;font-size:13px;font-weight:500">'+a.name+'</span><div style="display:flex;gap:4px">'+(i>0?'<button class="btn btnsm" onclick="moveArea('+i+',-1)">↑</button>':'<span style="width:36px"></span>')+(i<AREAS.length-1?'<button class="btn btnsm" onclick="moveArea('+i+',1)">↓</button>':'<span style="width:36px"></span>')+'<button class="btn btnsm" onclick="renameArea('+i+')">✏️</button><button class="btn btnsm btnd" onclick="delArea('+i+')">✕</button></div></div>';}).join('');}
function moveArea(i,dir){var tmp=AREAS[i];AREAS[i]=AREAS[i+dir];AREAS[i+dir]=tmp;saveSettings();renderSidebar();refreshAreasList();}
function pickColor(i){
  var old=document.getElementById('cp-row');if(old)old.remove();
  var row=document.createElement('div');row.id='cp-row';row.style.cssText='display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--bg3);border-radius:var(--radius-lg);margin:4px 0';
  row.innerHTML=PALETTE.map(function(c){return'<div class="color-swatch'+(c===AREAS[i].color?' sel':'')+'" style="background:'+c+'" onclick="setAreaColor('+i+',\''+c+'\')"></div>';}).join('');
  var list=document.getElementById('areas-list');if(list)list.insertBefore(row,list.children[i].nextSibling);
}
function setAreaColor(i,c){AREAS[i].color=c;saveSettings();renderSidebar();refreshAreasList();var old=document.getElementById('cp-row');if(old)old.remove();}
function addArea(){var inp=document.getElementById('new-area'),name=inp.value.trim();if(!name)return;if(AREAS.some(function(a){return a.name===name;})){alert('Esa área ya existe');return;}AREAS.push({name:name,color:PALETTE[AREAS.length%PALETTE.length]});saveSettings();renderSidebar();showAreasModal();toast('Área añadida ✓');}
function renameArea(i){var cur=AREAS[i].name,nw=prompt('Nuevo nombre:',cur);if(!nw||!nw.trim()||nw.trim()===cur)return;nw=nw.trim();if(AREAS.some(function(a){return a.name===nw;})){alert('Esa área ya existe');return;}tasks.forEach(function(t){if(t.area===cur){t.area=nw;saveTask(t);}});initiatives.forEach(function(ini){if(ini.area===cur)ini.area=nw;ini.otherAreas=ini.otherAreas.map(function(a){return a===cur?nw:a;});});AREAS[i].name=nw;if(areaFilter===cur)areaFilter=nw;saveSettings();renderSidebar();showAreasModal();toast('Área renombrada ✓');}
function delArea(i){var name=AREAS[i].name,inUse=tasks.filter(function(t){return t.area===name;}).length;if(!confirm(inUse>0?'El área "'+name+'" tiene '+inUse+' tareas. ¿Eliminar igualmente?':'¿Eliminar "'+name+'"?'))return;if(inUse>0)tasks.forEach(function(t){if(t.area===name){t.area='';saveTask(t);}});AREAS.splice(i,1);if(areaFilter===name)areaFilter='all';saveSettings();renderSidebar();showAreasModal();toast('Área eliminada');}

function closeModal(){document.getElementById('overlay').classList.add('hidden');}

// ===== PWA + NOTIFS =====
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
function requestNotifPermission(){if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();}
function checkAndNotify(){var a=getAlerts().filter(function(a){return a.level==='red';});if(a.length&&'Notification' in window&&Notification.permission==='granted')new Notification('BDFlow — '+a.length+' alerta'+(a.length>1?'s':''),{body:a[0].msg,icon:'/icon-192.png'});}

// ===== INIT =====
renderSidebar();
loadAll();
requestNotifPermission();
setInterval(function(){updateNotifBadge();},60000);
setInterval(function(){checkAndNotify();},3600000);
</script>
</body>
</html>
