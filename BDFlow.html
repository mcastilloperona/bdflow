<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BDFlow 2.9.1</title>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px}
.card{background:white;padding:20px;border-radius:10px;max-width:800px;margin:auto;margin-bottom:15px}
label{font-size:12px;color:#6b7280}
input,select,textarea{width:100%;padding:8px;margin-top:4px;margin-bottom:12px}
button{padding:8px 12px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer}
.task{border:1px solid #ddd;padding:12px;border-radius:8px;margin-top:10px}
small{color:#6b7280}
</style>
</head>
<body>

<div class="card">
<h2>BDFlow 2.9.1</h2>

<label>Título</label>
<input id="title">

<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Área</label>
<input id="area">

<label>Iniciativa</label>
<input id="initiative">

<label>Estado</label>
<select id="status">
<option>Pendiente</option>
<option>En curso</option>
<option>Pausada</option>
<option>Finalizada</option>
</select>

<label>Prioridad</label>
<select id="priority">
<option>Alta</option>
<option>Media</option>
<option>Baja</option>
</select>

<label>Fecha objetivo (opcional)</label>
<input id="due" placeholder="Sin fecha = tarea continua">

<label>Horas previstas</label>
<input id="effort" type="number">

<label>Siguiente paso</label>
<input id="next">

<button onclick="saveTask()">Guardar</button>
</div>

<div id="tasks"></div>

<script>

const KEY = 'bdflow_v262_state';
let state = JSON.parse(localStorage.getItem(KEY)) || {tasks:[]};

function saveTask(){
const task={
id:Date.now(),
title:title.value,
desc:desc.value,
area:area.value,
initiative:initiative.value,
status:status.value,
priority:priority.value,
due:due.value || "",
effort:Number(effort.value||0),
spent:0,
next:next.value,
worklog:[]
};
state.tasks.push(task);
persist();
clearForm();
}

function addWork(id){
const t=state.tasks.find(x=>x.id===id);
t.worklog.push({date:new Date().toLocaleDateString(),hours:1});
t.spent+=1;
persist();
}

function persist(){
localStorage.setItem(KEY,JSON.stringify(state));
render();
}

function clearForm(){
title.value="";
desc.value="";
area.value="";
initiative.value="";
status.value="Pendiente";
priority.value="Alta";
due.value="";
effort.value="";
next.value="";
}

function render(){
document.getElementById('tasks').innerHTML = state.tasks.map(t=>{
const last = t.worklog.length ? t.worklog[t.worklog.length-1].date : "-";
return `
<div class="task">
<b>${t.title}</b><br>
${t.desc}<br><br>

<small>
Estado: ${t.status} |
Total: ${t.spent}h |
Sesiones: ${t.worklog.length} |
Última: ${last} |
${t.due ? "Fecha: "+t.due : "Sin fecha"}
</small><br><br>

<button onclick="addWork(${t.id})">+1h</button>
</div>
`;
}).join("");
}

render();

</script>

</body>
</html>
