<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDFlow Ver. 2.7</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
.sidebar{width:240px;background:#1f2937;color:#fff;position:fixed;height:100%;padding:20px}
.sidebar h2{margin-top:0}
.sidebar .bottom{position:absolute;bottom:20px;width:200px}
.main{margin-left:260px;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#e5e7eb}
</style>
</head>
<body>

<div class="sidebar">
<h2>BDFlow 2.7</h2>

<div class="bottom">
<hr>
<button class="btn secondary" onclick="exportData()">Exportar</button><br><br>
<input type="file" id="importFile" style="display:none" onchange="importData(event)">
<button class="btn secondary" onclick="document.getElementById('importFile').click()">Importar</button>
</div>
</div>

<div class="main">
<h1>Dashboard</h1>

<div class="card">
<h3>Crear Área</h3>
<input id="newArea">
<button class="btn primary" onclick="addArea()">Añadir</button>
<ul id="areaList"></ul>
</div>

<div class="card">
<h3>Crear Tarea</h3>
<input id="taskTitle" placeholder="Título">
<select id="taskArea"></select>
<button class="btn primary" onclick="addTask()">Crear</button>
</div>

<div id="tasks"></div>

</div>

<script>

const KEY = 'bdflow_v262_state'

let state = JSON.parse(localStorage.getItem(KEY)) || {
areas:['General'],
tasks:[]
}

function save(){
localStorage.setItem(KEY, JSON.stringify(state))
render()
}

function addArea(){
const val = document.getElementById('newArea').value
if(!val) return
state.areas.push(val)
document.getElementById('newArea').value=''
save()
}

function addTask(){
const title = document.getElementById('taskTitle').value
const area = document.getElementById('taskArea').value
if(!title) return

state.tasks.push({
id:Date.now(),
title,
area,
status:'Activa',
history:[]
})

save()
}

function pauseTask(id){
const t = state.tasks.find(t=>t.id===id)
t.status='Pausada'
save()
}

function addSession(id){
const t = state.tasks.find(t=>t.id===id)
t.history.push({
date:new Date().toLocaleDateString(),
hours:1
})
save()
}

function render(){
document.getElementById('areaList').innerHTML =
state.areas.map(a=>'<li>'+a+'</li>').join('')

document.getElementById('taskArea').innerHTML =
state.areas.map(a=>'<option>'+a+'</option>').join('')

document.getElementById('tasks').innerHTML =
state.tasks.map(t=>`
<div class="card">
<b>${t.title}</b> (${t.area}) - ${t.status}<br>
<button onclick="pauseTask(${t.id})">Pausar</button>
<button onclick="addSession(${t.id})">+1h</button>
<ul>
${t.history.map(h=>'<li>'+h.date+' - '+h.hours+'h</li>').join('')}
</ul>
</div>
`).join('')
}

function exportData(){
const blob = new Blob([JSON.stringify(state)], {type:'application/json'})
const a = document.createElement('a')
a.href = URL.createObjectURL(blob)
a.download = 'backup.json'
a.click()
}

function importData(e){
const file = e.target.files[0]
const reader = new FileReader()
reader.onload = function(evt){
state = JSON.parse(evt.target.result)
save()
}
reader.readAsText(file)
}

render()

</script>

</body>
</html>
