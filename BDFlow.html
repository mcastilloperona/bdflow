*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--bg2:#fff;--bg3:#f1efe8;

  --text:#1a1a18;--text2:#5a5a56;--text3:#8a8a84;
  --red:#e24b4a;--red-bg:#fcebeb;--red-text:#791f1f;
  --amber:#ba7517;--amber-bg:#faeeda;--amber-text:#633806;
  --green:#3b6d11;--green-bg:#eaf3de;--green-text:#173404;
  --blue:#185fa5;--blue-bg:#e6f1fb;--blue-text:#042c53;
  --purple:#534ab7;--purple-bg:#eeedfe;--purple-text:#26215c;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-text:#04342c;

}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.logo{font-weight:700;font-size:16px;margin-right:12px}.logo span{color:var(--blue)}
.navtabs{display:flex;gap:2px;flex:1}
.ntab{padding:7px 13px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;white-space:nowrap;font-family:inherit}
.ntab:hover{background:var(--bg3)}.ntab.on{background:var(--blue-bg);color:var(--blue);font-weight:600}
.tactions{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:7px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
.btn:hover{background:var(--bg3)}
.btnp{background:var(--blue);color:#fff;border-color:var(--blue)}.btnp:hover{background:#0d4d8a}
.btnd{background:var(--red);color:#fff;border-color:var(--red)}.btnd:hover{background:#c03a39}

.slabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:0 8px 6px;display:flex;align-items:center;justify-content:space-between}
.slabel button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:0}
.sitem{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sitem:hover{background:var(--bg3)}.sitem.on{background:var(--blue-bg);color:var(--blue);font-weight:600}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.scnt{margin-left:auto;font-size:11px;background:var(--bg3);border-radius:10px;padding:1px 7px;color:var(--text3);font-weight:600}
.ssec{margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.ctitle{font-size:13px;font-weight:700;margin-bottom:10px}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.mcard{background:var(--bg3);border-radius:10px;padding:14px 16px}
.mlbl{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

.br{background:var(--red-bg);color:var(--red-text)}.ba{background:var(--amber-bg);color:var(--amber-text)}

.bp{background:var(--purple-bg);color:var(--purple-text)}.bt{background:var(--teal-bg);color:var(--teal-text)}
.bc{background:var(--coral-bg);color:var(--coral-text)}.bx{background:var(--bg3);color:var(--text2)}
.trow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);margin-bottom:6px;cursor:pointer}

.trow.blk{border-left:3px solid var(--red)}.trow.wait{border-left:3px solid var(--amber)}
.ttitle{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ph{background:var(--red)}.pm{background:var(--amber)}.pl{background:var(--green)}

.pfill{height:100%;border-radius:3px;background:var(--blue)}

.stitle{font-size:15px;font-weight:700}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;border:1px solid}
.alert-r{background:var(--red-bg);color:var(--red-text);border-color:var(--red)}
.alert-a{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber)}
.alert-g{background:var(--green-bg);color:var(--green-text);border-color:var(--green)}
.alert-b{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue)}

.kcol{min-width:230px;flex:1;background:var(--bg3);border-radius:12px;padding:14px}

.wtrack{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.wfill{height:100%;border-radius:4px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:14px;padding:22px;width:640px;max-width:96vw;max-height:92vh;overflow-y:auto;border:1px solid var(--border2);box-shadow:0 20px 60px rgba(0,0,0,.2)}

.mtitle{font-size:16px;font-weight:700}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{margin-bottom:12px}
.flbl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}

.dtask{background:var(--bg2);border-radius:6px;padding:6px 8px;margin-bottom:5px;font-size:11px;border-left:3px solid var(--blue);cursor:pointer}

.hint-b{background:var(--blue-bg);color:var(--blue-text)}.hint-g{background:var(--green-bg);color:var(--green-text)}
.diary-entry{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px}
.diary-date{font-weight:600;color:var(--text2);margin-bottom:3px;font-size:11px}
.diary-hours{display:inline-block;background:var(--blue-bg);color:var(--blue-text);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:600;margin-right:6px}
#sync-status{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
.sync-ok{background:var(--green-bg);color:var(--green-text)}
.sync-saving{background:var(--amber-bg);color:var(--amber-text)}
.sync-err{background:var(--red-bg);color:var(--red-text)}
.notif-bell{position:relative;cursor:pointer;background:none;border:none;font-size:18px;padding:4px 8px}
.notif-badge{position:absolute;top:0;right:0;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.quick-chip{display:inline-block;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);font-size:12px;cursor:pointer;margin:3px;background:var(--bg2)}
.quick-chip:hover{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text)}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:inline-block}
.color-swatch.sel{border-color:var(--text)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hidden{display:none!important}
</style>

<div style="display:flex;flex-direction:column;height:100vh">

      </div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

function setSS(s){var el=document.getElementById('sync-status');if(!el)return;if(s==='ok'){el.className='sync-ok';el.textContent='● Sincronizado';}else if(s==='saving'){el.className='sync-saving';el.textContent='● Guardando...';}else{el.className='sync-err';el.textContent='● Error de red';}}
function saveTask(t){setSS('saving');return sbUpsert('tasks',{id:t.id,data:t}).then(function(){setSS('ok');}).catch(function(){setSS('err');});}
function saveIni(ini){setSS('saving');return sbUpsert('initiatives',{id:ini.id,data:ini}).then(function(){setSS('ok');}).catch(function(){setSS('err');});}
function saveSettings(){setSS('saving');return Promise.all([sbUpsert('settings',{key:'areas',value:AREAS}),sbUpsert('settings',{key:'capacity',value:CAP})]).then(function(){setSS('ok');}).catch(function(){setSS('err');});}

function loadAll(){
  set('<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3)">Cargando datos...</div>');
  return Promise.all([sbGet('tasks'),sbGet('initiatives'),sbGet('settings')]).then(function(res){
    var tR=res[0],iR=res[1],sR=res[2];
    if(Array.isArray(tR))tasks=tR.map(function(r){return r.data;}).filter(Boolean);
    if(Array.isArray(iR))initiatives=iR.map(function(r){return r.data;}).filter(Boolean);
    if(Array.isArray(sR))sR.forEach(function(r){
      if(r.key==='areas'&&Array.isArray(r.value)&&r.value.length){
        var loaded=r.value;
        if(loaded.length&&typeof loaded[0]==='string'){
          var defColors=['#3b6d11','#ba7517','#534ab7','#993c1d','#0f6e56','#e24b4a','#8a8a84','#185fa5','#9c3d8f','#c07a00'];
          AREAS=loaded.map(function(n,i){return{name:n,color:defColors[i%defColors.length]};});
        } else {
          AREAS=loaded.filter(function(a){return a&&a.name;});
        }
      }
      if(r.key==='capacity'){CAP=parseInt(r.value)||6;var el=document.getElementById('cap-input');if(el)el.value=CAP;}
    });
    setSS('ok');updateNotifBadge();redraw();
  }).catch(function(){setSS('err');redraw();});}

function getAlerts(){
  var alerts=[];
  var today=new Date();today.setHours(0,0,0,0);
  tasks.forEach(function(t){
    if(t.status==='Finalizada')return;
    var due=new Date(t.dd+'T12:00:00');due.setHours(0,0,0,0);
    var dl=Math.ceil((due-today)/86400000);
    if(dl<0)alerts.push({type:'overdue',msg:'Vencida hace '+Math.abs(dl)+'d: '+t.title,task:t,level:'red'});
    else if(dl===0)alerts.push({type:'today',msg:'Vence HOY: '+t.title,task:t,level:'red'});
    else if(dl<=2)alerts.push({type:'soon',msg:'Vence en '+dl+'d: '+t.title,task:t,level:'amber'});
    if(t.status==='Bloqueada'){
      var sd=t.sd?new Date(t.sd+'T12:00:00'):null;
      if(sd){var bdays=Math.ceil((today-sd)/86400000);if(bdays>=3)alerts.push({type:'blocked',msg:'Bloqueada '+bdays+'d: '+t.title,task:t,level:'red'});}
    }
    if(t.diary&&t.diary.length>0){
      var last=new Date(t.diary[t.diary.length-1].date+'T12:00:00');last.setHours(0,0,0,0);
      var idle=Math.ceil((today-last)/86400000);
      if(idle>=5)alerts.push({type:'idle',msg:'Sin actividad '+idle+'d: '+t.title,task:t,level:'amber'});
    } else if(t.status==='En curso'){
      alerts.push({type:'idle',msg:'Sin actividad registrada: '+t.title,task:t,level:'amber'});
    }
  });
  return alerts;
}

function updateNotifBadge(){
  var alerts=getAlerts();
  var badge=document.getElementById('notif-count');
  var btn=document.getElementById('notif-btn');
  if(!badge||!btn)return;
  if(alerts.length>0){badge.classList.remove('hidden');badge.textContent=alerts.length>9?'9+':alerts.length;}
  else{badge.classList.add('hidden');}
}

function showNotifications(){
  var alerts=getAlerts();
  var html='<div class="mhdr"><div class="mtitle">Alertas activas</div><button class="xbtn" onclick="closeModal()">✕</button></div>';
  if(!alerts.length){html+='<div class="alert alert-g"><span>✅</span>Sin alertas activas. Todo bajo control.</div>';}
  else{
    html+=alerts.map(function(a){
      var cls=a.level==='red'?'alert-r':'alert-a';
      var icon=a.level==='red'?'⚠️':'⏰';
      return '<div class="alert '+cls+'" style="cursor:pointer" onclick="closeModal();openTask(\''+a.task.id+'\')"><span>'+icon+'</span><div>'+a.msg+'<div style="font-size:11px;margin-top:2px;opacity:.8">→ '+a.task.next+'</div></div></div>';
    }).join('');
  }
  html+='<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  document.getElementById('modal').innerHTML=html;
  document.getElementById('overlay').classList.remove('hidden');
}

  document.getElementById('qc-input').focus();
}

function parseQuick(){
  var input=document.getElementById('qc-input').value.trim();
  if(!input)return;
  var title=input;
  var cat='Ejecución',prio='Media',sh='';
  var lower=input.toLowerCase();
  if(lower.indexOf('reunión')>=0||lower.indexOf('reunion')>=0||lower.indexOf('call')>=0||lower.indexOf('meeting')>=0){cat='Reunión';prio='Alta';}
  else if(lower.indexOf('propuesta')>=0||lower.indexOf('proposal')>=0){cat='Propuesta';prio='Alta';}
  else if(lower.indexOf('análisis')>=0||lower.indexOf('analisis')>=0||lower.indexOf('análisis')>=0){cat='Análisis';}
  else if(lower.indexOf('seguimiento')>=0||lower.indexOf('follow')>=0){cat='Seguimiento';}
  else if(lower.indexOf('presentación')>=0||lower.indexOf('presentacion')>=0||lower.indexOf('deck')>=0){cat='Presentación';prio='Alta';}
  else if(lower.indexOf('reporte')>=0||lower.indexOf('informe')>=0){cat='Reporte';}
  else if(lower.indexOf('escalado')>=0||lower.indexOf('bloqueo')>=0){cat='Escalado';prio='Alta';}
  var conWords=['con ','with '];
  conWords.forEach(function(w){var idx=lower.indexOf(w);if(idx>=0){var rest=input.substring(idx+w.length);var shEnd=rest.search(/\s(el|la|los|las|para|sobre|de|a )/i);sh=shEnd>0?rest.substring(0,shEnd):rest.split(' ').slice(0,3).join(' ');}});
  var todayD=new Date();var ddD=new Date(todayD);
  ['lunes','martes','miércoles','jueves','viernes'].forEach(function(d,i){if(lower.indexOf(d)>=0){var dow=todayD.getDay();var diff=(i+1-dow+7)%7||7;ddD=new Date(todayD);ddD.setDate(todayD.getDate()+diff);}});
  if(lower.indexOf('mañana')>=0){ddD=new Date(todayD);ddD.setDate(todayD.getDate()+1);}
  if(lower.indexOf('hoy')>=0){ddD=new Date(todayD);}
  var ddStr=ddD.toISOString().split('T')[0];
  document.getElementById('qc-form').classList.remove('hidden');
  document.getElementById('qc-save-btn').classList.remove('hidden');
  document.getElementById('qc-title').value=title;
  document.getElementById('qc-dd').value=ddStr;
  var catSel=document.getElementById('qc-cat');
  if(catSel)for(var i=0;i<catSel.options.length;i++){if(catSel.options[i].value===cat){catSel.selectedIndex=i;break;}}
  var prioSel=document.getElementById('qc-prio');
  if(prioSel)for(var i=0;i<prioSel.options.length;i++){if(prioSel.options[i].value===prio){prioSel.selectedIndex=i;break;}}
  if(sh)document.getElementById('qc-sh').value=sh;
}

// ===== HELPERS =====
function score(t){var im={Alto:3,Medio:2,Bajo:1},pr={Alta:3,Media:2,Baja:1};var td=new Date();td.setHours(0,0,0,0);var due=new Date(t.dd+'T12:00:00');due.setHours(0,0,0,0);var d=Math.ceil((due-td)/86400000);var urg=d<=2?3:d<=7?2:1;var blk=t.status==='Bloqueada'?3:t.status==='En espera de terceros'?2:1;var dep=(t.deps&&t.deps.trim())?2:1;var vis=t.exec?2:1;return(im[t.impact]||1)*.30+urg*.20+(pr[t.crit]||1)*.20+blk*.15+dep*.10+vis*.05;}
function scoreN(t){return Math.round(score(t)*100/3);}
function srt(arr){return arr.slice().sort(function(a,b){return score(b)-score(a);});}
function today(){var d=new Date();d.setHours(0,0,0,0);return d;}
function dd(s){var d=new Date(s+'T12:00:00');d.setHours(0,0,0,0);return d;}
function dl(s){return Math.ceil((dd(s)-today())/86400000);}
function overdue(t){return t.status!=='Finalizada'&&dl(t.dd)<0;}
function thisWeek(t){var d=dl(t.dd);return d>=0&&d<=7&&t.status!=='Finalizada';}
function getIni(id){for(var i=0;i<initiatives.length;i++){if(initiatives[i].id===id)return initiatives[i];}return{name:'Sin iniciativa',type:''};}
function fmt(s){if(!s)return'—';var d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function aclr(name){for(var i=0;i<AREAS.length;i++){if(AREAS[i].name===name)return AREAS[i].color;}return'#8a8a84';}
function filtered(){var t=tasks.slice();if(areaFilter!=='all')t=t.filter(function(x){return x.area===areaFilter;});if(statusFilter)t=t.filter(function(x){return x.status===statusFilter;});return t;}
function bdg(cls,txt){return'<span class="badge '+cls+'">'+txt+'</span>';}
function pbdg(p){return bdg(p==='Alta'?'br':p==='Media'?'ba':'bg',p);}
function sbdg(s){var m={Pendiente:'bx','En curso':'bb',Bloqueada:'br','En espera de terceros':'ba',Finalizada:'bg'};return bdg(m[s]||'bx',s);}
function abdg(a){var m={Ventas:'bg',Preventa:'ba',Producto:'bp',Marketing:'bc',Partners:'bt',Dirección:'br',Operaciones:'bx'};return bdg(m[a]||'bx',a);}
function ibdg(i){return bdg(i==='Alto'?'br':i==='Medio'?'ba':'bg',i);}

function updateCounts(){
  function s(id,n){var e=document.getElementById(id);if(e)e.textContent=n;}
  s('cnt-all',tasks.length);
  AREAS.forEach(function(a){s('cnt-'+a.name,tasks.filter(function(t){return t.area===a.name;}).length);});

// ===== ALERT PANEL (inline in dashboard) =====
function buildAlertPanel(){
  var alerts=getAlerts();
  if(!alerts.length)return'<div class="alert alert-g"><span>✅</span>Sin alertas. Todo bajo control.</div>';
  var reds=alerts.filter(function(a){return a.level==='red';}).slice(0,3);
  var ambs=alerts.filter(function(a){return a.level==='amber';}).slice(0,2);
  var html='';
  reds.forEach(function(a){html+='<div class="alert alert-r" style="cursor:pointer;margin-bottom:6px" onclick="openTask(\''+a.task.id+'\')"><span>⚠️</span><div style="min-width:0"><div style="font-weight:600;font-size:12px">'+a.msg+'</div><div style="font-size:11px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">→ '+a.task.next+'</div></div></div>';});
  ambs.forEach(function(a){html+='<div class="alert alert-a" style="cursor:pointer;margin-bottom:6px" onclick="openTask(\''+a.task.id+'\')"><span>⏰</span><div style="min-width:0"><div style="font-weight:600;font-size:12px">'+a.msg+'</div><div style="font-size:11px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">→ '+a.task.next+'</div></div></div>';});

  return html;
}

// ===== WEEKLY =====
function vWeekly(){
  var td=new Date();td.setHours(0,0,0,0);var dow=td.getDay(),mon=new Date(td);mon.setDate(td.getDate()-(dow===0?6:dow-1));
  var days=['Lun','Mar','Mié','Jue','Vie'];
  var dates=days.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  var all=filtered().filter(function(t){return t.status!=='Finalizada';});
  var totH=all.reduce(function(s,t){return s+Math.max(0,t.effort-t.spent);},0);
  var cap=CAP*5,wp=Math.min(100,Math.round(totH/cap*100));
  var cols=dates.map(function(d,i){
    var dt=srt(all.filter(function(t){var due=dd(t.dd),start=dd(t.sd);return due.getTime()===d.getTime()||(start<=d&&due>=d);})).slice(0,5);
    var dh=dt.reduce(function(s,t){return s+Math.max(0,t.effort-t.spent)/Math.max(1,Math.ceil((dd(t.dd)-dd(t.sd))/86400000)+1);},0);
    var isTd=d.getTime()===td.getTime();
    return'<div class="dcol" style="'+(isTd?'border:2px solid var(--blue)':'')+'"><div class="dhdr" style="color:'+(isTd?'var(--blue)':'var(--text2)')+'">'+days[i]+' '+d.getDate()+'</div>'+(dt.length?dt.map(function(t){return'<div class="dtask '+(t.prio==='Alta'?'alta':t.prio==='Media'?'media':'')+'" onclick="openTask(\''+t.id+'\')" title="'+t.title+'"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">'+t.title+'</div><div style="color:var(--text3);margin-top:2px">'+t.area+'</div></div>';}).join(''):'<div style="color:var(--text3);font-size:11px;text-align:center;padding:14px 0;opacity:.6">Libre</div>')+'<div style="font-size:10px;text-align:center;margin-top:6px;color:'+(dh>CAP?'var(--red)':'var(--text3)')+'">'+dh.toFixed(1)+'h</div></div>';}).join('');
  var allRows=srt(all.filter(function(t){return dd(t.dd)>=mon&&dd(t.sd)<=dates[4];})).map(function(t){return'<div class="trow'+(t.status==='Bloqueada'?' blk':t.status==='En espera de terceros'?' wait':'')+'" onclick="openTask(\''+t.id+'\')"><div class="pdot '+(t.prio==='Alta'?'ph':t.prio==='Media'?'pm':'pl')+'"></div><div style="flex:1;min-width:0"><div class="ttitle">'+t.title+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+t.sh+' · '+getIni(t.iid).name+'</div></div><div style="display:flex;align-items:center;gap:6px">'+abdg(t.area)+sbdg(t.status)+'<span style="font-size:11px;color:var(--text3)">'+fmt(t.dd)+'</span></div></div>';}).join('')||'<div style="color:var(--text3);font-size:13px;padding:8px 0">Sin tareas</div>';
  set('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:16px;font-weight:700">Semana '+mon.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+' – '+new Date(mon.getTime()+4*86400000).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+'</div><div style="font-size:13px;color:'+(totH>cap?'var(--red)':'var(--text2)')+'">'+totH.toFixed(0)+'h / '+cap+'h</div></div><div style="margin-bottom:14px"><div class="wtrack" style="height:10px"><div class="wfill" style="width:'+wp+'%;background:'+(totH>cap?'var(--red)':totH>cap*.75?'var(--amber)':'var(--blue)')+'"></div></div><div style="font-size:11px;color:var(--text3);margin-top:3px">'+wp+'% de capacidad</div></div><div class="wgrid">'+cols+'</div><div style="margin-top:16px"><div class="sh"><div class="stitle">Tareas de la semana</div></div>'+allRows+'</div>');
}

  var diaryHtml=t.diary.length?t.diary.slice().reverse().map(function(e){return'<div class="diary-entry"><div class="diary-date">'+fmt(e.date)+'</div><span class="diary-hours">'+e.hours+'h</span>'+e.note+'</div>';}).join(''):'<div style="color:var(--text3);font-size:12px;padding:8px 0">Sin entradas. Registra tu trabajo de hoy.</div>';

    '<div><label class="flbl">Fecha límite</label><input type="date" class="finput" id="tf-dd" value="'+t.dd+'"></div>'+
    '</div>'+
    '<div class="frow" style="margin-bottom:12px">'+
    '<div><label class="flbl">Esfuerzo estimado (h)</label><input type="number" class="finput" id="tf-effort" value="'+t.effort+'" min="0" step="0.5"></div>'+
    '<div><label class="flbl">Categoría</label><select class="fsel" id="tf-cat">'+CAT.map(function(c){return'<option'+(t.cat===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'+
    '</div>'+
    '<div class="fg"><label class="flbl">Dependencias</label><input class="finput" id="tf-deps" value="'+(t.deps||'')+'" placeholder="¿Qué necesitas de terceros?"></div>'+
    '<div class="fg"><label class="flbl">Próxima acción</label><input class="finput" id="tf-next" value="'+(t.next||'')+'" placeholder="Siguiente paso concreto"></div>'+
    '<div class="fg"><label class="flbl">Descripción / notas generales</label><textarea class="finput" id="tf-desc" rows="2" placeholder="Contexto y objetivo">'+t.desc+'</textarea></div>'+

    '<div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:10px">'+
    '<div class="frow" style="margin-bottom:8px">'+

function doSaveTaskEdit(id){
  for(var i=0;i<tasks.length;i++){
    if(tasks[i].id===id){
      tasks[i].status=document.getElementById('tf-status').value;
      tasks[i].prio=document.getElementById('tf-prio').value;
      tasks[i].prog=parseInt(document.getElementById('plbl').textContent)||0;
      tasks[i].dd=document.getElementById('tf-dd').value;
      tasks[i].effort=parseFloat(document.getElementById('tf-effort').value)||tasks[i].effort;
      tasks[i].cat=document.getElementById('tf-cat').value;
      tasks[i].deps=document.getElementById('tf-deps').value;
      tasks[i].next=document.getElementById('tf-next').value;
      tasks[i].desc=document.getElementById('tf-desc').value;
      saveTask(tasks[i]);toast('Cambios guardados');updateNotifBadge();updateCounts();break;
    }
  }
}

function addDiaryEntry(id){
  var hours=parseFloat(document.getElementById('diary-hours').value)||0;
  var note=document.getElementById('diary-note').value.trim();
  var date=document.getElementById('diary-date').value;
  if(!note){alert('Escribe qué has hecho');return;}
  for(var i=0;i<tasks.length;i++){
    if(tasks[i].id===id){
      if(!tasks[i].diary)tasks[i].diary=[];
      tasks[i].diary.push({date:date,hours:hours,note:note});
      tasks[i].spent=tasks[i].diary.reduce(function(s,e){return s+e.hours;},0);
      saveTask(tasks[i]);toast('Entrada añadida');closeModal();openTask(id);break;
    }
  }
}

function confirmDelete(id){
  if(!confirm('¿Eliminar esta tarea? Esta acción no se puede deshacer.'))return;
  if(!confirm('Confirma que quieres eliminar la tarea definitivamente.'))return;
  sbDelete('tasks',id);tasks=tasks.filter(function(t){return t.id!==id;});closeModal();redraw();toast('Tarea eliminada');}

  var list=document.getElementById('areas-list');if(list)list.insertBefore(row,list.children[i].nextSibling);
}
function setAreaColor(i,c){AREAS[i].color=c;saveSettings();renderSidebar();refreshAreasList();var old=document.getElementById('color-picker-row');if(old)old.remove();}
function addArea(){var inp=document.getElementById('new-area'),name=inp.value.trim();if(!name)return;if(AREAS.some(function(a){return a.name===name;})){alert('Esa área ya existe');return;}AREAS.push({name:name,color:PALETTE[AREAS.length%PALETTE.length]});saveSettings();renderSidebar();showAreasModal();toast('Área añadida');}
function renameArea(i){var cur=AREAS[i].name,nw=prompt('Nuevo nombre:',cur);if(!nw||!nw.trim()||nw.trim()===cur)return;nw=nw.trim();if(AREAS.some(function(a){return a.name===nw;})){alert('Esa área ya existe');return;}tasks.forEach(function(t){if(t.area===cur){t.area=nw;saveTask(t);}});initiatives.forEach(function(ini){if(ini.area===cur)ini.area=nw;ini.otherAreas=ini.otherAreas.map(function(a){return a===cur?nw:a;});});AREAS[i].name=nw;if(areaFilter===cur)areaFilter=nw;saveSettings();renderSidebar();showAreasModal();toast('Área renombrada');}
function delArea(i){var name=AREAS[i].name,inUse=tasks.filter(function(t){return t.area===name;}).length;if(!confirm(inUse>0?'El área "'+name+'" tiene '+inUse+' tareas. ¿Eliminar igualmente?':'¿Eliminar "'+name+'"?'))return;if(inUse>0)tasks.forEach(function(t){if(t.area===name){t.area='';saveTask(t);}});AREAS.splice(i,1);if(areaFilter===name)areaFilter='all';saveSettings();renderSidebar();showAreasModal();toast('Área eliminada');}

function closeModal(){document.getElementById('overlay').classList.add('hidden');}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

// ===== BROWSER NOTIFICATIONS =====
function requestNotifPermission(){if('Notification' in window&&Notification.permission==='default'){Notification.requestPermission();}}
function sendBrowserNotif(title,body){if('Notification' in window&&Notification.permission==='granted'){new Notification(title,{body:body,icon:'/icon-192.png'});}}
function checkAndNotify(){
  var alerts=getAlerts().filter(function(a){return a.level==='red';});
  if(alerts.length>0)sendBrowserNotif('BDFlow — '+alerts.length+' alerta'+(alerts.length>1?'s':''),alerts[0].msg);
}

// ===== INIT =====
renderSidebar();
loadAll();
requestNotifPermission();
setInterval(function(){updateNotifBadge();},60000);
setInterval(function(){checkAndNotify();},3600000);
</script>
