<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDFlow — Gestión BD SaaS</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#185fa5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BDFlow">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--bg2:#fff;--bg3:#f1efe8;
  --border:#e2e0d8;--border2:#ccc9bf;
  --text:#1a1a18;--text2:#5a5a56;--text3:#8a8a84;
  --red:#e24b4a;--red-bg:#fcebeb;--red-text:#791f1f;
  --amber:#ba7517;--amber-bg:#faeeda;--amber-text:#633806;
  --green:#3b6d11;--green-bg:#eaf3de;--green-text:#173404;
  --blue:#185fa5;--blue-bg:#e6f1fb;--blue-text:#042c53;
  --purple:#534ab7;--purple-bg:#eeedfe;--purple-text:#26215c;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-text:#04342c;
  --coral:#993c1d;--coral-bg:#faece7;--coral-text:#4a1b0c;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;height:52px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar-logo{font-weight:700;font-size:16px;color:var(--text);margin-right:12px}
.topbar-logo span{color:var(--blue)}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:7px 13px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border:none;background:none;white-space:nowrap;font-family:inherit}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.btn{padding:7px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0d4d8a}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.main-area{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 8px;overflow-y:auto;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:18px}
.sidebar-section{margin-bottom:18px}
.sidebar-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:0 8px 6px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
.sidebar-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sidebar-count{margin-left:auto;font-size:11px;background:var(--bg3);border-radius:10px;padding:1px 7px;color:var(--text3);font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.metric-card{background:var(--bg3);border-radius:10px;padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:24px;font-weight:700;color:var(--text);line-height:1.1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-purple{background:var(--purple-bg);color:var(--purple-text)}
.badge-teal{background:var(--teal-bg);color:var(--teal-text)}
.badge-coral{background:var(--coral-bg);color:var(--coral-text)}
.badge-gray{background:var(--bg3);color:var(--text2)}
.task-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);margin-bottom:6px;cursor:pointer;transition:all .15s}
.task-row:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.task-row.blocked{border-left:3px solid var(--red)}
.task-row.waiting{border-left:3px solid var(--amber)}
.task-title{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.priority-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.prio-high{background:var(--red)}
.prio-med{background:var(--amber)}
.prio-low{background:var(--green)}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;width:64px}
.progress-fill{height:100%;border-radius:3px;background:var(--blue)}
.score-badge{background:var(--blue-bg);color:var(--blue-text);border-radius:5px;padding:3px 7px;font-size:11px;font-weight:700;min-width:32px;text-align:center}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:700;color:var(--text)}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;border:1px solid}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-red{background:var(--red-bg);color:var(--red-text);border-color:var(--red)}
.alert-amber{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber)}
.alert-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green)}
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:400px}
.kanban-col{min-width:230px;flex:1;background:var(--bg3);border-radius:12px;padding:14px}
.kanban-col-header{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em}
.kanban-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.kanban-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kanban-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px}
.workload-container{margin-bottom:10px}
.workload-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.workload-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.workload-fill{height:100%;border-radius:4px;transition:width .4s}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:14px;padding:22px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid var(--border2);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.form-input{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.form-select{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:4px;line-height:1}
.initiative-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.initiative-progress-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.initiative-progress-fill{height:100%;background:var(--blue);border-radius:3px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.bar-h{height:16px;background:var(--blue);border-radius:3px;display:inline-block}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.day-col{background:var(--bg3);border-radius:10px;padding:12px;border:1px solid var(--border)}
.day-header{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;text-align:center}
.day-task{background:var(--bg2);border-radius:6px;padding:6px 8px;margin-bottom:5px;font-size:11px;border-left:3px solid var(--blue);cursor:pointer}
.day-task.alta{border-color:var(--red)}
.day-task.media{border-color:var(--amber)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="topbar-logo">BD<span>Flow</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('dashboard')">📊 Dashboard</button>
    <button class="nav-tab" onclick="showView('daily')">☀️ Hoy</button>
    <button class="nav-tab" onclick="showView('weekly')">📅 Semana</button>
    <button class="nav-tab" onclick="showView('initiatives')">🎯 Iniciativas</button>
    <button class="nav-tab" onclick="showView('kanban')">🗂 Kanban</button>
    <button class="nav-tab" onclick="showView('report')">📈 Reporting</button>
  </div>
  <div class="topbar-actions">
    <button class="btn" onclick="openModal('task')">+ Tarea</button>
    <button class="btn btn-primary" onclick="openModal('initiative')">+ Iniciativa</button>
  </div>
</div>
<div class="main-area">
<div class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Por área</div>
    <div class="sidebar-item active" onclick="filterArea('all',this)"><span class="sidebar-dot" style="background:var(--blue)"></span>Todas<span class="sidebar-count" id="count-all">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Ventas',this)"><span class="sidebar-dot" style="background:var(--green)"></span>Ventas<span class="sidebar-count" id="count-Ventas">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Producto',this)"><span class="sidebar-dot" style="background:var(--purple)"></span>Producto<span class="sidebar-count" id="count-Producto">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Marketing',this)"><span class="sidebar-dot" style="background:var(--coral)"></span>Marketing<span class="sidebar-count" id="count-Marketing">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Partners',this)"><span class="sidebar-dot" style="background:var(--teal)"></span>Partners<span class="sidebar-count" id="count-Partners">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Dirección',this)"><span class="sidebar-dot" style="background:var(--red)"></span>Dirección<span class="sidebar-count" id="count-Dirección">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Preventa',this)"><span class="sidebar-dot" style="background:var(--amber)"></span>Preventa<span class="sidebar-count" id="count-Preventa">0</span></div>
    <div class="sidebar-item" onclick="filterArea('Operaciones',this)"><span class="sidebar-dot" style="background:var(--text3)"></span>Operaciones<span class="sidebar-count" id="count-Operaciones">0</span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Por estado</div>
    <div class="sidebar-item" onclick="filterStatus('Bloqueada',this)"><span class="sidebar-dot" style="background:var(--red)"></span>Bloqueadas<span class="sidebar-count" id="count-Bloqueada">0</span></div>
    <div class="sidebar-item" onclick="filterStatus('En espera de terceros',this)"><span class="sidebar-dot" style="background:var(--amber)"></span>En espera<span class="sidebar-count" id="count-Espera">0</span></div>
    <div class="sidebar-item" onclick="filterStatus('Finalizada',this)"><span class="sidebar-dot" style="background:var(--green)"></span>Finalizadas<span class="sidebar-count" id="count-Finalizada">0</span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Configuración</div>
    <div style="padding:6px 8px;font-size:12px;color:var(--text2);font-weight:600">Capacidad diaria</div>
    <div style="display:flex;align-items:center;gap:8px;padding:0 8px 10px">
      <input type="number" id="daily-capacity" value="6" min="1" max="12" style="width:55px;padding:5px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px" onchange="updateCapacity()">
      <span style="font-size:12px;color:var(--text3)">h/día</span>
    </div>
    <div style="padding:0 8px 8px">
      <button class="btn" style="width:100%;font-size:11px;padding:5px 8px" onclick="loadDemoData()">Cargar datos demo</button>
    </div>
    <div style="padding:0 8px 8px">
      <button class="btn btn-danger" style="width:100%;font-size:11px;padding:5px 8px" onclick="clearAllData()">Borrar todo</button>
    </div>
  </div>
</div>
<div class="content" id="main-content"></div>
</div>
</div>
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-body"></div>
</div>

function calcScore(t){
  const imp={Alto:3,Medio:2,Bajo:1};
  const pri={Alta:3,Media:2,Baja:1};
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(t.dueDate);
  const daysLeft=Math.ceil((due-today)/(1000*60*60*24));
  const urgency=daysLeft<=2?3:daysLeft<=7?2:1;
  const blocked=t.status==='Bloqueada'?3:t.status==='En espera de terceros'?2:1;
  const depRisk=t.deps&&t.deps.trim()?2:1;
  const visib=t.execVisibility?2:1;
  const score=(imp[t.businessImpact]||1)*.30+urgency*.20+(pri[t.criticality]||1)*.20+blocked*.15+depRisk*.10+visib*.05;
  return Math.round(score*100)/100;
}
function calcScoreDisplay(t){return Math.round(calcScore(t)*100/3);}
function sortedTasks(list){return [...list].sort((a,b)=>calcScore(b)-calcScore(a));}
function todayStr(){return new Date().toISOString().split('T')[0];}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dateObj(s){const d=new Date(s+'T12:00:00');d.setHours(0,0,0,0);return d;}
function daysLeft(s){return Math.ceil((dateObj(s)-todayDate())/(1000*60*60*24));}
function isOverdue(t){return t.status!=='Finalizada'&&daysLeft(t.dueDate)<0;}
function isThisWeek(t){const d=daysLeft(t.dueDate);return d>=0&&d<=7&&t.status!=='Finalizada';}
function getInitiative(id){return initiatives.find(i=>i.id===id)||{name:'Sin iniciativa',type:''};}
function priorityBadge(p){const c=p==='Alta'?'red':p==='Media'?'amber':'green';return `<span class="badge badge-${c}">${p}</span>`;}
function statusBadge(s){const m={Pendiente:'gray','En curso':'blue','Bloqueada':'red','En espera de terceros':'amber','Finalizada':'green'};return `<span class="badge badge-${m[s]||'gray'}">${s}</span>`;}
function areaBadge(a){const m={Ventas:'green',Preventa:'amber',Producto:'purple',Marketing:'coral',Partners:'teal',Dirección:'red',Operaciones:'gray'};return `<span class="badge badge-${m[a]||'gray'}">${a}</span>`;}
function impBadge(i){const c=i==='Alto'?'red':i==='Medio'?'amber':'green';return `<span class="badge badge-${c}">${i}</span>`;}
function areaColor(a){const m={Ventas:'#3b6d11',Preventa:'#ba7517',Producto:'#534ab7',Marketing:'#993c1d',Partners:'#0f6e56',Dirección:'#e24b4a',Operaciones:'#8a8a84'};return m[a]||'#185fa5';}
function formatDate(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}
function getFilteredTasks(){
  let t=[...tasks];
  if(activeAreaFilter!=='all')t=t.filter(x=>x.area===activeAreaFilter);
  if(activeStatusFilter)t=t.filter(x=>x.status===activeStatusFilter);
  return t;
}
function updateSidebarCounts(){
  document.getElementById('count-all').textContent=tasks.length;
  AREAS.forEach(a=>{const el=document.getElementById('count-'+a);if(el)el.textContent=tasks.filter(t=>t.area===a).length;});
  document.getElementById('count-Bloqueada').textContent=tasks.filter(t=>t.status==='Bloqueada').length;
  document.getElementById('count-Espera').textContent=tasks.filter(t=>t.status==='En espera de terceros').length;
  document.getElementById('count-Finalizada').textContent=tasks.filter(t=>t.status==='Finalizada').length;
}
function filterArea(area,el){activeAreaFilter=area;activeStatusFilter=null;document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');renderCurrentView();}
function filterStatus(status,el){if(activeStatusFilter===status){activeStatusFilter=null;el.classList.remove('active');}else{activeStatusFilter=status;document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');}renderCurrentView();}
function updateCapacity(){dailyCapacity=parseInt(document.getElementById('daily-capacity').value)||6;renderCurrentView();}

let currentView='dashboard';
function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    const views=['dashboard','daily','weekly','initiatives','kanban','report'];
    t.classList.toggle('active',views[i]===v);
  });
  renderCurrentView();
}
function renderCurrentView(){
  updateSidebarCounts();
  const fns={dashboard:renderDashboard,daily:renderDaily,weekly:renderWeekly,initiatives:renderInitiatives,kanban:renderKanban,report:renderReport};
  if(fns[currentView])fns[currentView]();
}

  const strategic=tasks.filter(t=>{const ini=getInitiative(t.initiativeId);return ['Iniciativa Estratégica','Oportunidad','Partner'].includes(ini.type)&&t.status!=='Finalizada';}).length;
  const total=tasks.filter(t=>t.status!=='Finalizada').length;
  const ratioStrat=total?Math.round(strategic/total*100):0;

  let alerts='';
  if(overdue.length)alerts+=`<div class="alert alert-red"><div class="alert-icon">⚠️</div><div><strong>${overdue.length} tarea${overdue.length>1?'s':''} vencida${overdue.length>1?'s':''}</strong> — atención inmediata requerida</div></div>`;
  if(blocked.length)alerts+=`<div class="alert alert-red"><div class="alert-icon">⛔</div><div><strong>${blocked.length} tarea${blocked.length>1?'s':''} bloqueada${blocked.length>1?'s':''}</strong> — desbloquear para continuar</div></div>`;

  document.getElementById('main-content').innerHTML=`
  ${alerts}
  <div class="grid-4" style="margin-bottom:14px">
    <div class="metric-card"><div class="metric-label">Tareas activas</div><div class="metric-value">${active.length}</div><div class="metric-sub">${overdue.length} vencidas</div></div>
    <div class="metric-card"><div class="metric-label">Esta semana</div><div class="metric-value">${thisWeek.length}</div><div class="metric-sub">vencimiento próximo</div></div>
    <div class="metric-card"><div class="metric-label">Bloqueadas</div><div class="metric-value" style="color:${blocked.length?'var(--red)':'var(--text)'}">${blocked.length}</div><div class="metric-sub">requieren acción</div></div>
    <div class="metric-card"><div class="metric-label">Ratio estratégico</div><div class="metric-value">${ratioStrat}%</div><div class="metric-sub">vs reactivo</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:14px">
    <div>
      <div class="card">
        <div class="section-header"><div class="card-title">Carga de trabajo — semana</div><span style="font-size:12px;color:var(--text3)">${hoursPlanned.toFixed(0)}h / ${capWeek}h</span></div>
        <div class="workload-container">
          <div class="workload-track"><div class="workload-fill" style="width:${wPct}%;background:${wColor}"></div></div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">${wPct}% de capacidad utilizada</div>
        </div>
        <div style="margin-top:12px">${AREAS.map(a=>{
          const ah=active.filter(t=>t.area===a).reduce((s,t)=>s+(t.effort-t.timeSpent),0);
          if(!ah)return '';
          const ap=Math.min(100,Math.round(ah/capWeek*100));
          return `<div class="workload-container"><div class="workload-label"><span>${a}</span><span>${ah.toFixed(0)}h</span></div><div class="workload-track"><div class="workload-fill" style="width:${ap}%;background:${areaColor(a)}"></div></div></div>`;
        }).join('')}</div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-title">🏆 Ranking de prioridades</div>
        ${topTasks.map((t,i)=>`<div class="task-row ${t.status==='Bloqueada'?'blocked':t.status==='En espera de terceros'?'waiting':''}" onclick="openTaskDetail('${t.id}')">
          <span style="font-size:12px;font-weight:700;color:var(--text3);width:16px">${i+1}</span>
          <div class="priority-dot ${t.priority==='Alta'?'prio-high':t.priority==='Media'?'prio-med':'prio-low'}"></div>

  <div class="grid-2">

        ${statusBadge(t.status)}
      </div>`).join('')||'<div style="color:var(--text3);font-size:13px;padding:12px 0">Sin tareas críticas esta semana 🎉</div>'}
    </div>
    <div>
      <div class="section-header"><div class="section-title">🔴 Bloqueadas & En espera</div></div>
      ${[...getFilteredTasks().filter(t=>t.status==='Bloqueada'),...getFilteredTasks().filter(t=>t.status==='En espera de terceros')].map(t=>`<div class="task-row ${t.status==='Bloqueada'?'blocked':'waiting'}" onclick="openTaskDetail('${t.id}')">

    </div>
  </div>`;
}

function renderWeekly(){
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const days=['Lun','Mar','Mié','Jue','Vie'];
  const dayDates=days.map((_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const all=getFilteredTasks().filter(t=>t.status!=='Finalizada');
  const totalHours=all.reduce((s,t)=>s+(t.effort-t.timeSpent),0);
  const capWeek=dailyCapacity*5;
  function getTasksForDay(d){
    return all.filter(t=>{const due=dateObj(t.dueDate);const start=dateObj(t.startDate);return due.getTime()===d.getTime()||(start<=d&&due>=d);});
  }
  document.getElementById('main-content').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-size:16px;font-weight:700">Semana ${monday.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})} – ${new Date(monday.getTime()+4*86400000).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}</div>
    <div style="font-size:13px;color:${totalHours>capWeek?'var(--red)':'var(--text2)'}">Total estimado: ${totalHours.toFixed(0)}h / ${capWeek}h</div>
  </div>
  <div style="margin-bottom:14px"><div class="workload-track" style="height:10px"><div class="workload-fill" style="width:${Math.min(100,Math.round(totalHours/capWeek*100))}%;background:${totalHours>capWeek?'var(--red)':totalHours>capWeek*.75?'var(--amber)':'var(--blue)'}"></div></div>
  <div style="font-size:11px;color:var(--text3);margin-top:3px">${Math.min(100,Math.round(totalHours/capWeek*100))}% de capacidad semanal</div></div>
  <div class="week-grid">
    ${dayDates.map((d,i)=>{
      const dt=sortedTasks(getTasksForDay(d)).slice(0,5);
      const dh=dt.reduce((s,t)=>s+Math.max(0,t.effort-t.timeSpent)/Math.max(1,Math.ceil((dateObj(t.dueDate)-dateObj(t.startDate))/(86400000))+1),0);
      const ol=dh>dailyCapacity;
      const isTod=d.getTime()===today.getTime();
      return `<div class="day-col" style="${isTod?'border:2px solid var(--blue);':''}">
        <div class="day-header" style="color:${isTod?'var(--blue)':'var(--text2)'}">${days[i]} ${d.getDate()}</div>
        ${dt.map(t=>`<div class="day-task ${t.priority.toLowerCase()}" onclick="openTaskDetail('${t.id}')" title="${t.title}">
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${t.title}</div>
          <div style="color:var(--text3);margin-top:2px">${t.area}</div>
        </div>`).join('')||'<div style="color:var(--text3);font-size:11px;text-align:center;padding:14px 0;opacity:.6">Libre</div>'}
        <div style="font-size:10px;text-align:center;margin-top:6px;color:${ol?'var(--red)':'var(--text3)';font-weight:ol?700:400}">${dh.toFixed(1)}h est.</div>
      </div>`;
    }).join('')}
  </div>
  <div style="margin-top:16px">
    <div class="section-header"><div class="section-title">Todas las tareas de la semana</div></div>
    ${sortedTasks(all.filter(t=>dateObj(t.dueDate)>=monday&&dateObj(t.startDate)<=dayDates[4])).map(t=>`<div class="task-row ${t.status==='Bloqueada'?'blocked':t.status==='En espera de terceros'?'waiting':''}" onclick="openTaskDetail('${t.id}')">
      <div class="priority-dot ${t.priority==='Alta'?'prio-high':t.priority==='Media'?'prio-med':'prio-low'}"></div>
      <div style="flex:1;min-width:0"><div class="task-title">${t.title}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${t.stakeholder} · ${getInitiative(t.initiativeId).name}</div></div>
      <div class="task-meta">${areaBadge(t.area)}${statusBadge(t.status)}<span style="font-size:11px;color:var(--text3)">${formatDate(t.dueDate)}</span></div>
    </div>`).join('')||'<div style="color:var(--text3);font-size:13px;padding:8px 0">Sin tareas esta semana</div>'}
  </div>`;
}

        ${wt.length?`<span style="color:var(--amber);font-weight:600">⏳ ${wt.length} en espera</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--text3);min-width:32px">${pct}%</span>
        <div class="initiative-progress-bar"><div class="initiative-progress-fill" style="width:${pct}%"></div></div>
        <span style="font-size:11px;color:var(--text3)">${done}/${it.length}</span>
      </div>
      ${next.length?`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Próximas acciones</div>
        ${next.map(t=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">
          <div class="priority-dot ${t.priority==='Alta'?'prio-high':t.priority==='Media'?'prio-med':'prio-low'}" style="margin-top:4px"></div>

          ${statusBadge(t.status)}
        </div>`).join('')}
      </div>`:''}
    </div>`;
  }).join('')}`;
}

    <div class="metric-card"><div class="metric-label">Tareas completadas</div><div class="metric-value">${fin.length}</div><div class="metric-sub">de ${tasks.length} totales (${tasks.length?Math.round(fin.length/tasks.length*100):0}%)</div></div>
    <div class="metric-card"><div class="metric-label">Trabajo estratégico</div><div class="metric-value">${stratTime.toFixed(1)}h</div><div class="metric-sub">${totalTime?Math.round(stratTime/totalTime*100):0}% del total</div></div>
    <div class="metric-card"><div class="metric-label">Pipeline activo</div><div class="metric-value" style="font-size:18px">€${initiatives.reduce((s,i)=>s+(i.value||0),0).toLocaleString('es-ES')}</div><div class="metric-sub">valor estimado</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card"><div class="card-title">Tiempo invertido por área</div>
    ${AREAS.filter(a=>areaTime[a]>0).sort((a,b)=>areaTime[b]-areaTime[a]).map(a=>`<div class="report-row">
      <div style="display:flex;align-items:center;gap:8px;min-width:110px"><div style="width:9px;height:9px;border-radius:50%;background:${areaColor(a)}"></div><span>${a}</span></div>
      <div style="flex:1;margin:0 12px"><div class="bar-h" style="width:${Math.round(areaTime[a]/maxAT*140)}px;background:${areaColor(a)}"></div></div>

    </div>`).join('')}

    <div class="card"><div class="card-title">Tiempo por iniciativa</div>
    ${initiatives.filter(i=>iniTime[i.id]>0).sort((a,b)=>iniTime[b.id]-iniTime[a.id]).map(i=>`<div class="report-row">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;margin-right:8px">${i.name}</span>
      <div style="width:80px;margin-right:8px"><div class="bar-h" style="width:${Math.round(iniTime[i.id]/maxIT*80)}px;background:var(--blue)"></div></div>

      <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</div><div style="font-size:11px;color:var(--text3)">${t.deps}</div></div>
      ${statusBadge(t.status)}

      <div>· ${fin.length} tareas completadas de ${tasks.length} totales (${tasks.length?Math.round(fin.length/tasks.length*100):0}% ratio)</div>
      ${blocked.length?`<div style="color:var(--red);font-weight:600">· ⛔ ${blocked.length} tarea${blocked.length>1?'s':''} bloqueada${blocked.length>1?'s':''} — requiere atención directiva</div>`:`<div style="color:var(--green)">· Sin bloqueos activos en este momento</div>`}

  <div style="margin-bottom:14px"><div style="font-weight:700;font-size:13px;margin-bottom:6px;color:var(--text)">TOP 3 PRIORIDADES ACTUALES</div>

      <div style="flex:1">${t.title}<div style="font-size:11px;color:var(--text3)">${t.stakeholder} · Score ${calcScoreDisplay(t)}/100</div></div>
      ${statusBadge(t.status)}

  <div><div style="font-weight:700;font-size:13px;margin-bottom:6px;color:var(--text)">INICIATIVAS ESTRATÉGICAS (ALTA IMPORTANCIA)</div>

  document.getElementById('modal-body').innerHTML=`
  <div class="modal-header">
    <div style="flex:1;min-width:0"><div class="modal-title">${t.title}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${ini.name}</div></div>
    <div style="display:flex;gap:8px;align-items:center"><span class="score-badge" style="font-size:13px;padding:4px 10px">Score ${calcScoreDisplay(t)}</span><button class="close-btn" onclick="closeModal()">✕</button></div>

    <div><div class="form-label">Estado</div><select class="form-select" onchange="updateTaskField('${t.id}','status',this.value)">

  <div style="display:flex;gap:16px;margin-bottom:14px;font-size:13px;background:var(--bg3);padding:10px;border-radius:8px">

    <div><span style="color:var(--text3)">Stakeholder:</span> <strong>${t.stakeholder}</strong></div>
  </div>
  ${t.deps?`<div style="margin-bottom:12px"><div class="form-label">Dependencias</div><div style="font-size:13px;padding:9px;background:var(--amber-bg);border-radius:7px;color:var(--amber-text)">⏳ ${t.deps}</div></div>`:''}
  <div style="margin-bottom:12px"><div class="form-label">Próxima acción</div>
    <input class="form-input" value="${t.nextAction}" onchange="updateTaskField('${t.id}','nextAction',this.value)" placeholder="Siguiente paso concreto">
  </div>
  <div class="form-row">
    <div><div class="form-label">Tiempo invertido (h)</div><input type="number" class="form-input" value="${t.timeSpent}" min="0" step="0.5" onchange="updateTaskField('${t.id}','timeSpent',parseFloat(this.value)||0)"></div>
    <div><div class="form-label">Categoría</div><select class="form-select" onchange="updateTaskField('${t.id}','category',this.value)">${TASK_CATEGORIES.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
    <button class="btn btn-danger" onclick="deleteTask('${t.id}')">🗑 Eliminar</button>
    <button class="btn" onclick="closeModal()">Cerrar</button>

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);closeModal();renderCurrentView();}

    <div class="form-group"><div class="form-label">Objetivo de negocio</div><input class="form-input" id="ni-obj" placeholder="¿Qué resultado persigue?"></div>
    <div class="form-row">
      <div><div class="form-label">Tipo</div><select class="form-select" id="ni-type">${INITIATIVE_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div><div class="form-label">Área principal</div><select class="form-select" id="ni-area">${AREAS.map(a=>`<option>${a}</option>`).join('')}</select></div>

function saveNewTask(){
  const title=document.getElementById('nt-title').value.trim();
  const due=document.getElementById('nt-due').value;
  if(!title||!due){alert('Título y fecha límite son obligatorios');return;}
  tasks.push({id:'t'+Date.now(),title,desc:document.getElementById('nt-desc').value,initiativeId:document.getElementById('nt-ini').value,category:document.getElementById('nt-cat').value,area:document.getElementById('nt-area').value||'Ventas',stakeholder:document.getElementById('nt-stake').value,startDate:document.getElementById('nt-start').value,dueDate:due,status:'Pendiente',priority:document.getElementById('nt-pri').value,criticality:document.getElementById('nt-crit').value,businessImpact:document.getElementById('nt-imp').value,effort:parseFloat(document.getElementById('nt-effort').value)||2,timeSpent:0,progress:0,deps:document.getElementById('nt-deps').value,nextAction:document.getElementById('nt-next').value,execVisibility:document.getElementById('nt-exec').checked});
  closeModal();renderCurrentView();
}

function saveNewInitiative(){
  const name=document.getElementById('ni-name').value.trim();
  if(!name){alert('El nombre es obligatorio');return;}
  initiatives.push({id:'i'+Date.now(),name,type:document.getElementById('ni-type').value,area:document.getElementById('ni-area').value,otherAreas:[],objective:document.getElementById('ni-obj').value,value:parseInt(document.getElementById('ni-val').value)||0,importance:document.getElementById('ni-imp').value,startDate:document.getElementById('ni-start').value,targetDate:document.getElementById('ni-target').value,status:'En curso'});
  closeModal();renderCurrentView();
}

function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}

// ===================== TOAST =====================
function showToast(msg,duration=2000){
  const existing=document.getElementById('bdflow-toast');
  if(existing)existing.remove();
  const t=document.createElement('div');
  t.id='bdflow-toast';
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:#185fa5;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:1;transition:opacity .4s';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>{if(t.parentNode)t.remove();},400);},duration);
}

// ===================== LOCALSTORAGE =====================
const SK_T='bdflow_tasks_v1';
const SK_I='bdflow_initiatives_v1';
const SK_C='bdflow_capacity_v1';

function saveData(){
  try{
    localStorage.setItem(SK_T,JSON.stringify(tasks));
    localStorage.setItem(SK_I,JSON.stringify(initiatives));
    localStorage.setItem(SK_C,String(dailyCapacity));
  }catch(e){console.warn('saveData error:',e);}
}

function loadData(){
  try{
    const t=localStorage.getItem(SK_T);
    const i=localStorage.getItem(SK_I);
    const c=localStorage.getItem(SK_C);
    if(t){const p=JSON.parse(t);if(Array.isArray(p)&&p.length>0)tasks=p;}
    if(i){const p=JSON.parse(i);if(Array.isArray(p)&&p.length>0)initiatives=p;}
    if(c){dailyCapacity=parseInt(c)||6;const el=document.getElementById('daily-capacity');if(el)el.value=dailyCapacity;}
  }catch(e){console.warn('loadData error:',e);}
}

// Patch save into mutating functions directly
const _orig_saveNewTask=saveNewTask;
saveNewTask=function(){_orig_saveNewTask();saveData();showToast('Tarea guardada ✓');};

const _orig_saveNewInitiative=saveNewInitiative;
saveNewInitiative=function(){_orig_saveNewInitiative();saveData();showToast('Iniciativa guardada ✓');};

const _orig_deleteTask=deleteTask;
deleteTask=function(id){_orig_deleteTask(id);saveData();};

const _orig_updateTaskField=updateTaskField;
updateTaskField=function(id,field,val){_orig_updateTaskField(id,field,val);saveData();};

const _orig_updateCapacity=updateCapacity;
updateCapacity=function(){_orig_updateCapacity();saveData();};
