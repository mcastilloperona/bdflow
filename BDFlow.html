<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDFlow</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f6fb;
}

.header{
  background:#fff;
  padding:15px 20px;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.sub{
  font-size:12px;
  color:#666;
}

.container{
  padding:20px;
}

.task{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.actions{
  margin-top:10px;
}

.actions button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.ok{background:#16a34a;color:white;}
.block{background:#dc2626;color:white;}
.wait{background:#d97706;color:white;}
.time{background:#1a56db;color:white;}

</style>
</head>

<body>

<div class="header">
  <div class="logo">BDFlow</div>
  <div class="sub">by Miguel Castillo</div>
</div>

<div class="container">

  <div class="task">
    <strong>Gestionar urgencia Cliente GLS</strong>

    <div class="actions">
      <button class="ok">✓ Finalizar</button>
      <button class="block">⛔ Bloquear</button>
      <button class="wait">Mañana</button>
      <button class="time">+30m</button>
      <button class="time">+1h</button>
    </div>
  </div>

</div>

</body>
</html>
