<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDFlow Ver. 3.0.2</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --panel:#ffffff;
      --panel-2:#f8fbff;
      --border:#d8e1ee;
      --text:#0f172a;
      --muted:#64748b;
      --blue:#2563eb;
      --blue-2:#ebf2ff;
      --green:#16a34a;
      --green-2:#ecfdf3;
      --amber:#d97706;
      --amber-2:#fff7e8;
      --red:#dc2626;
      --red-2:#fff0f0;
      --purple:#7c3aed;
      --purple-2:#f3e8ff;
      --teal:#0f766e;
      --teal-2:#ecfeff;
      --shadow:0 8px 24px rgba(15,23,42,.06);
      --radius:18px;
      --sidebar:#1f3a34;
      --sidebar-2:#213c35;
      --sidebar-text:#f1f5f9;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}
    .app{display:flex;min-height:100vh}
    .sidebar{width:320px;background:linear-gradient(180deg,var(--sidebar),#1c322d);color:var(--sidebar-text);padding:18px 16px;position:sticky;top:0;height:100vh;overflow:auto;border-right:1px solid rgba(255,255,255,.06)}
    .brand{padding:8px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px}
    .brand-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .logo{font-size:28px;font-weight:800;letter-spacing:-.03em}
    .logo b{color:#2563eb}
    .sub{font-size:12px;color:#cbd5e1;margin-top:4px}
    .version{display:inline-flex;align-items:center;background:#eef4ff;color:#2563eb;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}
    .section-label{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#cbd5e1;margin:16px 10px 8px}
    .nav{display:flex;flex-direction:column;gap:8px}
    .nav-btn{display:flex;align-items:center;gap:14px;width:100%;border:none;background:transparent;color:var(--sidebar-text);border-radius:16px;padding:14px 16px;cursor:pointer;text-align:left;font-weight:700;font-size:17px}
    .nav-btn:hover{background:rgba(255,255,255,.05)}
    .nav-btn.active{background:#243f69;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
    .nav-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
    .nav .nav-btn:nth-child(1) .nav-dot{background:#7db1ff}
    .nav .nav-btn:nth-child(2) .nav-dot{background:#3dd598}
    .nav .nav-btn:nth-child(3) .nav-dot{background:#fbbf24}
    .nav .nav-btn:nth-child(4) .nav-dot{background:#a78bfa}
    .nav .nav-btn:nth-child(5) .nav-dot{background:#f472b6}
    .nav .nav-btn:nth-child(6) .nav-dot{background:#2dd4bf}
    .nav .nav-btn:nth-child(7) .nav-dot{background:#fdba74}
    .nav .nav-btn:nth-child(8) .nav-dot{background:#93c5fd}
    .nav .nav-btn:nth-child(9) .nav-dot{background:#fde68a}
    .nav .nav-btn:nth-child(10) .nav-dot{background:#60a5fa}
    .nav-btn.active .nav-dot{background:#ffffff!important;box-shadow:0 0 0 4px rgba(255,255,255,.12)}
    .side-card{background:rgba(17,24,39,.18);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;margin-top:10px}
    .side-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .side-row:last-child{margin-bottom:0}
    .side-k{font-size:13px;color:#dbe5ef}
    .side-v{font-size:14px;font-weight:800;color:#fff}
    .backup-box{margin-top:14px}
    .btn{border:none;border-radius:14px;padding:11px 14px;cursor:pointer;font-weight:800}
    .btn.primary{background:var(--blue);color:#fff}
    .btn.secondary{background:#fff;border:1px solid var(--border);color:var(--text)}
    .btn.ghost{background:var(--panel-2);border:1px solid var(--border);color:var(--text)}
    .btn.dark{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.08)}
    .btn.small{padding:8px 10px;border-radius:10px;font-size:12px}
    .main{flex:1;min-width:0;padding:18px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
    .title h1{margin:0;font-size:28px;letter-spacing:-.03em}
    .title p{margin:8px 0 0;color:var(--muted);font-size:15px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .search,.select{background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 14px}
    .search{min-width:260px}
    .select{min-width:210px}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .metric{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
    .metric .k{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:#94a3b8;font-weight:900}
    .metric .v{margin-top:12px;font-size:34px;font-weight:900}
    .metric .s{margin-top:8px;color:var(--muted);font-size:13px}
    .layout{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel-head{padding:18px 18px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .panel-head h2{margin:0;font-size:18px}
    .panel-head p{margin:6px 0 0;color:var(--muted);font-size:14px}
    .panel-body{padding:0 18px 18px}
    .lane,.kcol{border:1px solid var(--border);border-radius:18px;background:var(--panel-2);min-height:300px}
    .lane-head,.khead{padding:14px;border-bottom:1px solid var(--border)}
    .lane-head h3,.khead{margin:0;font-size:15px;font-weight:800}
    .lane-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .lane-body,.kbody{padding:12px}
    .task{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(15,23,42,.04)}
    .task:last-child{margin-bottom:0}
    .task-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .task-title{font-weight:900;font-size:17px;line-height:1.35}
    .task-sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.45}
    .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:800;background:#eef2f7;color:#334155}
    .badge.red{background:var(--red-2);color:var(--red)}
    .badge.amber{background:var(--amber-2);color:var(--amber)}
    .badge.green{background:var(--green-2);color:var(--green)}
    .badge.blue{background:var(--blue-2);color:var(--blue)}
    .badge.purple{background:var(--purple-2);color:var(--purple)}
    .badge.overrun{background:#fff7e8;color:#d97706;border:1px solid #f1d29a}
    .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
    .m{background:var(--panel-2);border:1px solid var(--border);border-radius:14px;padding:12px}
    .mk{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:900;letter-spacing:.06em}
    .mv{margin-top:6px;font-size:13px;font-weight:800;line-height:1.4}
    .qa{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--border)}
    .qbtn{border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:800;font-size:12px}
    .qbtn.done{background:var(--green-2);color:var(--green)}
    .qbtn.pause{background:var(--red-2);color:var(--red)}
    .qbtn.time{background:var(--blue-2);color:var(--blue)}
    .qbtn.edit{background:#fff;border:1px solid var(--border);color:var(--text)}
    .score{min-width:92px;text-align:center;border:1px solid #cfe0ff;background:var(--blue-2);color:var(--blue);border-radius:18px;padding:12px 8px}
    .score b{display:block;font-size:28px;line-height:1}
    .score span{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
    .empty{border:1px dashed var(--border);border-radius:16px;background:var(--panel-2);padding:24px;text-align:center;color:var(--muted)}
    .mini-task{padding:9px 11px;border-radius:12px;background:var(--panel-2);border:1px solid var(--border);font-size:13px;margin-bottom:8px}
    .row-card{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:14px;background:#fff;margin-bottom:10px}
    .row-title{font-weight:800}
    .row-sub{font-size:13px;color:var(--muted);margin-top:3px}
    .inline-form{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px;border:1px solid var(--border);border-radius:14px;background:var(--panel-2);margin-bottom:16px}
    .inline-form input,.inline-form select{border:1px solid var(--border);border-radius:10px;padding:10px 11px;background:#fff}
    .report-box{border:1px solid var(--border);background:#fff;border-radius:16px;padding:18px;white-space:pre-wrap;line-height:1.6;font-size:14px}
    .activity-day{border:1px solid var(--border);border-radius:16px;background:white;padding:14px;margin-bottom:14px}
    .activity-day h3{margin:0 0 10px 0;font-size:16px}
    .activity-entry{padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:var(--panel-2);margin-bottom:10px}
    .activity-entry:last-child{margin-bottom:0}
    .activity-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .day-group-title{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:900;margin:12px 0 6px}
    .detail-block{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
    .worklog-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:var(--panel-2);margin-bottom:10px}
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.36);z-index:30;display:none}
    .overlay.show{display:block}
    .mobile-toggle{display:none}
    .modal-wrap{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
    .modal-wrap.show{display:flex}
    .modal{width:min(860px,100%);background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:0 18px 50px rgba(15,23,42,.22)}
    .modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-head h3{margin:0;font-size:20px}
    .modal-body{padding:20px}
    .modal-actions{padding:0 20px 20px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
    .field input,.field select,.field textarea{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}
    .field textarea{min-height:96px;resize:vertical}
    .field.full{grid-column:1/-1}
    .report-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .exec-card{border:1px solid var(--border);border-radius:16px;background:#fff;padding:16px}
    .exec-card h3{margin:0 0 10px 0;font-size:16px}
    .exec-card p{margin:0;color:var(--muted);line-height:1.55}
    .exec-list{margin:0;padding-left:18px}
    .exec-list li{margin-bottom:8px}
    @media (max-width:1180px){
      .layout,.grid-2,.exec-grid{grid-template-columns:1fr}
      .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
      .today-grid,.kanban,.week-grid,.month-grid{grid-template-columns:1fr}
      .meta{grid-template-columns:repeat(2,1fr)}
    }
    @media (max-width:820px){
      .app{display:block}
      .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:40;transition:.22s ease;width:min(320px,86vw)}
      .sidebar.open{transform:translateX(0)}
      .mobile-toggle{display:inline-flex}
      .main{padding:14px}
      .metrics,.meta{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .search{min-width:unset;width:100%}
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-top">
          <div>
            <div class="logo">BD<b>Flow</b></div>
            <div class="sub">by Miguel Castillo</div>
          </div>
          <div class="version">Ver. 3.0.2</div>
        </div>
      </div>

      <div class="section-label">Navegación</div>
      <div class="nav">
        <button class="nav-btn active" data-view="dashboard"><span class="nav-dot"></span>Dashboard</button>
        <button class="nav-btn" data-view="today"><span class="nav-dot"></span>Hoy</button>
        <button class="nav-btn" data-view="week"><span class="nav-dot"></span>Semana</button>
        <button class="nav-btn" data-view="month"><span class="nav-dot"></span>Mes</button>
        <button class="nav-btn" data-view="ranking"><span class="nav-dot"></span>Ranking</button>
        <button class="nav-btn" data-view="kanban"><span class="nav-dot"></span>Kanban</button>
        <button class="nav-btn" data-view="activity"><span class="nav-dot"></span>Actividad</button>
        <button class="nav-btn" data-view="initiatives"><span class="nav-dot"></span>Iniciativas</button>
        <button class="nav-btn" data-view="config"><span class="nav-dot"></span>Configuración</button>
        <button class="nav-btn" data-view="report"><span class="nav-dot"></span>Informe</button>
      </div>

      <div class="section-label">Resumen rápido</div>
      <div class="side-card" id="quickSummary"></div>

      <div class="section-label">Capacidad diaria</div>
      <div class="side-card">
        <div class="side-row"><div class="side-k">Horas objetivo</div><div class="side-v"><span id="dailyCapValue">6</span> h</div></div>
        <input id="dailyCap" type="range" min="2" max="10" step="1" value="6" style="width:100%" />
        <div class="side-row"><div class="side-k">Uso recomendado</div><div class="side-v" id="dailyCapHint">Foco realista</div></div>
      </div>

      <div class="section-label">Datos</div>
      <div class="side-card backup-box">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn dark small" onclick="exportData()">Exportar</button>
          <input type="file" id="importFile" style="display:none" accept=".json,application/json" onchange="importData(event)">
          <button class="btn dark small" onclick="document.getElementById('importFile').click()">Importar</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Decisión inmediata y riesgos del día.</p>
        </div>
        <div class="actions">
          <button class="mobile-toggle btn secondary" onclick="toggleSidebar(true)">☰ Menú</button>
          <button class="btn secondary" onclick="openInitiativeModal()">+ Nueva iniciativa</button>
          <button class="btn primary" onclick="openTaskModal()">+ Nueva tarea</button>
          <input id="searchInput" class="search" placeholder="Buscar tareas, iniciativas, áreas..." />
          <select id="statusFilter" class="select">
            <option value="all">Todos los estados</option>
            <option value="Pendiente">Pendiente</option>
            <option value="En curso">En curso</option>
            <option value="Pausada">Pausada</option>
            <option value="Finalizada">Finalizada</option>
          </select>
        </div>
      </div>

      <section id="metricsSection" class="metrics"></section>
      <div style="height:18px"></div>
      <section id="viewContainer"></section>
    </main>
  </div>

  <div class="modal-wrap" id="taskModalWrap">
    <div class="modal">
      <div class="modal-head">
        <h3 id="taskModalTitle">Nueva tarea</h3>
        <button class="btn secondary" onclick="closeTaskModal()">Cerrar</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field full"><label for="fTitle">Título</label><input id="fTitle" type="text" /></div>
          <div class="field full"><label for="fDesc">Descripción</label><textarea id="fDesc"></textarea></div>
          <div class="field"><label for="fArea">Área</label><select id="fArea"></select></div>
          <div class="field"><label for="fInitiative">Iniciativa</label><select id="fInitiative"></select></div>
          <div class="field"><label for="fStatus">Estado</label><select id="fStatus"><option>Pendiente</option><option>En curso</option><option>Pausada</option><option>Finalizada</option></select></div>
          <div class="field"><label for="fPriority">Prioridad</label><select id="fPriority"><option>Alta</option><option>Media</option><option>Baja</option></select></div>
          <div class="field"><label for="fDue">Fecha objetivo (opcional)</label><input id="fDue" type="date" /><div style="margin-top:-4px;color:#64748b;font-size:12px">Sin fecha = tarea continua</div></div>
          <div class="field"><label for="fEffort">Horas previstas</label><input id="fEffort" type="number" min="0" step="0.5" /></div>
          <div class="field full"><label for="fNext">Siguiente paso</label><input id="fNext" type="text" /></div>
        </div>
      </div>
      <div class="modal-actions">
        <div><button class="btn secondary" id="deleteTaskBtn" onclick="deleteCurrentTask()" style="display:none">Eliminar</button></div>
        <div style="display:flex;gap:10px">
          <button class="btn secondary" onclick="closeTaskModal()">Cancelar</button>
          <button class="btn primary" onclick="saveTask()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-wrap" id="initiativeModalWrap">
    <div class="modal">
      <div class="modal-head">
        <h3 id="initiativeModalTitle">Nueva iniciativa</h3>
        <button class="btn secondary" onclick="closeInitiativeModal()">Cerrar</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field full"><label for="iName">Nombre</label><input id="iName" type="text" /></div>
          <div class="field full"><label for="iObjective">Objetivo</label><textarea id="iObjective"></textarea></div>
          <div class="field"><label for="iOwner">Responsable / Área</label><select id="iOwner"></select></div>
          <div class="field"><label for="iStatus">Estado</label><select id="iStatus"><option>Pendiente</option><option>En curso</option><option>Pausada</option><option>Finalizada</option></select></div>
        </div>
      </div>
      <div class="modal-actions">
        <div><button class="btn secondary" id="deleteInitiativeBtn" onclick="deleteCurrentInitiative()" style="display:none">Eliminar</button></div>
        <div style="display:flex;gap:10px">
          <button class="btn secondary" onclick="closeInitiativeModal()">Cancelar</button>
          <button class="btn primary" onclick="saveInitiative()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-wrap" id="worklogModalWrap">
    <div class="modal">
      <div class="modal-head">
        <h3>Registrar trabajo</h3>
        <button class="btn secondary" onclick="closeWorklogModal()">Cerrar</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field"><label for="wDate">Fecha</label><input id="wDate" type="date" /></div>
          <div class="field"><label for="wHours">Horas</label><input id="wHours" type="number" min="0.25" step="0.25" /></div>
          <div class="field full"><label for="wNote">Comentario</label><textarea id="wNote" placeholder="Qué se hizo en esta sesión"></textarea></div>
        </div>
      </div>
      <div class="modal-actions">
        <div></div>
        <div style="display:flex;gap:10px">
          <button class="btn secondary" onclick="closeWorklogModal()">Cancelar</button>
          <button class="btn primary" onclick="saveWorklogEntry()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-wrap" id="detailModalWrap">
    <div class="modal">
      <div class="modal-head">
        <h3>Detalle de tarea</h3>
        <button class="btn secondary" onclick="closeDetailModal()">Cerrar</button>
      </div>
      <div class="modal-body" id="detailModalBody"></div>
      <div class="modal-actions">
        <div></div>
        <div><button class="btn secondary" onclick="closeDetailModal()">Cerrar</button></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bdflow_v262_state';

    const seed = {
      areas: ['General','Business Development'],
      initiatives: [
        {id:'i1',name:'Base Instalada',owner:'Business Development',objective:'Seguimiento y activación de oportunidades.',status:'En curso'}
      ],
      tasks: []
    };

    const state = {
      currentView: 'dashboard',
      search: '',
      filterStatus: 'all',
      dailyCapacity: 6,
      editingTaskId: null,
      editingInitiativeId: null,
      editingWorklogTaskId: null,
      editingWorklogEntryId: null,
      detailTaskId: null,
      areas: [],
      initiatives: [],
      tasks: []
    };

    function escapeHtml(v){
      return String(v ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : seed;
        state.areas = Array.isArray(parsed.areas) && parsed.areas.length ? parsed.areas : [...seed.areas];
        state.initiatives = Array.isArray(parsed.initiatives) ? parsed.initiatives : [];
        state.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
      }catch(e){
        state.areas = [...seed.areas];
        state.initiatives = [...seed.initiatives];
        state.tasks = [];
      }
      migrateState();
    }

    function migrateState(){
      state.initiatives = state.initiatives.map(i => ({
        status: 'Pendiente',
        objective: 'Sin objetivo definido.',
        owner: state.areas[0] || 'General',
        ...i
      }));
      state.tasks = state.tasks.map(t => {
        const worklog = Array.isArray(t.worklog) ? t.worklog.map(w => ({
          id: w.id || ('w' + Date.now() + Math.random()),
          date: w.date || new Date().toISOString().slice(0,10),
          hours: Number(w.hours || 0),
          note: w.note || ''
        })) : [];
        const spent = Number(
          t.spent ??
          worklog.reduce((a,b)=>a+Number(b.hours||0),0) ??
          0
        );
        return {
          id: t.id || ('t' + Date.now() + Math.random()),
          title: t.title || 'Sin título',
          desc: t.desc || '',
          area: t.area || state.areas[0] || 'General',
          initiativeId: t.initiativeId || state.initiatives[0]?.id || '',
          status: ['Pendiente','En curso','Pausada','Finalizada'].includes(t.status) ? t.status : 'Pendiente',
          priority: ['Alta','Media','Baja'].includes(t.priority) ? t.priority : 'Media',
          due: t.due || '',
          effort: Number(t.effort || 0),
          spent,
          next: t.next || 'Definir siguiente paso.',
          createdAt: t.createdAt || new Date().toISOString().slice(0,10),
          worklog
        };
      });
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        areas: state.areas,
        initiatives: state.initiatives,
        tasks: state.tasks
      }));
    }

      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){

      }
      const blob = new Blob([raw], {type:'application/json;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bdflow_backup.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function getInitiativeName(id){
      const i = state.initiatives.find(x => x.id === id);
      return i ? i.name : 'Sin iniciativa';
    }

    function getWorkSessionsCount(task){
      return Array.isArray(task.worklog) ? task.worklog.length : 0;
    }

    function getLastWorkDate(task){
      if(!Array.isArray(task.worklog) || !task.worklog.length) return '—';
      return [...task.worklog].sort((a,b)=>String(b.date).localeCompare(String(a.date)))[0].date;
    }

    function parseDate(s){
      return new Date(s + 'T12:00:00');
    }

    function daysToDue(task){
      if(!task.due) return null;
      const today = new Date();
      today.setHours(0,0,0,0);
      const due = parseDate(task.due);
      due.setHours(0,0,0,0);
      return Math.round((due - today) / 86400000);
    }

    function deriveMetrics(task){
      const p = task.priority === 'Alta' ? 20 : task.priority === 'Media' ? 10 : 0;
      const s = task.status === 'Pausada' ? 18 : task.status === 'En curso' ? 10 : 0;
      const d = daysToDue(task);
      task.impact = Math.min(95, 55 + p + Math.min(15, Math.max(0, Number(task.effort||0) - Number(task.spent||0)) * 2));
      task.urgency = d === null ? 55 : d <= 0 ? 95 : d === 1 ? 88 : d <= 3 ? 76 : 60;
      task.criticality = Math.min(95, 50 + p + s);
      task.blockRisk = task.status === 'Pausada' ? 95 : 40;
    }

    function scoreTask(task){
      const d = daysToDue(task);
      const dueBias = d === null ? 55 : d < 0 ? 100 : d === 0 ? 96 : d === 1 ? 90 : d <= 3 ? 78 : 55;
      return Math.max(1, Math.min(100, Math.round(
        (task.impact*.30 + task.urgency*.22 + task.criticality*.22 + task.blockRisk*.12 + dueBias*.14) +
        (task.status==='Finalizada' ? -30 : 0) +
        (task.status==='Pausada' ? 8 : 0)
      )));
    }

    function isCriticalTask(task){
      const d = task.daysLeft;
      return task.status !== 'Finalizada' && (
        (d !== null && d <= 0) ||
        (d !== null && d <= 1 && task.priority === 'Alta') ||
        (task.status === 'Pausada' && task.priority === 'Alta')
      );
    }

    function statusBadge(status){
      const map = {
        'Pendiente':['blue','Pendiente'],
        'En curso':['green','En curso'],
        'Pausada':['red','Pausada'],
        'Finalizada':['green','Finalizada']
      };
      const f = map[status] || ['blue', status];
      return `<span class="badge ${f[0]}">${escapeHtml(f[1])}</span>`;
    }

    function badgeDue(task){
      if(task.daysLeft === null) return '<span class="badge">Sin fecha</span>';
      if(task.daysLeft < 0) return '<span class="badge red">Vencida</span>';
      if(task.daysLeft === 0) return '<span class="badge red">Vence hoy</span>';
      if(task.daysLeft === 1) return '<span class="badge amber">Vence mañana</span>';
      if(task.daysLeft <= 3) return `<span class="badge amber">En ${task.daysLeft} días</span>`;
      return `<span class="badge green">${task.daysLeft} días</span>`;
    }

    function getGroupedWorklog(task){
      const rows = Array.isArray(task.worklog) ? [...task.worklog] : [];
      rows.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
      const grouped = {};
      rows.forEach(r => {
        if(!grouped[r.date]) grouped[r.date] = [];
        grouped[r.date].push(r);
      });
      return grouped;
    }

    function renderGroupedWorklog(task, maxDays=3){
      const grouped = getGroupedWorklog(task);
      const entries = Object.entries(grouped).slice(0, maxDays);
      if(!entries.length) return '';
      return `<div class="detail-block"><div class="mk">Últimos registros</div>${
        entries.map(([date,items]) => `
          <div class="day-group-title">${date} · ${items.reduce((a,b)=>a+Number(b.hours||0),0)}h (${items.length} ${items.length===1?'sesión':'sesiones'})</div>
          ${items.map(w => `<div class="mini-task"><strong>${w.hours}h</strong>${w.note ? ` · ${escapeHtml(w.note)}` : ''}</div>`).join('')}
        `).join('')
      }</div>`;
    }

    function filteredTasks(){
      state.tasks.forEach(deriveMetrics);
      return state.tasks.filter(t => {
        const hay = [t.title,t.desc,t.area,getInitiativeName(t.initiativeId),t.next,t.status].join(' ').toLowerCase();
        return (!state.search || hay.includes(state.search.toLowerCase())) &&
               (state.filterStatus === 'all' || t.status === state.filterStatus);
      }).map(t => ({
        ...t,
        initiative: getInitiativeName(t.initiativeId),
        score: scoreTask(t),
        daysLeft: daysToDue(t)
      })).sort((a,b)=>b.score-a.score);
    }

    function kpiData(tasks){
      return {
        total: tasks.filter(t=>t.status!=='Finalizada').length,
        critical: tasks.filter(t=>isCriticalTask(t)).length,
        paused: tasks.filter(t=>t.status==='Pausada').length,
        upcoming: tasks.filter(t=>t.status!=='Finalizada' && t.daysLeft!==null && t.daysLeft<=2).length
      };
    }

    function taskCard(task){
      const pauseLabel = task.status === 'Pausada' ? '▶ Reanudar' : '⏸ Pausar';
      const doneLabel = task.status === 'Finalizada' ? '↺ Reabrir' : '✓ Finalizar';
      return `<article class="task">
        <div class="task-top">
          <div style="min-width:0">
            <div class="task-title">${escapeHtml(task.title)}</div>
            <div class="task-sub">${escapeHtml(task.desc)}</div>
          </div>
          <div class="score"><b>${task.score}</b><span>Score</span></div>
        </div>
        <div class="badges">
          ${statusBadge(task.status)}
          ${badgeDue(task)}
          <span class="badge">${escapeHtml(task.area)}</span>
          <span class="badge">${escapeHtml(task.initiative)}</span>
        </div>
        <div class="meta">
          <div class="m"><div class="mk">Creada</div><div class="mv">${escapeHtml(task.createdAt || '—')}</div></div>
          <div class="m"><div class="mk">Horas</div><div class="mv">${task.spent}h / ${task.effort}h${Number(task.spent||0)>Number(task.effort||0)?'<div style="margin-top:4px;color:#d97706;font-size:12px;font-weight:800">Desviada</div>':''}</div></div>
          <div class="m"><div class="mk">Sesiones</div><div class="mv">${getWorkSessionsCount(task)}</div></div>
          <div class="m"><div class="mk">Última actividad</div><div class="mv">${escapeHtml(getLastWorkDate(task))}</div></div>
        </div>
        <div class="qa">
          <button class="qbtn done" onclick="toggleDone('${task.id}')">${doneLabel}</button>
          <button class="qbtn pause" onclick="quickPause('${task.id}')">${pauseLabel}</button>
          <button class="qbtn edit" onclick="openTaskModal('${task.id}')">Editar tarea</button>
          <button class="qbtn time" onclick="openWorklogModal('${task.id}')">Registrar trabajo</button>
          <button class="qbtn time" onclick="quickAddTime('${task.id}',0.5)">+30m</button>
          <button class="qbtn time" onclick="quickAddTime('${task.id}',1)">+1h</button>
          <button class="qbtn edit" onclick="openDetailModal('${task.id}')">Ver detalle</button>
        </div>
        ${renderGroupedWorklog(task)}
      </article>`;
    }

    function renderMetrics(tasks){
      const k = kpiData(tasks);
      document.getElementById('metricsSection').innerHTML = `
        <div class="metric"><div class="k">Tareas activas</div><div class="v">${k.total}</div><div class="s">Carga operativa abierta</div></div>
        <div class="metric"><div class="k">Críticas</div><div class="v">${k.critical}</div><div class="s">Piden foco hoy</div></div>
        <div class="metric"><div class="k">Pausadas</div><div class="v">${k.paused}</div><div class="s">Necesitan reactivación</div></div>
        <div class="metric"><div class="k">Estructura</div><div class="v">${state.initiatives.length}/${state.areas.length}</div><div class="s">Iniciativas / áreas</div></div>
      `;
      document.getElementById('quickSummary').innerHTML = `
        <div class="side-row"><div class="side-k">Foco del día</div><div class="side-v">${k.critical} tareas</div></div>
        <div class="side-row"><div class="side-k">En riesgo</div><div class="side-v">${k.upcoming + k.paused}</div></div>
        <div class="side-row"><div class="side-k">Capacidad</div><div class="side-v">${state.dailyCapacity} h</div></div>
        <div class="side-row"><div class="side-k">Áreas activas</div><div class="side-v">${state.areas.length}</div></div>
      `;
    }

    function renderDashboard(tasks){
      const mainTask = tasks.find(t=>isCriticalTask(t)) || tasks.find(t=>t.status!=='Finalizada');
      const risks = tasks.filter(t=>t.status==='Pausada' || (t.daysLeft!==null && t.daysLeft<=1)).slice(0,3);
      return `<div class="layout">
        <div class="panel">

            ${mainTask ? `<div class="task" style="border:2px solid #1a56db">${taskCard(mainTask).replace('<article class="task">','').replace('</article>','')}</div>` : '<div class="empty">No hay tareas activas.</div>'}
          </div>

    function renderToday(tasks){
      const active = tasks.filter(t=>t.status!=='Finalizada');
      const critical = active.filter(t=>isCriticalTask(t)).slice(0,4);
      const important = active.filter(t=>!isCriticalTask(t) && t.score>=70).slice(0,4);
      const optional = active.filter(t=>!isCriticalTask(t) && t.score<70).slice(0,4);
      return `<div class="today-grid">
        <div class="lane"><div class="lane-head"><h3>Crítico</h3><p>Sí o sí hoy.</p></div><div class="lane-body">${critical.length?critical.map(taskCard).join(''):'<div class="empty">Nada crítico ahora mismo.</div>'}</div></div>
        <div class="lane"><div class="lane-head"><h3>Importante</h3><p>Debe avanzar hoy.</p></div><div class="lane-body">${important.length?important.map(taskCard).join(''):'<div class="empty">Sin importantes.</div>'}</div></div>
        <div class="lane"><div class="lane-head"><h3>Opcional</h3><p>Hazlo si mantienes margen.</p></div><div class="lane-body">${optional.length?optional.map(taskCard).join(''):'<div class="empty">Sin opcionales.</div>'}</div></div>
      </div>`;

              <div><div class="row-title">${escapeHtml(t.title)}</div><div class="row-sub">${escapeHtml(t.desc)}</div></div>

    function renderKanban(tasks){
      const cols = ['Pendiente','En curso','Pausada','Finalizada'];

      }</div></div></div>`;

    function getAllWorklogEntries(){
      const entries = [];
      state.tasks.forEach(task=>{
        (task.worklog||[]).forEach(w=>{
          entries.push({
            id: w.id,
            taskId: task.id,
            taskTitle: task.title,
            initiative: getInitiativeName(task.initiativeId),
            area: task.area,
            date: w.date,
            hours: w.hours,
            note: w.note || ''
          });
        });
      });
      entries.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
      return entries;
    }

      if(!entries.length){

      const grouped = {};
      entries.forEach(e=>{ if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
      return `<div class="panel"><div class="panel-head"><div><h2>Actividad</h2><p>Trabajo realizado de forma clara y cronológica.</p></div></div><div class="panel-body">${
        Object.entries(grouped).map(([date,items])=>`
          <div class="activity-day">

                  <div>

                    <div class="row-sub">${escapeHtml(i.initiative)} · ${escapeHtml(i.area)}</div>
                  </div>
                  <div class="badge blue">${i.hours}h</div>
                </div>
                ${i.note ? `<div style="margin-top:8px;color:var(--muted);font-size:13px">${escapeHtml(i.note)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        `).join('')
      }</div></div>`;

      if(!its.length) return 0;
      const done = its.filter(t=>t.status==='Finalizada').length;
      return Math.round((done/its.length)*100);

              <input id="quickInitiativeName" placeholder="Nueva iniciativa" />
              <select id="quickInitiativeOwner">${state.areas.map(a=>`<option>${escapeHtml(a)}</option>`).join('')}</select>
              <button class="btn primary" onclick="quickAddInitiative()">Añadir iniciativa</button>
            </div>
            ${state.initiatives.map(i=>`
              <div class="row-card">
                <div><div class="row-title">${escapeHtml(i.name)}</div><div class="row-sub">${escapeHtml(i.owner)} · ${state.tasks.filter(t=>t.initiativeId===i.id).length} tareas</div></div>
                <div><button class="btn ghost" onclick="openInitiativeModal('${i.id}')">Editar</button></div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>`;
    }

    function buildExecutiveReport(){
      const tasks = filteredTasks();
      if(!state.initiatives.length && !state.tasks.length){
        return [
          'INFORME EJECUTIVO BDFlow',
          'Fecha: '+new Date().toLocaleDateString('es-ES'),
          '',
          'SITUACIÓN',
          '- La aplicación está vacía y preparada para cargar datos reales.',
          '',
          'SIGUIENTE PASO RECOMENDADO',
          '- Crear áreas, iniciativas y primeras tareas reales.'
        ].join('\n');
      }
      const activeInitiatives = state.initiatives.filter(i=>i.status!=='Finalizada');
      const pausedTasks = tasks.filter(t=>t.status==='Pausada');
      const dueSoon = tasks.filter(t=>t.status!=='Finalizada' && t.daysLeft!==null && t.daysLeft<=3);
      let txt = '';
      txt += 'INFORME EJECUTIVO BDFlow\n';
      txt += 'Fecha: ' + new Date().toLocaleDateString('es-ES') + '\n\n';
      txt += 'SITUACIÓN\n';
      txt += '- Iniciativas activas: ' + activeInitiatives.length + '\n';
      txt += '- Tareas activas: ' + tasks.filter(t=>t.status!=='Finalizada').length + '\n';
      txt += '- Tareas pausadas: ' + pausedTasks.length + '\n';
      txt += '- Vencimientos <= 3 días: ' + dueSoon.length + '\n\n';
      txt += 'DECISIONES RECOMENDADAS\n';
      const top = tasks.filter(t=>t.status!=='Finalizada').slice(0,3);
      if(top.length){
        top.forEach(t=>{ txt += '- Priorizar "'+t.title+'" dentro de '+t.initiative+'. Siguiente paso: '+t.next+'\n'; });
      } else {
        txt += '- Consolidar cierres y revisar nuevas prioridades.\n';
      }
      txt += '\nDETALLE POR INICIATIVA\n';
      state.initiatives.forEach(i=>{
        const linked = tasks.filter(t=>t.initiativeId===i.id);
        txt += '• ' + i.name + '\n';
        txt += '  Objetivo: ' + i.objective + '\n';
        txt += '  Responsable / Área: ' + i.owner + '\n';
        txt += '  Estado: ' + i.status + '\n';
        txt += '  Progreso: ' + recalcInitiativeProgress(i.id) + '%\n';
        txt += '  Tareas activas: ' + linked.filter(t=>t.status!=='Finalizada').length + '\n';
        linked.slice(0,4).forEach(t=>{ txt += '   - ' + t.title + ' | ' + t.status + ' | ' + (t.due || 'Sin fecha') + ' | ' + t.next + '\n'; });
        txt += '\n';
      });
      return txt.trim();
    }

    function buildCommitteeView(){
      const tasks = filteredTasks();
      const paused = tasks.filter(t=>t.status==='Pausada');
      const dueSoon = tasks.filter(t=>t.status!=='Finalizada' && t.daysLeft!==null && t.daysLeft<=3);
      const top = tasks.filter(t=>t.status!=='Finalizada').slice(0,3);
      const situation = paused.length
        ? 'La situación actual muestra avance, pero con riesgo operativo por tareas pausadas y compromisos pendientes.'
        : dueSoon.length
          ? 'La situación actual es razonablemente estable, aunque existen compromisos cercanos que exigen foco y cierre.'
          : 'La situación actual es estable y permite combinar ejecución operativa con avance estructural.';
      const risk = paused.length
        ? 'El principal riesgo está en tareas pausadas que pueden tensionar plazos y generar arrastre.'
        : dueSoon.length
          ? 'El principal riesgo está en la concentración de vencimientos a corto plazo.'
          : 'No se aprecia un riesgo crítico inmediato.';
      const decisions = top.length ? top.map(t=>`Priorizar ${t.title} dentro de ${t.initiative} y asegurar el siguiente paso: ${t.next}.`) : ['Consolidar cierres y revisar nuevas prioridades.'];
      return {situation, risk, decisions};
    }

    function renderReport(){
      const report = buildExecutiveReport();
      const committee = buildCommitteeView();
      return `<div class="grid-2">
        <div class="panel">
          <div class="panel-head"><div><h2>Resumen para comité</h2><p>Versión más ejecutiva y orientada a decisión.</p></div></div>
          <div class="panel-body">
            <div class="exec-grid">
              <div class="exec-card"><h3>Situación</h3><p>${escapeHtml(committee.situation)}</p></div>
              <div class="exec-card"><h3>Riesgo principal</h3><p>${escapeHtml(committee.risk)}</p></div>
              <div class="exec-card" style="grid-column:1 / -1"><h3>Decisiones recomendadas</h3><ul class="exec-list">${committee.decisions.map(d=>`<li>${escapeHtml(d)}</li>`).join('')}</ul></div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><div><h2>Informe ejecutivo</h2><p>Texto listo para copiar a Word, PowerPoint o correo.</p></div></div>
          <div class="panel-body">
            <div class="report-toolbar"><button class="btn primary" onclick="copyExecutiveReport()">Copiar informe</button></div>
            <div class="report-box">${escapeHtml(report)}</div>
          </div>
        </div>
      </div>`;
    }

    function openTaskModal(taskId=null, initiativeId=''){
      state.editingTaskId = taskId;
      const t = taskId ? state.tasks.find(x=>x.id===taskId) : null;
      document.getElementById('taskModalWrap').classList.add('show');
      document.getElementById('taskModalTitle').textContent = t ? 'Editar tarea' : 'Nueva tarea';
      document.getElementById('deleteTaskBtn').style.display = t ? 'inline-flex' : 'none';
      refreshAreaOptions(t ? t.area : state.areas[0] || '');
      refreshInitiativeOptions(t ? t.initiativeId : initiativeId || state.initiatives[0]?.id || '');
      document.getElementById('fTitle').value = t ? t.title : '';
      document.getElementById('fDesc').value = t ? t.desc : '';
      document.getElementById('fStatus').value = t ? t.status : 'Pendiente';
      document.getElementById('fPriority').value = t ? t.priority : 'Alta';
      document.getElementById('fDue').value = t ? (t.due || '') : '';
      document.getElementById('fEffort').value = t ? t.effort : 1;
      document.getElementById('fNext').value = t ? t.next : 'Definir siguiente paso.';
    }

    function closeTaskModal(){
      document.getElementById('taskModalWrap').classList.remove('show');
      state.editingTaskId = null;
    }

    function saveTask(){
      const title = document.getElementById('fTitle').value.trim();
      if(!title){ alert('El título es obligatorio.'); return; }
      const existing = state.editingTaskId ? state.tasks.find(x=>x.id===state.editingTaskId) : null;
      const task = {
        id: state.editingTaskId || ('t' + Date.now()),
        title,
        desc: document.getElementById('fDesc').value.trim(),
        area: document.getElementById('fArea').value,
        initiativeId: document.getElementById('fInitiative').value,
        status: document.getElementById('fStatus').value,
        priority: document.getElementById('fPriority').value,
        due: document.getElementById('fDue').value || '',
        effort: Number(document.getElementById('fEffort').value || 0),
        spent: existing ? Number(existing.spent || 0) : 0,
        next: document.getElementById('fNext').value.trim() || 'Definir siguiente paso.',
        createdAt: existing ? (existing.createdAt || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10),
        worklog: existing ? (existing.worklog || []) : []
      };
      const idx = state.tasks.findIndex(x=>x.id===task.id);
      if(idx >= 0) state.tasks[idx] = task; else state.tasks.unshift(task);
      saveState();
      closeTaskModal();
      render();
    }

    function deleteCurrentTask(){
      if(!state.editingTaskId) return;
      state.tasks = state.tasks.filter(x=>x.id!==state.editingTaskId);
      saveState();
      closeTaskModal();
      render();
    }

    function refreshAreaOptions(selected=''){
      const f = document.getElementById('fArea');
      if(f) f.innerHTML = state.areas.map(a=>`<option value="${escapeHtml(a)}" ${a===selected?'selected':''}>${escapeHtml(a)}</option>`).join('');
      const i = document.getElementById('iOwner');
      if(i) i.innerHTML = state.areas.map(a=>`<option value="${escapeHtml(a)}" ${a===selected?'selected':''}>${escapeHtml(a)}</option>`).join('');
    }

    function refreshInitiativeOptions(selected=''){
      const f = document.getElementById('fInitiative');
      if(f) f.innerHTML = state.initiatives.map(i=>`<option value="${i.id}" ${i.id===selected?'selected':''}>${escapeHtml(i.name)}</option>`).join('');
    }

    function openInitiativeModal(id=null){
      state.editingInitiativeId = id;
      const i = id ? state.initiatives.find(x=>x.id===id) : null;
      document.getElementById('initiativeModalWrap').classList.add('show');
      document.getElementById('initiativeModalTitle').textContent = i ? 'Editar iniciativa' : 'Nueva iniciativa';
      document.getElementById('deleteInitiativeBtn').style.display = i ? 'inline-flex' : 'none';
      refreshAreaOptions(i ? i.owner : state.areas[0] || '');
      document.getElementById('iName').value = i ? i.name : '';
      document.getElementById('iObjective').value = i ? i.objective : '';
      document.getElementById('iStatus').value = i ? i.status : 'Pendiente';
    }

    function closeInitiativeModal(){
      document.getElementById('initiativeModalWrap').classList.remove('show');
      state.editingInitiativeId = null;
    }

    function saveInitiative(){
      const name = document.getElementById('iName').value.trim();
      if(!name){ alert('El nombre es obligatorio.'); return; }
      const initiative = {
        id: state.editingInitiativeId || ('i' + Date.now()),
        name,
        objective: document.getElementById('iObjective').value.trim() || 'Sin objetivo definido.',
        owner: document.getElementById('iOwner').value || state.areas[0] || 'General',
        status: document.getElementById('iStatus').value
      };
      const idx = state.initiatives.findIndex(x=>x.id===initiative.id);
      if(idx >= 0) state.initiatives[idx] = initiative; else state.initiatives.unshift(initiative);
      saveState();
      closeInitiativeModal();
      render();
    }

    function deleteCurrentInitiative(){
      if(!state.editingInitiativeId) return;
      const linked = state.tasks.filter(t=>t.initiativeId===state.editingInitiativeId).length;
      if(linked){ alert('No puedes eliminar una iniciativa con tareas asociadas.'); return; }
      state.initiatives = state.initiatives.filter(x=>x.id!==state.editingInitiativeId);
      saveState();
      closeInitiativeModal();
      render();
    }

    function openWorklogModal(taskId, entryId=null){
      state.editingWorklogTaskId = taskId;
      state.editingWorklogEntryId = entryId;
      const task = state.tasks.find(x=>x.id===taskId);
      const entry = entryId ? (task?.worklog || []).find(w=>w.id===entryId) : null;
      document.getElementById('worklogModalWrap').classList.add('show');
      document.getElementById('wDate').value = entry ? entry.date : new Date().toISOString().slice(0,10);
      document.getElementById('wHours').value = entry ? entry.hours : 1;
      document.getElementById('wNote').value = entry ? (entry.note || '') : '';
    }

    function closeWorklogModal(){
      document.getElementById('worklogModalWrap').classList.remove('show');
      state.editingWorklogTaskId = null;
      state.editingWorklogEntryId = null;
    }

    function saveWorklogEntry(){
      const task = state.tasks.find(x=>x.id===state.editingWorklogTaskId);
      if(!task) return;
      const date = document.getElementById('wDate').value || new Date().toISOString().slice(0,10);
      const hours = Number(document.getElementById('wHours').value || 0);
      const note = document.getElementById('wNote').value.trim();
      if(!hours || hours <= 0){ alert('Horas no válidas.'); return; }

      if(!Array.isArray(task.worklog)) task.worklog = [];

      if(state.editingWorklogEntryId){
        const entry = task.worklog.find(w=>w.id===state.editingWorklogEntryId);
        if(entry){
          entry.date = date;
          entry.hours = hours;
          entry.note = note;
        }
      }else{
        task.worklog.push({id:'w'+Date.now(), date, hours, note});
      }

      task.spent = Math.round(task.worklog.reduce((a,b)=>a+Number(b.hours||0),0) * 10) / 10;
      if(task.status === 'Pendiente' || task.status === 'Pausada') task.status = 'En curso';
      saveState();
      closeWorklogModal();
      render();
    }

    function deleteWorklogEntry(taskId, entryId){
      const task = state.tasks.find(x=>x.id===taskId);
      if(!task) return;
      task.worklog = (task.worklog || []).filter(w=>w.id!==entryId);
      task.spent = Math.round(task.worklog.reduce((a,b)=>a+Number(b.hours||0),0) * 10) / 10;
      saveState();
      openDetailModal(taskId);
      render();
    }

    function openDetailModal(taskId){
      state.detailTaskId = taskId;
      const task = filteredTasks().find(x=>x.id===taskId);
      if(!task) return;
      const grouped = getGroupedWorklog(task);
      document.getElementById('detailModalBody').innerHTML = `
        <div class="task" style="margin-bottom:0">
          <div class="task-top">
            <div>
              <div class="task-title">${escapeHtml(task.title)}</div>
              <div class="task-sub">${escapeHtml(task.desc)}</div>
            </div>
            <div class="score"><b>${task.score}</b><span>Score</span></div>
          </div>
          <div class="badges">
            ${statusBadge(task.status)}
            ${badgeDue(task)}
            ${Number(task.spent||0)>Number(task.effort||0)?'<span class="badge overrun">Desviada</span>':''}
            <span class="badge">${escapeHtml(task.area)}</span>
            <span class="badge">${escapeHtml(task.initiative)}</span>
          </div>
          <div class="meta">
            <div class="m"><div class="mk">Creada</div><div class="mv">${escapeHtml(task.createdAt || '—')}</div></div>
            <div class="m"><div class="mk">Fecha objetivo</div><div class="mv">${task.due ? escapeHtml(task.due) : 'Sin fecha'}</div></div>
            <div class="m"><div class="mk">Horas</div><div class="mv">${task.spent}h / ${task.effort}h${Number(task.spent||0)>Number(task.effort||0)?'<div style="margin-top:4px;color:#d97706;font-size:12px;font-weight:800">Desviada</div>':''}</div></div>
            <div class="m"><div class="mk">Sesiones</div><div class="mv">${getWorkSessionsCount(task)}</div></div>
          </div>
          <div class="detail-block">
            <div class="row-title" style="margin-bottom:10px">Histórico de trabajo</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
              <button class="btn primary small" onclick="openWorklogModal('${task.id}')">+ Registrar trabajo</button>
            </div>
            ${
              Object.keys(grouped).length ? Object.entries(grouped).map(([date,items])=>`
                <div class="day-group-title">${date} · ${items.reduce((a,b)=>a+Number(b.hours||0),0)}h</div>
                ${items.map(w=>`
                  <div class="worklog-row">
                    <div>
                      <div class="row-title">${w.hours}h</div>
                      <div class="row-sub">${w.note ? escapeHtml(w.note) : 'Sin comentario'}</div>
                    </div>
                    <div style="display:flex;gap:8px">
                      <button class="btn ghost small" onclick="openWorklogModal('${task.id}','${w.id}')">Editar</button>
                      <button class="btn secondary small" onclick="deleteWorklogEntry('${task.id}','${w.id}')">Eliminar</button>
                    </div>
                  </div>
                `).join('')}
              `).join('')
              : '<div class="empty">Todavía no hay trabajo registrado.</div>'
            }
          </div>
        </div>
      `;
      document.getElementById('detailModalWrap').classList.add('show');
    }

    function closeDetailModal(){
      document.getElementById('detailModalWrap').classList.remove('show');
      state.detailTaskId = null;
    }

    function toggleDone(id){
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      t.status = t.status === 'Finalizada' ? 'En curso' : 'Finalizada';
      saveState();
      render();
    }

    function quickPause(id){
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      t.status = t.status === 'Pausada' ? 'En curso' : 'Pausada';
      saveState();
      render();
    }

    function quickAddTime(id,h){
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      if(!Array.isArray(t.worklog)) t.worklog = [];
      t.worklog.push({id:'w'+Date.now(), date:new Date().toISOString().slice(0,10), hours:h, note:'Registro rápido'});
      t.spent = Math.round(t.worklog.reduce((a,b)=>a+Number(b.hours||0),0) * 10) / 10;
      if(t.status === 'Pendiente' || t.status === 'Pausada') t.status = 'En curso';
      saveState();
      render();
    }

    function addArea(){
      const el = document.getElementById('newAreaInput');
      if(!el) return;
      const name = el.value.trim();
      if(!name) return;
      if(state.areas.includes(name)){ alert('Esa área ya existe.'); return; }
      state.areas.push(name);
      el.value = '';
      saveState();
      render();
    }

    function renameArea(index){
      const current = state.areas[index];
      const next = prompt('Nuevo nombre del área:', current);
      if(!next || next.trim() === current) return;
      const clean = next.trim();
      if(state.areas.includes(clean)){ alert('Ya existe un área con ese nombre.'); return; }
      state.tasks.forEach(t=>{ if(t.area === current) t.area = clean; });
      state.initiatives.forEach(i=>{ if(i.owner === current) i.owner = clean; });
      state.areas[index] = clean;
      saveState();
      render();
    }

    function deleteArea(index){
      const name = state.areas[index];
      const usedTasks = state.tasks.some(t=>t.area===name);
      const usedInitiatives = state.initiatives.some(i=>i.owner===name);
      if(usedTasks || usedInitiatives){ alert('No puedes eliminar un área en uso.'); return; }
      state.areas.splice(index,1);
      saveState();
      render();
    }

    function quickAddInitiative(){
      const nameEl = document.getElementById('quickInitiativeName');
      const ownerEl = document.getElementById('quickInitiativeOwner');
      if(!nameEl || !ownerEl) return;
      const name = nameEl.value.trim();
      if(!name) return;
      state.initiatives.unshift({
        id:'i'+Date.now(),
        name,
        owner: ownerEl.value,
        objective: 'Sin objetivo definido.',
        status: 'Pendiente'
      });
      nameEl.value = '';
      saveState();
      render();
    }

    function copyExecutiveReport(){
      navigator.clipboard.writeText(buildExecutiveReport()).then(()=>alert('Informe copiado al portapapeles.'));
    }

    function toggleSidebar(open){
      document.getElementById('sidebar').classList.toggle('open', open);
      document.getElementById('overlay').classList.toggle('show', open);
    }

    function render(){
      const tasks = filteredTasks();
      renderMetrics(tasks);

      const titles = {
        dashboard:['Dashboard','Decisión inmediata y riesgos del día.'],
        today:['Hoy','Plan de trabajo realista.'],
        week:['Semana','Distribución operativa de carga y compromisos.'],
        month:['Mes','Visión táctica de hitos y vencimientos.'],
        ranking:['Ranking','Priorización visible y ordenada.'],
        kanban:['Kanban','Seguimiento operativo por estado.'],
        activity:['Actividad','Vista cronológica del trabajo realizado.'],
        initiatives:['Iniciativas','Contenedores de trabajo que agrupan tareas.'],
        config:['Configuración','Áreas e iniciativas gestionadas de forma rápida.'],
        report:['Informe','Versión comité y resumen ejecutivo listo para compartir.']
      };

      document.getElementById('pageTitle').textContent = titles[state.currentView][0];
      document.getElementById('pageSubtitle').textContent = titles[state.currentView][1];

      document.getElementById('viewContainer').innerHTML =
        state.currentView === 'dashboard' ? renderDashboard(tasks) :
        state.currentView === 'today' ? renderToday(tasks) :
        state.currentView === 'week' ? renderWeek(tasks) :
        state.currentView === 'month' ? renderMonth(tasks) :
        state.currentView === 'ranking' ? renderRanking(tasks) :
        state.currentView === 'kanban' ? renderKanban(tasks) :
        state.currentView === 'activity' ? renderActivity() :
        state.currentView === 'initiatives' ? renderInitiatives() :
        state.currentView === 'config' ? renderConfig() :
        renderReport();

      document.querySelectorAll('.nav-btn').forEach(btn=>{
        btn.classList.toggle('active', btn.dataset.view === state.currentView);
      });

      saveState();
    }

    document.querySelectorAll('.nav-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.currentView = btn.dataset.view;
        render();
        if(window.innerWidth <= 820) toggleSidebar(false);
      });
    });

    document.getElementById('searchInput').addEventListener('input', e=>{
      state.search = e.target.value.trim();
      render();
    });

    document.getElementById('statusFilter').addEventListener('change', e=>{
      state.filterStatus = e.target.value;
      render();
    });

    document.getElementById('dailyCap').addEventListener('input', e=>{
      state.dailyCapacity = Number(e.target.value);
      document.getElementById('dailyCapValue').textContent = state.dailyCapacity;
      document.getElementById('dailyCapHint').textContent = state.dailyCapacity <= 4 ? 'Muy exigente' : state.dailyCapacity <= 6 ? 'Foco realista' : 'Riesgo de sobrecarga';
      render();
    });

    loadState();
    document.getElementById('dailyCap').value = state.dailyCapacity;
    document.getElementById('dailyCapValue').textContent = state.dailyCapacity;
    document.getElementById('dailyCapHint').textContent = state.dailyCapacity <= 4 ? 'Muy exigente' : state.dailyCapacity <= 6 ? 'Foco realista' : 'Riesgo de sobrecarga';
    render();
  </script>
</body>
</html>
