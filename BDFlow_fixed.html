function getAlerts(){
  var a=[],td=new Date();td.setHours(0,0,0,0);
  tasks.forEach(function(t){
    if(t.status==='Finalizada')return;
    var due=new Date(t.dd+'T12:00:00');due.setHours(0,0,0,0);
    var dl=Math.ceil((due-td)/86400000);
    if(dl<0)a.push({msg:'Vencida '+Math.abs(dl)+'d: '+t.title,t:t,lv:'r'});
    else if(dl===0)a.push({msg:'Vence HOY: '+t.title,t:t,lv:'r'});
    else if(dl<=2)a.push({msg:'Vence en '+dl+'d: '+t.title,t:t,lv:'a'});
    if(t.status==='Bloqueada'){var sd=t.sd?new Date(t.sd+'T12:00:00'):null;if(sd){var bd=Math.ceil((td-sd)/86400000);if(bd>=3)a.push({msg:'Bloqueada '+bd+'d: '+t.title,t:t,lv:'r'});}}
    var di=t.diary||[];
    if(t.status==='En curso'){if(di.length){var last=new Date(di[di.length-1].date+'T12:00:00');last.setHours(0,0,0,0);var id=Math.ceil((td-last)/86400000);if(id>=5)a.push({msg:'Sin actividad '+id+'d: '+t.title,t:t,lv:'a'});}else{a.push({msg:'Sin actividad registrada: '+t.title,t:t,lv:'a'});}}
  });
  return a;
}

    '<div class="fr"><div><label class="fl">Esfuerzo (h)</label><input type="number" class="fi" id="nt-ef" value="2" min="0.5" step="0.5"></div><div><label class="fl">Criticidad</label><select class="fs" id="nt-cr"><option>Alta</option><option selected>Media</option><option>Baja</option></select></div></div>'+
    '<div class="fg"><label class="fl">Dependencias</label><input class="fi" id="nt-dp" placeholder="¿Qué necesitas de terceros?"></div>'+
    '<div class="fg"><label class="fl">Próxima acción</label><input class="fi" id="nt-nx" placeholder="Primer paso concreto"></div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><input type="checkbox" id="nt-ex" style="accent-color:#1a56db"><label for="nt-ex" style="font-size:12px;font-weight:500;color:#475569;cursor:pointer">Visibilidad ejecutiva</label></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="CM()">Cancelar</button><button class="btn btnp" onclick="SVT()">Guardar tarea</button></div>';
  ge('ov').classList.remove('hid');
}
function SVT(){
  var ti=ge('nt-ti').value.trim(),du=ge('nt-dd').value;
  if(!ti||!du){alert('Título y fecha límite son obligatorios');return;}
  var t={id:'t'+Date.now(),title:ti,desc:'',iid:ge('nt-in').value,cat:ge('nt-ca').value,area:ge('nt-ar').value||AREAS[0].name,sh:ge('nt-sh').value,sd:ge('nt-sd').value,dd:du,status:'Pendiente',prio:ge('nt-pr').value,crit:ge('nt-cr').value,impact:ge('nt-im').value,effort:parseFloat(ge('nt-ef').value)||2,spent:0,prog:0,deps:ge('nt-dp').value,next:ge('nt-nx').value,exec:ge('nt-ex').checked,diary:[]};
  tasks.push(t);svT(t);CM();RD();toast('Tarea guardada ✓');UNB();
}

function showIM(){
  ge('mo').innerHTML=
    '<div class="mh"><div><div class="mt">Nueva iniciativa</div><div class="mst">Objetivo de negocio con horizonte temporal</div></div><button class="xb" onclick="CM()">✕</button></div>'+
    '<div class="hi hig">Una iniciativa agrupa tareas bajo un objetivo estratégico: cerrar un deal, lanzar un GTM, certificar un partner.</div>'+
    '<div class="fg"><label class="fl">Nombre *</label><input class="fi" id="ni-nm" placeholder="Nombre de la iniciativa"></div>'+
    '<div class="fg"><label class="fl">Objetivo de negocio</label><input class="fi" id="ni-ob" placeholder="¿Qué resultado persigue?"></div>'+
    '<div class="fr"><div><label class="fl">Tipo</label><select class="fs" id="ni-ty" onchange="TP()">'+ITY.map(function(t){return'<option>'+t+'</option>';}).join('')+'</select></div>'+
    '<div><label class="fl">Área principal</label><select class="fs" id="ni-ar">'+AREAS.map(function(a){return'<option>'+a.name+'</option>';}).join('')+'</select></div></div>'+
    '<div class="fg" id="pip-f" style="display:none"><label class="fl">Valor pipeline (€)</label><input type="number" class="fi" id="ni-vl" placeholder="0" min="0"></div>'+
    '<div class="fr"><div><label class="fl">Importancia</label><select class="fs" id="ni-im"><option>Alta</option><option selected>Media</option><option>Baja</option></select></div><div><label class="fl">Fecha objetivo</label><input type="date" class="fi" id="ni-td"></div></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="CM()">Cancelar</button><button class="btn btnp" onclick="SVI()">Guardar iniciativa</button></div>';
  ge('ov').classList.remove('hid');TP();
}
function TP(){var t=ge('ni-ty');var p=ge('pip-f');if(t&&p)p.style.display=PTY.indexOf(t.value)>=0?'block':'none';}
function SVI(){
  var nm=ge('ni-nm').value.trim();if(!nm){alert('El nombre es obligatorio');return;}
  var ty=ge('ni-ty').value,hp=PTY.indexOf(ty)>=0;
  var ini={id:'i'+Date.now(),name:nm,type:ty,area:ge('ni-ar').value,otherAreas:[],objective:ge('ni-ob').value,value:hp?parseInt(ge('ni-vl').value)||0:0,hp:hp,importance:ge('ni-im').value,startDate:tds(),targetDate:ge('ni-td').value,status:'En curso'};
  initiatives.push(ini);svI(ini);CM();RD();toast('Iniciativa guardada ✓');
}

var QT=[{l:'Reunión',c:'Reunión',p:'Alta'},{l:'Seguimiento',c:'Seguimiento',p:'Media'},{l:'Propuesta',c:'Propuesta',p:'Alta'},{l:'Análisis',c:'Análisis',p:'Media'},{l:'Presentación',c:'Presentación',p:'Alta'},{l:'Reporte',c:'Reporte',p:'Media'},{l:'Escalado',c:'Escalado',p:'Alta'},{l:'Coordinación',c:'Coordinación',p:'Media'}];

function showQR(){
  var chips=QT.map(function(t){return'<span class="chip" onclick="QTP(\''+t.l+'\')">'+t.l+'</span>';}).join('');
  ge('mo').innerHTML=
    '<div class="mh"><div><div class="mt">⚡ Creación rápida con IA</div><div class="mst">Describe en lenguaje natural y la IA completa los campos</div></div><button class="xb" onclick="CM()">✕</button></div>'+
    '<div class="hi hib"><strong>Describe qué necesitas hacer</strong> — menciona el cliente, stakeholder, fecha y tipo. La IA detectará la iniciativa automáticamente.</div>'+
    '<div class="fg"><label class="fl">¿Qué necesitas hacer?</label>'+
    '<textarea class="fi" id="qi" rows="3" placeholder="Ej: Mañana reunión con Pedro de Bankinter sobre propuesta HR&#10;Ej: Seguimiento con Laura de Mutua, lleva 3 días sin responder&#10;Ej: Preparar deck GTM RRHH para dirección antes del viernes"></textarea></div>'+
    '<div class="fg"><div class="fl" style="margin-bottom:7px">O elige tipo rápido</div>'+chips+'</div>'+
    '<div id="qi-res" class="hid" style="margin-bottom:13px"></div>'+
    '<div id="qi-form" class="hid"><div style="border-top:1px solid #dde3f0;padding-top:14px">'+
    '<div class="fr"><div><label class="fl">Título</label><input class="fi" id="qi-ti"></div><div><label class="fl">Fecha límite</label><input type="date" class="fi" id="qi-dd"></div></div>'+
    '<div class="fr"><div><label class="fl">Área</label><select class="fs" id="qi-ar"><option value="">Seleccionar</option>'+AREAS.map(function(a){return'<option>'+a.name+'</option>';}).join('')+'</select></div>'+
    '<div><label class="fl">Iniciativa detectada</label><select class="fs" id="qi-in"><option value="">— Sin iniciativa —</option>'+initiatives.map(function(i){return'<option value="'+i.id+'">'+esc(i.name)+'</option>';}).join('')+'</select></div></div>'+
    '<div class="fr"><div><label class="fl">Categoría</label><select class="fs" id="qi-ca">'+CAT.map(function(c){return'<option>'+c+'</option>';}).join('')+'</select></div><div><label class="fl">Prioridad</label><select class="fs" id="qi-pr"><option>Alta</option><option selected>Media</option><option>Baja</option></select></div></div>'+
    '<div class="fr"><div><label class="fl">Stakeholder</label><input class="fi" id="qi-sh" placeholder="Nombre (Rol)"></div><div><label class="fl">Impacto</label><select class="fs" id="qi-im"><option>Alto</option><option selected>Medio</option><option>Bajo</option></select></div></div>'+
    '<div class="fg"><label class="fl">Próxima acción</label><input class="fi" id="qi-nx" placeholder="Primer paso concreto"></div>'+
    '</div></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">'+
    '<button class="btn" onclick="CM()">Cancelar</button>'+
    '<button class="btn btnp" id="qi-ab" onclick="AIZ()">✨ Analizar con IA</button>'+
    '<button class="btn btnp hid" id="qi-sb" onclick="QSV()">Guardar tarea</button></div>';
  ge('ov').classList.remove('hid');
  var aiBtn=ge('qi-ab');if(aiBtn&&!AI_ENABLED){aiBtn.disabled=true;aiBtn.textContent='IA no disponible';aiBtn.title='La IA está desactivada temporalmente';}
  setTimeout(function(){var e=ge('qi');if(e)e.focus();},100);
}

function QTP(l){
  var t=QT.filter(function(x){return x.l===l;})[0];if(!t)return;
  var e=ge('qi');if(e)e.value=l+' — ';
  var cs=ge('qi-ca');if(cs)for(var i=0;i<cs.options.length;i++){if(cs.options[i].text===t.c){cs.selectedIndex=i;break;}}
  var ps=ge('qi-pr');if(ps)for(var i=0;i<ps.options.length;i++){if(ps.options[i].text===t.p){ps.selectedIndex=i;break;}}
  ge('qi-form').classList.remove('hid');ge('qi-sb').classList.remove('hid');
  if(e)e.focus();
}

function AIZ(){
  var inp=ge('qi');if(!inp)return;
  var input=inp.value.trim();if(!input){alert('Escribe qué necesitas hacer');return;}
  var btn=ge('qi-ab');btn.textContent='Analizando...';btn.disabled=true;
  var iL=initiatives.map(function(i){return i.id+'|'+i.name+'|'+i.type+'|'+i.area;}).join('\n')||'ninguna';
  var aL=AREAS.map(function(a){return a.name;}).join(', ');
  var hoy=new Date().toISOString().split('T')[0];
  var prompt='Eres asistente BD SaaS B2B RRHH (Cegid). Usuario escribe: "'+input+'"\n\nIniciativas (id|nombre|tipo|area):\n'+iL+'\n\nAreas: '+aL+'\nCats: Reunión,Seguimiento,Análisis,Coordinación,Propuesta,Presentación,Reporte,Escalado,Ejecución,Bloqueo\nHoy: '+hoy+'\n\nResponde SOLO este JSON sin markdown:\n{"titulo":"...","categoria":"...","area":"...","iniciativaId":"ID o null","stakeholder":"...","fechaLimite":"YYYY-MM-DD","prioridad":"Alta|Media|Baja","impacto":"Alto|Medio|Bajo","proximaAccion":"...","razonamiento":"frase breve"}';
  callGemini(prompt).then(function(raw){
    btn.textContent='✨ Analizar con IA';btn.disabled=false;
    var clean=raw.trim();
    var m=clean.match(/\{[\s\S]*\}/);if(m)clean=m[0];
    var r;try{r=JSON.parse(clean);}catch(e){
      ge('qi-res').innerHTML='<div class="al ala"><span>⚠️</span><div style="font-weight:500">Respuesta de IA no interpretable. Rellena el formulario manualmente.</div></div>';
      ge('qi-res').classList.remove('hid');ge('qi-form').classList.remove('hid');ge('qi-sb').classList.remove('hid');return;
    }
    var ini=r.iniciativaId&&r.iniciativaId!=='null'?initiatives.filter(function(i){return i.id===r.iniciativaId;})[0]:null;
    ge('qi-res').innerHTML='<div class="air"><div class="ait">✨ IA ha analizado tu texto</div><div class="aib">'+(r.razonamiento||'Análisis completado.')+'</div>'+(ini?'<div style="margin-top:8px;font-size:12px;font-weight:600;background:rgba(22,163,74,.12);color:#14532d;padding:4px 10px;border-radius:6px;display:inline-block">Iniciativa: '+esc(ini.name)+'</div>':'')+'</div>';
    ge('qi-res').classList.remove('hid');ge('qi-form').classList.remove('hid');ge('qi-sb').classList.remove('hid');
    function sv(id,v){var e=ge(id);if(e&&v&&v!=='null'&&String(v).trim())e.value=v;}
    function sl(id,v){var e=ge(id);if(!e||!v||v==='null')return;for(var i=0;i<e.options.length;i++){if(e.options[i].value===v||e.options[i].text===v){e.selectedIndex=i;break;}}}
    sv('qi-ti',r.titulo);sv('qi-dd',r.fechaLimite);sv('qi-sh',r.stakeholder);sv('qi-nx',r.proximaAccion);
    sl('qi-ca',r.categoria);sl('qi-pr',r.prioridad);sl('qi-im',r.impacto);sl('qi-ar',r.area);
    if(r.iniciativaId&&r.iniciativaId!=='null')sl('qi-in',r.iniciativaId);
  }).catch(function(e){
    btn.textContent='✨ Analizar con IA';btn.disabled=false;
    ge('qi-res').innerHTML='<div class="al ala"><span>⚠️</span><div><div style="font-weight:600">Error: '+e.message+'</div><div style="font-size:11px;margin-top:2px">Rellena el formulario manualmente.</div></div></div>';
    ge('qi-res').classList.remove('hid');ge('qi-form').classList.remove('hid');ge('qi-sb').classList.remove('hid');
  });
}

function QSV(){
  var ti=ge('qi-ti').value.trim(),du=ge('qi-dd').value;
  if(!ti){alert('El título es obligatorio');return;}
  if(!du)du=tds();
  var im=ge('qi-im');
  var t={id:'t'+Date.now(),title:ti,desc:'',iid:ge('qi-in').value,cat:ge('qi-ca').value||'Ejecución',area:ge('qi-ar').value||AREAS[0].name,sh:ge('qi-sh').value,sd:tds(),dd:du,status:'Pendiente',prio:ge('qi-pr').value||'Media',crit:'Media',impact:im?im.value:'Medio',effort:1,spent:0,prog:0,deps:'',next:ge('qi-nx').value,exec:false,diary:[]};
  tasks.push(t);svT(t);CM();RD();toast('Tarea creada ✓');UNB();
}

function showAM(){
  function rows(){return AREAS.map(function(a,i){return'<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #dde3f0"><div style="width:16px;height:16px;border-radius:50%;background:'+a.color+';flex-shrink:0;cursor:pointer;box-shadow:0 0 0 3px rgba(0,0,0,.08)" onclick="PC('+i+')" title="Cambiar color"></div><span style="flex:1;font-size:13px;font-weight:500">'+a.name+'</span><div style="display:flex;gap:4px">'+(i>0?'<button class="btn" style="padding:3px 9px;font-size:11px" onclick="MA('+i+',-1)">↑</button>':'<span style="width:38px"></span>')+(i<AREAS.length-1?'<button class="btn" style="padding:3px 9px;font-size:11px" onclick="MA('+i+',1)">↓</button>':'<span style="width:38px"></span>')+'<button class="btn" style="padding:3px 9px;font-size:11px" onclick="RA('+i+')">✏️</button><button class="btn btnd" style="padding:3px 9px;font-size:11px" onclick="DA('+i+')">✕</button></div></div>';}).join('');}
  ge('mo').innerHTML='<div class="mh"><div><div class="mt">Gestionar áreas</div><div class="mst">Colores, nombres y orden</div></div><button class="xb" onclick="CM()">✕</button></div>'+
    '<div class="hi hia">Clic en el círculo de color para cambiarlo. Usa ↑↓ para reordenar.</div>'+
    '<div id="al">'+rows()+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:14px;border-top:1px solid #dde3f0;padding-top:14px"><input class="fi" id="na" placeholder="Nueva área..." style="flex:1"><button class="btn btnp" onclick="AA()">+ Añadir</button></div>'+
    '<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="CM()">Cerrar</button></div>';
  ge('ov').classList.remove('hid');
}
function RAL(){var e=ge('al');if(!e)return;e.innerHTML=AREAS.map(function(a,i){return'<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #dde3f0"><div style="width:16px;height:16px;border-radius:50%;background:'+a.color+';flex-shrink:0;cursor:pointer;box-shadow:0 0 0 3px rgba(0,0,0,.08)" onclick="PC('+i+')" title="Cambiar color"></div><span style="flex:1;font-size:13px;font-weight:500">'+a.name+'</span><div style="display:flex;gap:4px">'+(i>0?'<button class="btn" style="padding:3px 9px;font-size:11px" onclick="MA('+i+',-1)">↑</button>':'<span style="width:38px"></span>')+(i<AREAS.length-1?'<button class="btn" style="padding:3px 9px;font-size:11px" onclick="MA('+i+',1)">↓</button>':'<span style="width:38px"></span>')+'<button class="btn" style="padding:3px 9px;font-size:11px" onclick="RA('+i+')">✏️</button><button class="btn btnd" style="padding:3px 9px;font-size:11px" onclick="DA('+i+')">✕</button></div></div>';}).join('');}
function MA(i,d){var tmp=AREAS[i];AREAS[i]=AREAS[i+d];AREAS[i+d]=tmp;svS();RS();RAL();}
function PC(i){
  var o=ge('cp');if(o)o.remove();
  var row=document.createElement('div');row.id='cp';row.style.cssText='display:flex;flex-wrap:wrap;gap:7px;padding:12px;background:#eef1f8;border-radius:10px;margin:4px 0';
  row.innerHTML=PAL.map(function(c){return'<div class="sw'+(c===AREAS[i].color?' sel':'')+'" style="background:'+c+'" onclick="SAC('+i+',\''+c+'\')"></div>';}).join('');
  var al=ge('al');if(al)al.insertBefore(row,al.children[i].nextSibling);
}
function SAC(i,c){AREAS[i].color=c;svS();RS();RAL();var o=ge('cp');if(o)o.remove();}
function AA(){var e=ge('na'),n=e.value.trim();if(!n)return;if(AREAS.some(function(a){return a.name===n;})){alert('Ya existe');return;}AREAS.push({name:n,color:PAL[AREAS.length%PAL.length]});svS();RS();showAM();toast('Área añadida ✓');}
function RA(i){var c=AREAS[i].name,nw=prompt('Nuevo nombre:',c);if(!nw||!nw.trim()||nw.trim()===c)return;nw=nw.trim();if(AREAS.some(function(a){return a.name===nw;})){alert('Ya existe');return;}tasks.forEach(function(t){if(t.area===c){t.area=nw;svT(t);}});initiatives.forEach(function(ini){var changed=false;if(ini.area===c){ini.area=nw;changed=true;}ini.otherAreas=(ini.otherAreas||[]).map(function(a){if(a===c){changed=true;return nw;}return a;});if(changed)svI(ini);});AREAS[i].name=nw;if(AF===c)AF=nw;persistLocal();svS();RS();showAM();toast('Renombrada ✓');}
function DA(i){var n=AREAS[i].name,u=tasks.filter(function(t){return t.area===n;}).length;if(!confirm(u>0?'El área "'+n+'" tiene '+u+' tareas. ¿Eliminar?':'¿Eliminar "'+n+'"?'))return;if(u>0)tasks.forEach(function(t){if(t.area===n){t.area='';svT(t);}});initiatives.forEach(function(ini){var changed=false;if(ini.area===n){ini.area='';changed=true;}ini.otherAreas=(ini.otherAreas||[]).filter(function(a){var keep=a!==n;if(!keep)changed=true;return keep;});if(changed)svI(ini);});AREAS.splice(i,1);if(AF===n)AF='all';persistLocal();svS();RS();showAM();toast('Eliminada');}

function CM(){ge('ov').classList.add('hid');}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

RS();
loadAll();
setInterval(function(){UNB();},60000);
</script>
